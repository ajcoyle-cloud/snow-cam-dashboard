<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mt Lyford PredictWind tile debug</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 14px; background:#111; color:#eee; }
  h1 { font-size: 1.1rem; margin: 0 0 4px; }
  .sub { color:#9aa; font-size:0.8rem; margin-bottom:12px; }
  .summary { background:#1c1c22; border:1px solid #333; border-radius:8px; padding:10px 12px; margin-bottom:14px; font-size:0.9rem; }
  .summary b { color:#fff; }
  .ok { color:#5fd28a; } .bad { color:#ff7676; }
  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  th, td { text-align:left; padding:7px 6px; border-bottom:1px solid #2a2a31; }
  th { color:#9aa; font-weight:600; position:sticky; top:0; background:#111; }
  tr.match { background:#15301f; }
  td.r { text-align:right; font-variant-numeric:tabular-nums; }
  .name { font-weight:600; color:#fff; }
  code { color:#8fd; }
</style>
</head>
<body>
<h1>Mt Lyford — PredictWind stations in tiles</h1>
<div class="sub">Centre −42.446503, 173.143418 · tiles 10/379–381/1003–1004 · read-only</div>
<div class="summary" id="summary">Loading tiles…</div>
<table id="tbl"><thead>
  <tr><th>name</th><th class="r">elev</th><th class="r">dist</th><th>trackId</th><th>tile</th></tr>
</thead><tbody></tbody></table>

<script>
const CENTRE = { lat: -42.446503, lon: 173.143418 };
const TILES = [[10,379,1003],[10,379,1004],[10,380,1003],[10,380,1004],[10,381,1003],[10,381,1004]];
// The same name substrings configured in PW_CONFIG.mtlyford.
const WANT = ['hanmer','clarence','pudding'];

function decodeCoord(signed, intDigits) {
  const sign = signed[0] === '-' ? -1 : 1;
  const dg = signed.replace(/^[+-]/, '');
  return sign * (+dg) / Math.pow(10, dg.length - intDigits);
}
function parseMeta(t) {
  const name = (t || '').split('$', 1)[0];
  const m = (t || '').match(/([+-]\d+)([+-]\d+)\^(\d+)/);
  return {
    name,
    lat: m ? decodeCoord(m[1], 2) : null,
    lon: m ? decodeCoord(m[2], 3) : null,
    elevM: m ? +m[3] : null,
  };
}
function haversineKm(a, b) {
  if (a.lat == null || b.lat == null) return null;
  const R = 6371, toR = Math.PI / 180;
  const dLat = (b.lat - a.lat) * toR, dLon = (b.lon - a.lon) * toR;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

(async () => {
  const results = await Promise.all(TILES.map(([z,x,y]) =>
    fetch(`/pw-obs/tile/${z}/${x}/${y}.json?t=` + Date.now())
      .then(r => r.ok ? r.json() : null).catch(() => null)));
  const rows = [];
  let tilesOk = 0;
  results.forEach((d, i) => {
    if (!d || !d.tracks) return;
    tilesOk++;
    for (const [id, tr] of Object.entries(d.tracks)) {
      const meta = parseMeta(tr.t);
      rows.push({
        id, name: meta.name, elev: meta.elevM,
        dist: haversineKm(CENTRE, meta),
        tile: TILES[i].join('/'),
      });
    }
  });
  rows.sort((a, b) => (a.dist ?? 1e9) - (b.dist ?? 1e9));

  const found = WANT.map(w => {
    const hit = rows.find(r => (r.name || '').toLowerCase().includes(w));
    return { w, hit };
  });
  const summary = document.getElementById('summary');
  summary.innerHTML =
    `<b>${tilesOk}/${TILES.length}</b> tiles returned data · <b>${rows.length}</b> stations<br>` +
    found.map(f => f.hit
      ? `<span class="ok">✓ "${f.w}" → ${f.hit.name} (${f.hit.elev ?? '?'}m, id ${f.hit.id})</span>`
      : `<span class="bad">✗ "${f.w}" — no match in these tiles</span>`).join('<br>');

  const tb = document.querySelector('#tbl tbody');
  tb.innerHTML = rows.map(r => {
    const isMatch = WANT.some(w => (r.name || '').toLowerCase().includes(w));
    return `<tr class="${isMatch ? 'match' : ''}">
      <td class="name">${r.name || '—'}</td>
      <td class="r">${r.elev ?? '—'}</td>
      <td class="r">${r.dist == null ? '—' : r.dist.toFixed(1) + 'k'}</td>
      <td><code>${r.id}</code></td>
      <td>${r.tile}</td></tr>`;
  }).join('') || `<tr><td colspan="5">No stations found in these tiles.</td></tr>`;
})();
</script>
</body>
</html>
