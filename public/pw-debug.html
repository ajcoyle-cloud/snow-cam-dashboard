<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whakapapa live obs — temp/elevation</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 14px; background:#111; color:#eee; }
  h1 { font-size: 1.05rem; margin: 0 0 10px; }
  .summary { background:#1c1c22; border:1px solid #333; border-radius:8px; padding:10px 12px; margin-bottom:14px; font-size:0.9rem; line-height:1.5; }
  .summary b { color:#fff; }
  .ok { color:#5fd28a; } .bad { color:#ff7676; } .warn { color:#fbbf24; }
  table { width:100%; border-collapse:collapse; font-size:0.84rem; }
  th, td { text-align:right; padding:7px 6px; border-bottom:1px solid #2a2a31; }
  th:first-child, td:first-child { text-align:left; }
  th { color:#9aa; font-weight:600; }
  td.name { color:#fff; font-weight:600; }
  tr.stale td { color:#fbbf24; }
  tr.out td { background:#3a1520; }
  code { color:#8fd; }
</style>
</head>
<body>
<h1>Whakapapa live obs — temp vs elevation</h1>
<div class="summary" id="summary">Loading…</div>
<table id="tbl"><thead>
  <tr><th>station</th><th>elev (m)</th><th>temp (°C)</th><th>age</th><th>fit @elev</th><th>Δ</th><th>w</th></tr>
</thead><tbody></tbody></table>

<script>
// Whakapapa / ruapehu PredictWind config (mirrors PW_CONFIG.ruapehu in the app).
const TILES = [[10,390,1011],[10,390,1010],[10,389,1011],[10,389,1010]];
const STATIONS = [
  { trackId:'363045', name:'Whakapapa 2000m', w:1.0 },
  { trackId:'363044', name:'Halidays Hut',    w:1.0 },
  { trackId:'363039', name:'Desert Road',     w:0.1 },
  { trackId:'362779', name:'National Park Township', w:0.3 },
  { trackId:'362785', name:'Waiouru Aerodrome', w:0.1 },
  { trackId:'363053', name:'Raetihi',         w:0.1 },
];

function parseMeta(t){
  const m=(t||'').match(/([+-]\d+)([+-]\d+)\^(\d+)/);
  return { name:(t||'').split('$')[0], elev: m?+m[3]:null };
}
// Latest sample is in the track's `l` field: "<ts><lat><lon>d..s..g..t<temp>..".
function latest(tr){
  const l=tr.l||''; const ts=(l.match(/^(\d{9,})/)||[])[1];
  let temp=null;
  for(const m of l.matchAll(/([a-z])(-?\d+)/g)) if(m[1]==='t') temp=+m[2]/10;
  return ts ? { ts:+ts, temp } : null;
}
// Weighted least-squares temp = a + b*elev (same as the app's pwWeightedFit).
function wfit(pts){
  const sw=pts.reduce((q,p)=>q+p.w,0); if(!sw) return null;
  const sx=pts.reduce((q,p)=>q+p.elev*p.w,0);
  const sy=pts.reduce((q,p)=>q+p.temp*p.w,0);
  const sxx=pts.reduce((q,p)=>q+p.elev*p.elev*p.w,0);
  const sxy=pts.reduce((q,p)=>q+p.elev*p.temp*p.w,0);
  const den=sw*sxx-sx*sx; if(Math.abs(den)<1e-6) return null;
  const b=(sw*sxy-sx*sy)/den, a=(sy-b*sx)/sw;
  return {a,b};
}
const ageStr = (s)=>{ const m=Math.round(s/60); return m<60?m+'m':(Math.floor(m/60)+'h'+(m%60)+'m'); };

(async()=>{
  const res = await Promise.all(TILES.map(([z,x,y])=>
    fetch(`/pw-obs/tile/${z}/${x}/${y}.json?t=`+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)));
  const tracks={}; let okTiles=0;
  for(const d of res){ if(d&&d.tracks){ okTiles++; Object.assign(tracks,d.tracks); } }
  const now=Date.now()/1000;

  const rows=[];
  for(const s of STATIONS){
    const tr=tracks[s.trackId];
    if(!tr){ rows.push({...s, missing:true}); continue; }
    const meta=parseMeta(tr.t); const last=latest(tr);
    rows.push({ ...s, elev:meta.elev, temp:last?last.temp:null, ts:last?last.ts:null });
  }
  const usable=rows.filter(r=>r.elev!=null && r.temp!=null).map(r=>({elev:r.elev,temp:r.temp,w:r.w}));
  const fit=wfit(usable);

  const sum=document.getElementById('summary');
  if(!fit){
    sum.innerHTML=`<span class="bad">No fit (need ≥2 stations with temp+elev). tiles ok: ${okTiles}/${TILES.length}</span>`;
  } else {
    const lapse=(-fit.b*1000).toFixed(2);
    const fl = fit.b<0 ? Math.round(-fit.a/fit.b) : null;
    sum.innerHTML =
      `tiles ok: <b>${okTiles}/${TILES.length}</b> · stations used: <b>${usable.length}</b><br>`+
      `lapse: <b>${lapse} °C/1000m</b> &nbsp; slope b = <b>${fit.b.toExponential(2)}</b><br>`+
      (fit.b<0
        ? `<span class="ok">✓ slope negative → ramp renders. 0°C level = ${fl} m</span>`
        : `<span class="bad">✗ slope ≥ 0 (warmer with height / inversion) → ramp is hidden. THIS is why it's broken.</span>`);
  }

  const tb=document.querySelector('#tbl tbody');
  tb.innerHTML = rows.map(r=>{
    if(r.missing) return `<tr><td class="name">${r.name}</td><td colspan="6" class="bad">not in tiles (${r.trackId})</td></tr>`;
    const fitT = (fit&&r.elev!=null)? fit.a+fit.b*r.elev : null;
    const delta = (fitT!=null&&r.temp!=null)? (r.temp-fitT) : null;
    const stale = r.ts!=null && (now-r.ts)>90*60;
    const outlier = delta!=null && Math.abs(delta)>3;
    return `<tr class="${stale?'stale':''} ${outlier?'out':''}">
      <td class="name">${r.name}</td>
      <td>${r.elev??'—'}</td>
      <td>${r.temp==null?'—':r.temp.toFixed(1)}</td>
      <td>${r.ts==null?'—':ageStr(now-r.ts)}</td>
      <td>${fitT==null?'—':fitT.toFixed(1)}</td>
      <td>${delta==null?'—':(delta>0?'+':'')+delta.toFixed(1)}</td>
      <td>${r.w}</td></tr>`;
  }).join('');
})();
</script>
</body>
</html>
