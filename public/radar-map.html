<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZ Rain Radar — 3D</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.min.css" />
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1c30; color: #fff; }
  #map-screen { position: fixed; inset: 0; }
  #map { width: 100%; height: 100%; }

  .maplibregl-ctrl-top-left .maplibregl-ctrl-group {
    background: rgba(20,20,20,0.78); backdrop-filter: blur(14px);
    border: none; border-radius: 9999px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  .maplibregl-ctrl-top-left .maplibregl-ctrl-group button { background-color: transparent; width: 32px; height: 32px; }
  .maplibregl-ctrl-top-left .maplibregl-ctrl-group button + button { border-top: 1px solid rgba(255,255,255,0.15); }
  .maplibregl-ctrl-top-left .maplibregl-ctrl-group button:hover { background-color: rgba(255,255,255,0.15); }
  .maplibregl-ctrl-top-left .maplibregl-ctrl-icon { filter: invert(1) brightness(1.6); }

  /* ── Timeline scrubber — same recipe as whakapapa-snow-forecast.html's #timeline ── */
  #timeline {
    position: absolute; left: 20px; right: 20px; bottom: 20px; z-index: 10;
    display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(14px);
    border-radius: 30px; padding: 10px 18px; box-shadow: 0 6px 26px rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  #timeline.ready { opacity: 1; pointer-events: auto; }
  #tl-play {
    flex-shrink: 0; background: rgba(255,255,255,0.14); color: #fff; border: none;
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #tl-play:hover { background: rgba(255,255,255,0.26); }
  #tl-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: rgba(255,255,255,0.25);
    cursor: pointer; outline: none;
  }
  #tl-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer; border: 3px solid #333;
  }
  #tl-slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer; border: 3px solid #333;
  }
  .tl-step {
    flex-shrink: 0; background: transparent; color: rgba(255,255,255,0.85); border: none;
    font-size: 1.2rem; cursor: pointer; width: 26px; height: 38px;
    display: flex; align-items: center; justify-content: center;
  }
  .tl-step:hover:not(:disabled) { color: #fff; }
  .tl-step:disabled { opacity: 0.3; cursor: default; }
  #tl-label {
    flex-shrink: 0; color: #fff; font-size: 0.78rem; font-weight: 600;
    min-width: 120px; text-align: right; font-variant-numeric: tabular-nums;
  }
  #tl-live-badge {
    flex-shrink: 0; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.04em;
    color: #f87171; margin-right: -4px; opacity: 0; transition: opacity 0.2s;
  }
  #tl-live-badge.on { opacity: 1; }

  @media (max-width: 640px) {
    #timeline { left: 10px; right: 10px; padding: 8px 12px; gap: 8px; }
    #tl-label { min-width: 0; font-size: 0.7rem; }
  }

  #banner {
    position: absolute; inset: 0; z-index: 5; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 40px; color: rgba(255,255,255,0.6); font-size: 0.85rem; line-height: 1.5;
    background: #0f1c30; transition: opacity 0.3s ease;
  }
  #banner.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="map-screen">
  <div id="map"></div>
  <div id="banner">Loading live radar…</div>
  <div id="timeline">
    <span id="tl-live-badge">● LIVE</span>
    <button id="tl-play">▶</button>
    <button class="tl-step" id="tl-prev">‹</button>
    <input type="range" id="tl-slider" min="0" max="0" step="1" value="0">
    <button class="tl-step" id="tl-next">›</button>
    <span id="tl-label">—</span>
  </div>
</div>

<script>
// Hand-calibrated against the MetService/weatherwatch.co.nz national radar
// composite — see src/radarCalibration.js (source of truth; mirrored here
// since this is a static page outside the React build) for how these were
// derived (coastline auto-align + manual corner drag in public/radar-test/).
const RADAR_CALIBRATION = {
  crop: { topPct: 0, bottomPct: 0, leftPct: 0, rightPct: 0 },
  isolate: {
    minSaturation: 45, minBrightness: 15, maxBrightness: 100,
    hueBands: { yellowGold: true, green: true, blue: true, redPurple: true },
  },
  // NE/SE longitudes are intentionally >180° (unwrapped) — see the long
  // comment in src/radarCalibration.js. Wrapping these to signed ±180°
  // stretches the drape into a squashed strip clear across the Mercator
  // projection instead of a small patch over NZ.
  corners: [
    [164.443359375, -32.49123028794758],
    [181.82373046875, -32.37996146435729],
    [182.13134765625, -48.54570549184744],
    [164.2236328125, -48.60385760823253],
  ],
  opacity: 0.9,
};

// ---------- 3D NZ base map ----------
let map = null;
try {
  if (typeof maplibregl === 'undefined') throw new Error('maplibre-gl failed to load from CDN');
  map = new maplibregl.Map({
    container: 'map',
    center: [172.8, -41.2],
    zoom: 5.3,
    pitch: 48,
    bearing: 0,
    maxPitch: 85,
    attributionControl: false,
    style: {
      version: 8,
      sources: {
        terrain: { type: 'raster-dem', url: 'https://tiles.mapterhorn.com/tilejson.json', tileSize: 512 },
        satellite: {
          type: 'raster',
          tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
          tileSize: 256,
          attribution: 'Tiles &copy; Esri'
        }
      },
      layers: [
        { id: 'background', type: 'background', paint: { 'background-color': '#0b1a2e' } },
        { id: 'satellite', type: 'raster', source: 'satellite', paint: { 'raster-opacity': 1, 'raster-saturation': -0.2 } },
        { id: 'hillshade', type: 'hillshade', source: 'terrain', paint: { 'hillshade-exaggeration': 0.5 } }
      ],
      terrain: { source: 'terrain', exaggeration: 1.4 }
    }
  });
  map.addControl(new maplibregl.NavigationControl(), 'top-left');
} catch (e) {
  console.error('Map init failed:', e);
  showBanner('Map unavailable — the terrain/satellite tile service could not be reached.');
}

function showBanner(text) {
  const b = document.getElementById('banner');
  b.textContent = text;
  b.classList.remove('hidden');
  // The parent (RadarMap3D in App.jsx) keeps this iframe at opacity:0 until it
  // hears 'map-ready', so it can fade in cleanly instead of flashing a blank
  // frame. An error banner is just as much a "stable thing to show the user"
  // as a working map — without this, a failure here would stay invisible
  // forever behind the parent's opacity:0.
  window.parent.postMessage({ type: 'map-ready' }, '*');
}
function hideBanner() {
  document.getElementById('banner').classList.add('hidden');
}

// ---------- live feed ----------
// MetService's national rain radar composite (as used by weatherwatch.co.nz),
// published as timestamped frames on an S3 bucket with no ListBucket
// permission (so the latest frame has to be predicted/probed, not listed)
// and no CORS headers (so frames are fetched through the /radar-feed proxy —
// see vite.config.js / vercel.json — rather than a direct cross-origin
// <img src>, since isolating rain pixels needs canvas pixel access).
// See src/radarFeed.js for the full writeup of the slot schedule.
const SLOT_MINUTES = [5, 13, 20, 28, 35, 43, 50, 58];
// Regional single-site frames publish on their own schedule -- measured by
// probing every minute for an hour and a half against the real feed:
// 5,12,20,27,35,42,50,57 (7/8min alternating, same as national, but shifted
// by a minute at 4 of the 8 slots). Reusing SLOT_MINUTES for regional
// fetches only ever caught the 4 slots that happen to coincide (5/20/35/50),
// silently missing the other real frame every cycle.
const REGIONAL_SLOT_MINUTES = [5, 12, 20, 27, 35, 42, 50, 57];
const pad2 = (n) => String(n).padStart(2, '0');
function filenameFor(date) {
  return '' + date.getUTCFullYear() + pad2(date.getUTCMonth() + 1) + pad2(date.getUTCDate()) + pad2(date.getUTCHours()) + pad2(date.getUTCMinutes());
}
function candidateTimestamps(count, from, slotMinutes = SLOT_MINUTES) {
  const out = [];
  let cursor = new Date(from || new Date());
  while (out.length < count) {
    const hourMinutes = slotMinutes.filter((m) => m <= cursor.getUTCMinutes());
    let slot;
    if (hourMinutes.length > 0) {
      slot = new Date(cursor);
      slot.setUTCMinutes(hourMinutes[hourMinutes.length - 1], 0, 0);
    } else {
      slot = new Date(cursor);
      slot.setUTCHours(slot.getUTCHours() - 1, slotMinutes[slotMinutes.length - 1], 0, 0);
    }
    out.push(filenameFor(slot));
    cursor = new Date(slot.getTime() - 60000);
  }
  return out;
}
function frameUrl(ts) { return `/radar-feed/${ts}.gif`; }
function tsToDate(ts) {
  return new Date(Date.UTC(+ts.slice(0, 4), +ts.slice(4, 6) - 1, +ts.slice(6, 8), +ts.slice(8, 10), +ts.slice(10, 12)));
}
function formatTs(ts) {
  return tsToDate(ts).toLocaleString('en-NZ', { weekday: 'short', hour: '2-digit', minute: '2-digit' });
}

// ---------- crop + HSV isolate (same pipeline as public/radar-test/) ----------
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
    if (h < 0) h += 360;
  }
  return [h, max === 0 ? 0 : (d / max) * 100, max * 100];
}
function hueAllowed(h, isolate) {
  const bands = isolate.hueBands;
  if (bands.yellowGold && h >= 35 && h < 70) return true;
  if (bands.green && h >= 70 && h < 160) return true;
  if (bands.blue && h >= 160 && h < 280) return true;
  if (bands.redPurple && (h >= 280 || h < 35)) return true;
  return false;
}
function cropAndIsolate(img, calibration) {
  const { crop, isolate } = calibration || RADAR_CALIBRATION;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const top = Math.round(ih * crop.topPct / 100), bottom = Math.round(ih * crop.bottomPct / 100);
  const left = Math.round(iw * crop.leftPct / 100), right = Math.round(iw * crop.rightPct / 100);
  const cw = Math.max(1, iw - left - right), ch = Math.max(1, ih - top - bottom);
  const canvas = document.createElement('canvas');
  canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, left, top, cw, ch, 0, 0, cw, ch);
  const imgData = ctx.getImageData(0, 0, cw, ch);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const [h, s, v] = rgbToHsv(d[i], d[i + 1], d[i + 2]);
    const isRain = s >= isolate.minSaturation && v >= isolate.minBrightness && v <= isolate.maxBrightness && hueAllowed(h, isolate);
    if (!isRain) d[i + 3] = 0;
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

// Feathers a regional overlay's alpha down to 0 near the edge of its frame,
// so it hands off to the national composite underneath instead of cutting
// off hard right where its own data (and the real single-site radar's
// return quality, which genuinely degrades near max range) runs out.
// Approximates the scan's radius as half the shorter canvas dimension,
// since the exact circle isn't independently calibrated per region yet.
function applyRadialFade(canvas, fadeStartFrac = 0.82) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const maxR = Math.min(w, h) / 2;
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (d[i + 3] === 0) continue;
      const distFrac = Math.hypot(x - cx, y - cy) / maxR;
      if (distFrac > fadeStartFrac) {
        const fade = Math.max(0, 1 - (distFrac - fadeStartFrac) / (1 - fadeStartFrac));
        d[i + 3] = Math.round(d[i + 3] * fade);
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

// Clears the national frame's alpha wherever a regional overlay covers it,
// mirroring applyRadialFade's own fade curve so the two hand off smoothly
// instead of stacking (which looked like doubled/ghosted rain wherever the
// two didn't align exactly) or leaving a mismatched hard seam.
//
// Approximates the national quad as an axis-aligned lat/lon box (ignoring
// its small hand-calibrated skew) and each region as an ellipse centered on
// its own quad's midpoint — good enough for a soft hole, not a survey.
function punchRegionalHoles(canvas, nationalQuad) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const nLons = nationalQuad.map((c) => c[0]), nLats = nationalQuad.map((c) => c[1]);
  const minLon = Math.min(...nLons), maxLon = Math.max(...nLons);
  const minLat = Math.min(...nLats), maxLat = Math.max(...nLats);

  const holes = REGIONAL_KEYS.map((region) => {
    const corners = REGIONAL_CALIBRATIONS[region].corners;
    const lons = corners.map((c) => c[0]), lats = corners.map((c) => c[1]);
    return {
      centerLon: (Math.min(...lons) + Math.max(...lons)) / 2,
      centerLat: (Math.min(...lats) + Math.max(...lats)) / 2,
      radiusLon: (Math.max(...lons) - Math.min(...lons)) / 2,
      radiusLat: (Math.max(...lats) - Math.min(...lats)) / 2,
    };
  });

  const fadeStartFrac = 0.82; // matches applyRadialFade, so the fade zones line up
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let y = 0; y < h; y++) {
    const lat = maxLat - (y / h) * (maxLat - minLat);
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (d[i + 3] === 0) continue;
      const lon = minLon + (x / w) * (maxLon - minLon);
      for (const hole of holes) {
        const distFrac = Math.hypot((lon - hole.centerLon) / hole.radiusLon, (lat - hole.centerLat) / hole.radiusLat);
        if (distFrac > 1) continue;
        const keep = distFrac <= fadeStartFrac ? 0 : (distFrac - fadeStartFrac) / (1 - fadeStartFrac);
        d[i + 3] = Math.round(d[i + 3] * keep);
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

async function fetchAndProcessFrame(ts) {
  const res = await fetch(frameUrl(ts));
  if (!res.ok) return null;
  const blob = await res.blob();
  const blobUrl = URL.createObjectURL(blob);
  try {
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = blobUrl;
    });
    const canvas = punchRegionalHoles(cropAndIsolate(img), liveCorners);
    return { timestamp: ts, dataUrl: canvas.toDataURL('image/png') };
  } finally {
    URL.revokeObjectURL(blobUrl);
  }
}

// ---------- regional overlays — see src/radarRegionalCalibration.js ----------
// Higher-resolution single-site scans draped on top of the national
// composite, each feathered at the edge (applyRadialFade) so it hands off
// rather than cutting off hard. Mirrored here (not imported — this is a
// static page outside the build) from src/radarRegionalCalibration.js; keep
// both in sync by hand. Not yet colour-normalized against the national
// composite's palette (see chat — a real difference, deferred).
const REGIONAL_CALIBRATIONS = {
  westland: {
    crop: { topPct: 0, bottomPct: 0, leftPct: 0, rightPct: 21 },
    isolate: {
      minSaturation: 15, minBrightness: 20, maxBrightness: 100,
      hueBands: { yellowGold: true, green: true, blue: true, redPurple: true },
    },
    corners: [
      [167.7392578125, -40.396764305572034],
      [174.61669921875, -39.926588421909436],
      [175.0341796875, -45.50634690108341],
      [167.200927734375, -45.34442410452239],
    ],
    opacity: 0.9,
  },
  canterbury: {
    crop: { topPct: 0, bottomPct: 0, leftPct: 0, rightPct: 21 },
    isolate: {
      minSaturation: 36, minBrightness: 30, maxBrightness: 100,
      hueBands: { yellowGold: true, green: true, blue: true, redPurple: true },
    },
    corners: [
      [168.37646484375, -40.99648401437788],
      [175.75927734375, -41.04621681452063],
      [176.02294921875, -46.54374960273856],
      [168.1787109375, -46.392411189814645],
    ],
    opacity: 0.9,
  },
  bayofplenty: {
    crop: { topPct: 0, bottomPct: 0, leftPct: 0, rightPct: 21 },
    isolate: {
      minSaturation: 34, minBrightness: 28, maxBrightness: 100,
      hueBands: { yellowGold: true, green: true, blue: true, redPurple: true },
    },
    corners: [
      [172.68310546875, -35.31736632923786],
      [179.5166015625, -35.33529320309327],
      [179.593505859375, -40.71395582628604],
      [172.540283203125, -40.72228267283148],
    ],
    opacity: 0.9,
  },
  otago: {
    crop: { topPct: 0, bottomPct: 0, leftPct: 0, rightPct: 21 },
    isolate: {
      minSaturation: 34, minBrightness: 28, maxBrightness: 100,
      hueBands: { yellowGold: true, green: true, blue: true, redPurple: true },
    },
    corners: [
      [166.640625, -42.95642251107333],
      [174.19921875, -42.98857645832182],
      [175.78125, -47.69497434186281],
      [166.409912109375, -48.26856911296433],
    ],
    opacity: 0.9,
  },
};
const REGIONAL_KEYS = Object.keys(REGIONAL_CALIBRATIONS);
function regionalFrameUrl(region, ts) { return `/radar-feed-regional/${region}/${ts}.gif`; }

async function fetchAndProcessRegionalFrame(region, ts) {
  const res = await fetch(regionalFrameUrl(region, ts));
  if (!res.ok) return null;
  const blob = await res.blob();
  const blobUrl = URL.createObjectURL(blob);
  try {
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = blobUrl;
    });
    const canvas = applyRadialFade(cropAndIsolate(img, REGIONAL_CALIBRATIONS[region]));
    return { timestamp: ts, dataUrl: canvas.toDataURL('image/png') };
  } finally {
    URL.revokeObjectURL(blobUrl);
  }
}

function drawRegionalFrame(region, frame) {
  if (!map || !frame) return;
  const srcId = `radar-regional-src-${region}`, layerId = `radar-regional-layer-${region}`;
  if (map.getSource(srcId)) {
    map.getSource(srcId).updateImage({ url: frame.dataUrl });
  } else if (map.getLayer('radar-layer')) {
    map.addSource(srcId, { type: 'image', url: frame.dataUrl, coordinates: REGIONAL_CALIBRATIONS[region].corners });
    map.addLayer({
      id: layerId, type: 'raster', source: srcId,
      paint: { 'raster-opacity': REGIONAL_CALIBRATIONS[region].opacity, 'raster-fade-duration': 0 },
    }); // added after 'radar-layer' exists, so MapLibre stacks it on top by default
    // A second raster layer added on top of an already-draped one hasn't
    // reliably picked up terrain compositing on its own (rendered flat
    // instead of following the terrain mesh, unlike radar-layer, the first
    // one) — toggling terrain off/on forces MapLibre to rebuild its
    // terrain-drape render targets including whatever layers exist right now.
    const terrain = map.getTerrain();
    if (terrain) { map.setTerrain(null); map.setTerrain(terrain); }
  } else {
    setTimeout(() => drawRegionalFrame(region, frame), 200);
  }
}

// ---------- regional frame history, synced to the national timeline ----------
// Previously this only ever fetched "the latest" single regional frame, so
// scrubbing/playing the national timeline animated radar-layer but left the
// regional layer frozen on whatever was last fetched — no history to sync
// against. Now each region keeps its own rolling window (like national
// `frames`) and drawFrame() looks up each region's closest-in-time frame on
// every national frame change, so all layers move together.
let regionalFrames = {}; // { [region]: [{ timestamp, dataUrl }], oldest -> newest }
REGIONAL_KEYS.forEach((region) => { regionalFrames[region] = []; });

// Uses REGIONAL_SLOT_MINUTES (the real measured schedule, not the national
// one) so this now hits every actual regional frame instead of every second
// one; a small overfetch margin still covers normal publish lag near "now".
async function loadInitialRegionalFrames(region) {
  const found = [];
  for (const ts of candidateTimestamps(MAX_FRAMES * 2, undefined, REGIONAL_SLOT_MINUTES)) {
    if (found.length >= MAX_FRAMES) break;
    const frame = await fetchAndProcessRegionalFrame(region, ts).catch(() => null);
    if (frame) found.push(frame);
  }
  regionalFrames[region] = found.reverse(); // oldest -> newest
  syncRegionalToCurrentFrame();
}

async function pollForNewRegionalFrames(region) {
  const existing = regionalFrames[region];
  if (existing.length === 0) return;
  const latestKnown = existing[existing.length - 1].timestamp;
  const candidates = candidateTimestamps(8, undefined, REGIONAL_SLOT_MINUTES).filter((ts) => ts > latestKnown).reverse();
  for (const ts of candidates) {
    const frame = await fetchAndProcessRegionalFrame(region, ts).catch(() => null);
    if (!frame) continue;
    existing.push(frame);
    if (existing.length > MAX_FRAMES) existing.shift();
  }
  syncRegionalToCurrentFrame(); // re-draw whichever regional frame matches the currently-shown national one
}

// Finds the given region's frame closest in time to a national-frame
// timestamp — the feeds don't share timestamps (different cadence/offset
// per region), so this is a nearest-match, not an exact one.
function nearestRegionalFrame(region, ts) {
  const list = regionalFrames[region];
  if (!list || list.length === 0) return null;
  const targetMs = tsToDate(ts).getTime();
  let best = list[0], bestDiff = Infinity;
  for (const f of list) {
    const diff = Math.abs(tsToDate(f.timestamp).getTime() - targetMs);
    if (diff < bestDiff) { bestDiff = diff; best = f; }
  }
  return best;
}

function syncRegionalToCurrentFrame() {
  const current = frames[currentIndex];
  if (!current) return;
  for (const region of REGIONAL_KEYS) {
    const match = nearestRegionalFrame(region, current.timestamp);
    if (match) drawRegionalFrame(region, match);
  }
}

// ---------- frames + timeline state ----------
let frames = [];       // [{ timestamp, dataUrl }], oldest -> newest
let currentIndex = -1;
let playTimer = null;
const FRAME_INTERVAL_MS = 450;
const MAX_FRAMES = 12;
const REFRESH_POLL_MS = 90000;

// Fine-tuning: append ?calibrate to the URL (e.g. /radar on the live site,
// or directly on /radar-map.html) to drag the 4 corner pins on THIS exact
// live view — same frame, same coastline reference, no separate tool or
// re-finding a frame. See enableCalibrationMode() below.
const CALIBRATE = new URLSearchParams(location.search).has('calibrate');
let liveCorners = RADAR_CALIBRATION.corners.map((c) => [...c]);

function drawFrame(i) {
  if (!map || !frames[i]) return;
  currentIndex = i;
  const f = frames[i];
  if (!map.getSource('radar-src')) {
    map.addSource('radar-src', { type: 'image', url: f.dataUrl, coordinates: liveCorners });
    map.addLayer({
      id: 'radar-layer', type: 'raster', source: 'radar-src',
      paint: { 'raster-opacity': RADAR_CALIBRATION.opacity, 'raster-fade-duration': 0 }
    });
    if (CALIBRATE) enableCalibrationMode();
  } else {
    map.getSource('radar-src').updateImage({ url: f.dataUrl });
  }
  document.getElementById('tl-slider').value = i;
  document.getElementById('tl-prev').disabled = i <= 0;
  document.getElementById('tl-next').disabled = i >= frames.length - 1;
  document.getElementById('tl-label').textContent = formatTs(f.timestamp);
  document.getElementById('tl-live-badge').classList.toggle('on', i === frames.length - 1);
  syncRegionalToCurrentFrame();
}

// Draggable corner pins + a "copy calibration" button, gated behind
// ?calibrate so normal visitors never see it. Drag a pin to nudge that
// corner; the drape updates live via setCoordinates. When it looks right,
// click "Copy calibration JSON" and paste it back to lock it in permanently
// (this only adjusts the live page's in-memory corners, nothing persists on
// its own — same as the original public/radar-test/ workflow, just applied
// directly to production's real view instead of a separate calibration tool).
function enableCalibrationMode() {
  const labels = ['NW', 'NE', 'SE', 'SW'];
  liveCorners.forEach((c, i) => {
    const el = document.createElement('div');
    el.textContent = labels[i];
    el.style.cssText = 'background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:3px 6px;border-radius:4px;box-shadow:0 0 0 2px #fff;cursor:grab;user-select:none;';
    const marker = new maplibregl.Marker({ element: el, draggable: true }).setLngLat(c).addTo(map);
    marker.on('drag', () => {
      const ll = marker.getLngLat();
      liveCorners[i] = [ll.lng, ll.lat];
      map.getSource('radar-src').setCoordinates(liveCorners);
    });
  });

  const panel = document.createElement('div');
  panel.style.cssText = 'position:absolute;top:16px;right:16px;z-index:20;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-radius:10px;padding:12px;max-width:220px;font-size:0.72rem;color:#fff;line-height:1.4;';
  panel.innerHTML = `
    <div style="font-weight:700;margin-bottom:6px;">Calibration mode</div>
    <div style="color:rgba(255,255,255,0.65);margin-bottom:8px;">Drag the red pins to fit the coastline, then copy the result and paste it back to lock it in.</div>
    <button id="calCopy" style="width:100%;background:#2563eb;color:#fff;border:none;border-radius:6px;padding:7px;font-size:0.75rem;font-weight:600;cursor:pointer;">Copy calibration JSON</button>
    <div id="calStatus" style="margin-top:6px;color:#7ec8ff;min-height:14px;"></div>
  `;
  document.getElementById('map-screen').appendChild(panel);
  document.getElementById('calCopy').addEventListener('click', async () => {
    const config = {
      crop: RADAR_CALIBRATION.crop,
      isolate: RADAR_CALIBRATION.isolate,
      corners: liveCorners,
      opacity: RADAR_CALIBRATION.opacity,
    };
    const json = JSON.stringify(config, null, 2);
    const statusEl = document.getElementById('calStatus');
    try {
      await navigator.clipboard.writeText(json);
      statusEl.textContent = 'Copied — paste it back to lock it in.';
    } catch (e) {
      statusEl.textContent = 'Clipboard blocked: ' + json;
    }
  });
}

function stepFrame(delta) {
  stopPlay();
  drawFrame(Math.max(0, Math.min(frames.length - 1, currentIndex + delta)));
}

function togglePlay() {
  if (playTimer) stopPlay(); else startPlay();
}
function startPlay() {
  if (frames.length < 2) return;
  if (currentIndex >= frames.length - 1) drawFrame(0); // restart from the beginning
  document.getElementById('tl-play').textContent = '⏸';
  playTimer = setInterval(() => {
    if (currentIndex >= frames.length - 1) { stopPlay(); return; }
    drawFrame(currentIndex + 1);
  }, FRAME_INTERVAL_MS);
}
function stopPlay() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  document.getElementById('tl-play').textContent = '▶';
}

document.getElementById('tl-play').addEventListener('click', togglePlay);
document.getElementById('tl-prev').addEventListener('click', () => stepFrame(-1));
document.getElementById('tl-next').addEventListener('click', () => stepFrame(1));
document.getElementById('tl-slider').addEventListener('input', (e) => {
  stopPlay();
  drawFrame(parseInt(e.target.value, 10));
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'TEXTAREA' || (ae.tagName === 'INPUT' && ae.type === 'text'))) return;
    e.preventDefault();
    togglePlay();
  }
});

// ---------- load + live refresh ----------
async function loadInitialFrames() {
  const found = [];
  for (const ts of candidateTimestamps(20)) {
    if (found.length >= MAX_FRAMES) break;
    const frame = await fetchAndProcessFrame(ts).catch(() => null);
    if (frame) found.push(frame);
  }
  if (found.length === 0) {
    showBanner('No live radar frames available right now — the feed may be temporarily down. Try reloading in a few minutes.');
    return;
  }
  frames = found.reverse(); // oldest -> newest
  document.getElementById('tl-slider').max = frames.length - 1;
  drawFrame(frames.length - 1);
  document.getElementById('timeline').classList.add('ready');
  hideBanner();
  window.parent.postMessage({ type: 'map-ready' }, '*');
}

// Polls for a newer frame than the one we already have; if the user is
// currently viewing the latest frame ("live"), auto-advances to it so
// playback tracks reality without yanking the view if they've scrubbed back.
async function pollForNewFrame() {
  if (frames.length === 0) return;
  const latestKnown = frames[frames.length - 1].timestamp;
  const candidates = candidateTimestamps(4).filter((ts) => ts > latestKnown).reverse(); // oldest-of-the-new-ones first
  for (const ts of candidates) {
    const frame = await fetchAndProcessFrame(ts).catch(() => null);
    if (!frame) continue;
    const wasAtLive = currentIndex === frames.length - 1 && !playTimer;
    const currentTs = frames[currentIndex]?.timestamp;
    frames.push(frame);
    if (frames.length > MAX_FRAMES) frames.shift();
    document.getElementById('tl-slider').max = frames.length - 1;
    if (wasAtLive) {
      drawFrame(frames.length - 1);
    } else {
      // keep the scrub position pointing at the same frame it was on, even
      // if an older one fell off the front of the MAX_FRAMES window
      const idx = frames.findIndex((f) => f.timestamp === currentTs);
      currentIndex = idx >= 0 ? idx : 0;
      document.getElementById('tl-slider').value = currentIndex;
      document.getElementById('tl-prev').disabled = currentIndex <= 0;
      document.getElementById('tl-next').disabled = currentIndex >= frames.length - 1;
    }
  }
}

function init() {
  loadInitialFrames();
  setInterval(pollForNewFrame, REFRESH_POLL_MS);
  // Needs 'radar-layer' to already exist as a stacking anchor —
  // loadInitialFrames() runs first in the same tick, and drawRegionalFrame()
  // (called from syncRegionalToCurrentFrame() once these resolve) retries if
  // it's not there yet. Each region loads/polls independently so one being
  // slow or unavailable doesn't hold up the others.
  REGIONAL_KEYS.forEach((region) => {
    loadInitialRegionalFrames(region);
    setInterval(() => pollForNewRegionalFrames(region), REFRESH_POLL_MS);
  });
}

// Only start fetching/animating frames once there's an actual map to drape
// them onto — if maplibre or the tile hosts are unreachable, the catch block
// above already put a clear message in #banner; leave it showing rather than
// fetching frames nothing will display and then hiding the error underneath it.
if (map) map.on('load', init);
</script>

</body>
</html>
