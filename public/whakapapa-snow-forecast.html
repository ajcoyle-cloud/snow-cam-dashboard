}

// Shared by the raw Snow Test trial toggle below and the settings-cog
// "Winter snow" toggle further down — adds the source/layer if missing, or
// (forceRefresh) removes and re-adds them so tiles regenerate against
// whatever snowOverlayParams currently holds. registerSnowOverlayProtocol()
// is idempotent, safe to call every time.
function addOrRefreshSnowOverlayLayer(forceRefresh) {
  registerSnowOverlayProtocol();
  if (forceRefresh) {
    if (map.getLayer('snow-overlay-layer')) map.removeLayer('snow-overlay-layer');
    if (map.getSource('snow-overlay')) map.removeSource('snow-overlay');
  }
  if (!map.getSource('snow-overlay')) {
    map.addSource('snow-overlay', { type: 'raster', tiles: ['snowslope://{z}/{x}/{y}'], tileSize: 512 });
  }
  if (!map.getLayer('snow-overlay-layer')) {
    map.addLayer({
      id: 'snow-overlay-layer', type: 'raster', source: 'snow-overlay',
      paint: { 'raster-opacity': snowOverlayParams.opacity },
    }, map.getLayer('resort-lifts-line') ? 'resort-lifts-line' : undefined);
  }
}

let snowOverlayActive = false;
function toggleSnowOverlay() {
  if (!map) return;
  snowOverlayActive = !snowOverlayActive;
  const btn = document.getElementById('snow-overlay-toggle');
  if (btn) btn.classList.toggle('active', snowOverlayActive);
  const controls = document.getElementById('snow-overlay-controls');
  if (controls) controls.style.display = snowOverlayActive ? 'flex' : 'none';
  if (snowOverlayActive) {
    initSnowOverlayControls();
    addOrRefreshSnowOverlayLayer(false);
  } else if (map.getLayer('snow-overlay-layer')) {
    map.removeLayer('snow-overlay-layer');
  }
}

// ── High-Res tab: wind-driven orographic snow overlay ───────────────────
// Own dedicated tab (?highres=1, App.jsx's HighResSnowPage/NAV_ITEMS) —
// deliberately not folded into the regular Map tab or Snow Test, since this
// is an unvalidated physics proxy, not yet something every Map visitor
// should see. Real per-pixel spatial redistribution of the current hour's
// forecast snowfall, instead of buildSnowRamp's flat elevation-only tint (which
// paints every point at a given elevation identically, with no windward/lee
// difference at all). For each DEM pixel this computes the forced-ascent
// vertical velocity w = U·(dh/dx) + V·(dh/dy) — the real wind VECTOR
// (speed + direction, from forecastHours[currentIndex]) dotted against the
// real terrain gradient VECTOR sampled from the same terrain-rgb DEM tiles
// dark-terrain/contours already use — then scales that hour's snowfall by a
// tanh-saturating function of w, so windward slopes read heavier and lee
// slopes lighter. The wind vector itself is interpolated between the
// summit-level (700hPa) and base-level (850hPa) readings by each pixel's
// own DEM elevation, rather than applying the summit's (usually stronger)
// wind uniformly all the way down — see buildModelHours' windSpeedKmhBase/
// windDirDegBase. See the standalone proof-of-concept this was validated
// against before being wired up here (synthetic terrain + one real forecast
// hour, both produced the expected windward/lee pattern).
// Bold but limited colour steps (red=lee/least snow through orange/yellow/
// green to blue=windward/most snow) — hard-edged discrete bands, not a
// smooth interpolated gradient, so the map reads like a proper legend (a
// given colour = a given band) rather than a continuous blend. Originally
// an 8-stop smoothly-interpolated rainbow, but real (noisy, steep) DEM data
// pushed the multiplier to its extremes almost everywhere, so only the two
// end colours of that smooth ramp ever actually appeared — see
// orographicBoxBlur above, the real fix for that; this is a complementary
// change making whatever range of hues shows up easier to read at a glance.
const OROGRAPHIC_RAMP_BANDS = [
  [190, 40, 35],   // red — most lee
  [230, 130, 35],  // orange
  [230, 195, 55],  // yellow
  [110, 190, 90],  // green
  [55, 150, 190],  // cyan
  [70, 90, 210],   // blue — most windward
];
function orographicRampColor(t) {
  t = t < 0 ? 0 : t > 1 ? 1 : t;
  const n = OROGRAPHIC_RAMP_BANDS.length;
  const idx = Math.min(n - 1, Math.floor(t * n));
  return OROGRAPHIC_RAMP_BANDS[idx];
}

// ── Hillshade (natural terrain shading) for the orographic drape ────────────
// A single brightness factor per pixel from the classic sun-angle hillshade:
// the terrain's surface normal dotted with a fixed light direction. Applied
// by MULTIPLYING all three colour channels equally, so the drape's colour
// gradient (which hue means which snow multiplier) is completely untouched —
// only brightness changes with the shape of the land, giving lit slopes and
// shadowed gullies/lee faces the way a relief map or a photo at that sun
// angle would. Light from the NW at 45° elevation is the standard
// cartographic convention (reads as "lit from top-left"). Ambient keeps the
// darkest faces at HS_AMBIENT of full brightness rather than crushing them to
// black, so even deep-shadow terrain still shows its gradient colour.
const OROGRAPHIC_HS_AZIMUTH_DEG = 315;   // NW
const OROGRAPHIC_HS_ALTITUDE_DEG = 45;
const OROGRAPHIC_HS_AMBIENT = 0.55;      // darkest shaded faces = 55% brightness
const _hsAz = OROGRAPHIC_HS_AZIMUTH_DEG * Math.PI / 180;
const _hsAlt = OROGRAPHIC_HS_ALTITUDE_DEG * Math.PI / 180;
// Unit light vector in ENU (east, north, up). Azimuth is clockwise from north.
const OROGRAPHIC_HS_LX = Math.sin(_hsAz) * Math.cos(_hsAlt);
const OROGRAPHIC_HS_LY = Math.cos(_hsAz) * Math.cos(_hsAlt);
const OROGRAPHIC_HS_LZ = Math.sin(_hsAlt);
// gradEast/gradNorth are rise/run (dimensionless slope, same as used by the
// orographic-lift math), so the upward surface normal is (-gradEast,
// -gradNorth, 1). Returns a brightness multiplier in [HS_AMBIENT, 1].
function orographicHillshade(gradEast, gradNorth) {
  const nx = -gradEast, ny = -gradNorth, nz = 1;
  const nlen = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
  const dot = (nx * OROGRAPHIC_HS_LX + ny * OROGRAPHIC_HS_LY + nz * OROGRAPHIC_HS_LZ) / nlen;
  const lit = dot > 0 ? dot : 0; // self-shadowed faces clamp to fully in-shade
  return OROGRAPHIC_HS_AMBIENT + (1 - OROGRAPHIC_HS_AMBIENT) * lit;
}

// Box blur (radius in pixels) — flattens single-pixel DEM noise before the
// slope/gradient calculation, see its call site in the protocol below.
function orographicBoxBlur(src, size, radius) {
  const out = new Float32Array(size * size);
  for (let py = 0; py < size; py++) {
    for (let px = 0; px < size; px++) {
      let sum = 0, count = 0;
      for (let dy = -radius; dy <= radius; dy++) {
        const yy = py + dy; if (yy < 0 || yy >= size) continue;
        for (let dx = -radius; dx <= radius; dx++) {
          const xx = px + dx; if (xx < 0 || xx >= size) continue;
          sum += src[yy * size + xx]; count++;
        }
      }
      out[py * size + px] = sum / count;
    }
  }
  return out;
}

// ── Core orographic-lift math, shared between the raster tile protocol
// below and the click-to-probe handler (orographicProbeAt) — one
// implementation, so a tapped point's reported snowfall always matches the
// colour actually rendered there, not two independently-written formulas
// that could quietly drift apart. ─────────────────────────────────────────
const OROGRAPHIC_W_REF = 1.8;
const OROGRAPHIC_M_RANGE = 0.9;

function orographicWindVectorsForHour(hour) {
  const windSpeedMsTop = hour.windSpeedKmh / 3.6;
  const windToRadTop = (((hour.windDirDeg + 180) % 360) * Math.PI) / 180;
  const U_top = windSpeedMsTop * Math.sin(windToRadTop);
  const V_top = windSpeedMsTop * Math.cos(windToRadTop);
  // Falls back to the summit vector (uniform-with-elevation behaviour) when
  // base-level wind wasn't fetched/available (e.g. demo fallback data).
  let U_base = U_top, V_base = V_top;
  if (hour.windSpeedKmhBase != null && hour.windDirDegBase != null) {
    const windSpeedMsBase = hour.windSpeedKmhBase / 3.6;
    const windToRadBase = (((hour.windDirDegBase + 180) % 360) * Math.PI) / 180;
    U_base = windSpeedMsBase * Math.sin(windToRadBase);
    V_base = windSpeedMsBase * Math.cos(windToRadBase);
  }
  return { U_top, V_top, U_base, V_base };
}

function orographicWindAtElevation(vectors, elevHere) {
  const elevSpan = Math.max(1, LOC.summitElev - LOC.baseElev);
  const t = Math.max(0, Math.min(1, (elevHere - LOC.baseElev) / elevSpan));
  return {
    U: vectors.U_base + (vectors.U_top - vectors.U_base) * t,
    V: vectors.V_base + (vectors.V_top - vectors.V_base) * t,
  };
}

function orographicMultiplier(U, V, gradEast, gradNorth) {
  const w = U * gradEast + V * gradNorth; // m/s, +windward / -lee
  return 1 + OROGRAPHIC_M_RANGE * Math.tanh(w / OROGRAPHIC_W_REF); // ~0.1x - 1.9x
}

// Local terrain gradient at a real-world lng/lat, for the click-to-probe
// handler — 4 elevation samples via map.queryTerrainElevation (works at any
// point already covered by loaded terrain tiles, not tied to raw DEM pixel
// indices the way the raster protocol's own gradient is). offsetM is a
// similar real-world scale to the box-blur smoothing used when rendering
// the coloured overlay, so a tap reads the same "local terrain" area a
// finger-width covers rather than one noisy single point. 5m keeps that
// local — close to the width of a single cat track or narrow gully — while
// still averaging over a couple of DEM pixels, not just one raw sample.
function orographicSampleGradient(lngLat, offsetM = 5) {
  const latRad = (lngLat.lat * Math.PI) / 180;
  const dLat = offsetM / 111320;
  const dLng = offsetM / (111320 * Math.cos(latRad));
  const q = (lng, lat) => map.queryTerrainElevation({ lng, lat }, { exaggerated: false });
  const elevE = q(lngLat.lng + dLng, lngLat.lat);
  const elevW = q(lngLat.lng - dLng, lngLat.lat);
  const elevN = q(lngLat.lng, lngLat.lat + dLat);
  const elevS = q(lngLat.lng, lngLat.lat - dLat);
  if ([elevE, elevW, elevN, elevS].some((v) => v == null || isNaN(v))) return null;
  return {
    gradEast: (elevE - elevW) / (2 * offsetM),
    gradNorth: (elevN - elevS) / (2 * offsetM),
  };
}

let orographicSnowActive = false;
let orographicSnowProtocolRegistered = false;
function registerOrographicSnowProtocol() {
  if (orographicSnowProtocolRegistered) return;
  orographicSnowProtocolRegistered = true;
  maplibregl.addProtocol('orographicsnow', async (params) => {
    const [z, x, y] = params.url.replace('orographicsnow://', '').split('/').map(Number);
    const template = await getDemTileUrlTemplate();
    const demUrl = template.replace('{z}', z).replace('{x}', x).replace('{y}', y);
    const res = await fetch(demUrl);
    const blob = await res.blob();
    const bitmap = await createImageBitmap(blob);
    const size = bitmap.width;

    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0);
    const src = ctx.getImageData(0, 0, size, size).data;

    const elev = new Float32Array(size * size);
    for (let i = 0; i < size * size; i++) {
      elev[i] = decodeTerrainRGB(src[i * 4], src[i * 4 + 1], src[i * 4 + 2]);
    }
    // Single-pixel DEM noise makes the slope (adjacent-pixel differences)
    // flip direction chaotically and swing to extreme values pixel-to-pixel
    // — real terrain has genuine fine relief, but at that scale it saturated
    // the tanh in the multiplier below almost everywhere, collapsing the
    // colour ramp down to just its two end colours with no visible
    // transition between them (the reported bug). A small blur removes that
    // single-pixel jitter for the SLOPE calculation while the boundary/
    // elevation-band checks below still use the real, unsmoothed elevation.
    const elevSmooth = orographicBoxBlur(elev, size, 2);

    // Same per-column/per-row distance precompute as registerDarkTerrainProtocol,
    // for the depth-darken fog-alternative effect below.
    const lonForPx = new Float64Array(size);
    for (let px = 0; px < size; px++) lonForPx[px] = tilePixelToLonLat(x, y, z, px, 0, size)[0];

    // Read live so a timeline scrub (see openMapView's refreshOrographicSnow
    // call) regenerates this against whichever hour is now current, exactly
    // like buildSnowRamp does for the elevation-only layer.
    const hour = forecastHours[currentIndex];
    const out = ctx.createImageData(size, size);
    const validHour = hour && hour.windSpeedKmh != null && hour.windDirDeg != null && hour.freezingLevel != null && hour.snowfallMm != null;

    if (validHour) {
      const snowing = hour.snowfallMm >= SNOWFALL_THRESHOLD_MM;
      const boundary = snowing ? hour.freezingLevel - SNOW_OFFSET : hour.freezingLevel;
      const metersPerPixel = (156543.03392 * Math.cos(tileCenterLatRad(y, z))) / Math.pow(2, z) * (256 / size);

      // Wind vectors (summit/base) and the fixed multiplier normalisation —
      // see orographicWindVectorsForHour/OROGRAPHIC_W_REF/OROGRAPHIC_M_RANGE
      // above. Shared with the click-to-probe handler (orographicProbeAt)
      // so the number reported on tap always matches the colour rendered
      // at that exact point — one formula, not two that could drift apart.
      const windVectors = orographicWindVectorsForHour(hour);
      const M_LO = 1 - OROGRAPHIC_M_RANGE, M_HI = 1 + OROGRAPHIC_M_RANGE;
      const [flR, flG, flB] = darkTerrainActive ? [25, 55, 110] : [60, 130, 255];

      for (let py = 0; py < size; py++) {
        const ym1 = Math.max(0, py - 1), yp1 = Math.min(size - 1, py + 1);
        const rowLat = tilePixelToLonLat(x, y, z, 0, py, size)[1];
        const cosAvgLatRad = Math.cos(((LOC.lat + rowLat) / 2) * Math.PI / 180);
        for (let px = 0; px < size; px++) {
          const i = py * size + px;
          const o = i * 4;
          const elevHere = elev[i];
          if (elevHere < boundary) { out.data[o + 3] = 0; continue; }

          const distKm = approxDistanceKm(LOC.lat, LOC.lon, rowLat, lonForPx[px], cosAvgLatRad);
          const darken = 1 - depthDarkenFactor(distKm);

          if (!snowing) {
            // No active snowfall — same flat freezing-level tint as
            // buildSnowRamp's non-snowing branch. Wind-driven redistribution
            // only makes physical sense for falling snow, not a static
            // freezing-level highlight.
            out.data[o] = flR * darken; out.data[o + 1] = flG * darken; out.data[o + 2] = flB * darken;
            out.data[o + 3] = darkTerrainActive ? 38 : 51; // ~0.15 / 0.2 opacity
            continue;
          }

          // Base-to-summit wind gradient: this pixel's own elevation decides
          // where it sits between the two measured levels (clamped, so
          // terrain below base or above summit just uses that nearer level).
          const { U, V } = orographicWindAtElevation(windVectors, elevHere);

          const xm1 = Math.max(0, px - 1), xp1 = Math.min(size - 1, px + 1);
          const dzdx = (elevSmooth[py * size + xp1] - elevSmooth[py * size + xm1]) / (2 * metersPerPixel);
          const dzdyImg = (elevSmooth[yp1 * size + px] - elevSmooth[ym1 * size + px]) / (2 * metersPerPixel);
          const gradEast = dzdx, gradNorth = -dzdyImg;
          const multiplier = orographicMultiplier(U, V, gradEast, gradNorth); // ~0.1x - 1.9x

          // Colour (not opacity) is the primary signal now — every distinct
          // multiplier value gets a genuinely different hue off the rainbow
          // ramp above, so the windward/lee/ridge/gully pattern is legible
          // at a glance for this one hour, not just "more or less faint blue."
          const t = (multiplier - M_LO) / (M_HI - M_LO);
          const [cR, cG, cB] = orographicRampColor(t);
          // Natural hillshade (see orographicHillshade above) reuses this
          // pixel's own terrain gradient — a pure brightness factor, so the
          // colour gradient is unchanged; only light/shadow is added.
          const shade = orographicHillshade(gradEast, gradNorth);
          // Depth-darken fog alternative (see DEPTH_DARKEN_RADIUS_KM above) —
          // same resort-distance falloff as the dark-relief base layer, so
          // the whole scene (base + colour overlay) darkens toward the Alps
          // together as one consistent depth effect, not just the terrain.
          // Combined with the hillshade into one brightness multiplier.
          const f = shade * darken;
          out.data[o] = cR * f; out.data[o + 1] = cG * f; out.data[o + 2] = cB * f;
          out.data[o + 3] = 225; // strong, near-constant opacity — bold colours read clearly against the dark relief basemap
        }
      }
    }
    // No usable hour yet (still loading forecast data) — leave `out` fully
    // transparent (its default) rather than throwing, same defensive
    // pattern as buildSnowRamp's malformed-hour guard.
    ctx.putImageData(out, 0, 0);
    const outBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    return { data: await outBlob.arrayBuffer() };
  });
}

// Tiles are generated once per source add and MapLibre caches them from
// there — remove+re-add is the reliable way to force every visible tile
// back through the protocol with a fresh hour/wind reading, same pattern
// refreshSnowOverlay() uses for the slope-overlay trial.
function refreshOrographicSnow() {
  if (!map || !orographicSnowActive) return;
  if (map.getLayer('orographic-snow-layer')) map.removeLayer('orographic-snow-layer');
  if (map.getSource('orographic-snow')) map.removeSource('orographic-snow');
  map.addSource('orographic-snow', { type: 'raster', tiles: ['orographicsnow://{z}/{x}/{y}'], tileSize: 512 });
  map.addLayer({
    id: 'orographic-snow-layer', type: 'raster', source: 'orographic-snow',
  }, map.getLayer('resort-lifts-line') ? 'resort-lifts-line' : undefined);
  // Hide the flat elevation-only layer underneath while this is showing —
  // both cover the same above-snowline area, so left visible together they'd
  // just double up (and layer-order between two semi-transparent overlays
  // would look muddier than either alone).
  if (map.getLayer('snow-relief')) map.setLayoutProperty('snow-relief', 'visibility', 'none');
}

function toggleOrographicSnow() {
  if (!map) return;
  orographicSnowActive = !orographicSnowActive;
  const btn = document.getElementById('orographic-toggle');
  if (btn) btn.classList.toggle('active', orographicSnowActive);
  if (orographicSnowActive) {
    registerOrographicSnowProtocol();
    refreshOrographicSnow();
  } else {
    if (map.getLayer('orographic-snow-layer')) map.removeLayer('orographic-snow-layer');
    if (map.getSource('orographic-snow')) map.removeSource('orographic-snow');
    if (map.getLayer('snow-relief')) map.setLayoutProperty('snow-relief', 'visibility', 'visible');
  }
}

// ── Trial: dark "sci-fi" elevation basemap with contour lines ──────────────
// Alternative to the satellite raster background — colours the terrain
// purely by elevation (near-black at the base rising to a subtle, deliberately
// dim light grey at the summit) with faded 20m contour lines plus brighter
// 100m index contours, instead of real photo imagery. Snow Test tab only,
// same as the other two trials above. Reuses decodeTerrainRGB/
// getDemTileUrlTemplate (defined with the slope-overlay trial above) — same
// terrain-rgb DEM tiles, same decode.
const DARK_TERRAIN_CONTOUR_INTERVAL_M = 20;  // faded minor contours
const DARK_TERRAIN_MAJOR_CONTOUR_INTERVAL_M = 100; // bright "special" index contours
const DARK_TERRAIN_BASE_RGB = [2, 3, 5];      // darker near-black base
const DARK_TERRAIN_TOP_RGB = [55, 58, 65];    // darker summit too — stays a dark map overall
const DARK_TERRAIN_CONTOUR_RGB = [95, 98, 108];        // faded minor (20m) contours
const DARK_TERRAIN_MAJOR_CONTOUR_RGB = [205, 209, 216];  // bright near-white major (100m) contours

// Radial fade — contour lines fade to fully transparent by this distance
// (km) from the resort's own coordinate (LOC.lat/LOC.lon), on top of the
// existing major/minor alpha. Complements the dark-mode sky fog rather than
// replacing it: the sky fog fades by on-screen camera distance (changes
// with pitch/zoom as you look around), this fades by real-world distance
// from the mountain regardless of camera. Tried 200km, 100km, 50km, 30km
// live; 40km next per request.
const CONTOUR_FADE_RADIUS_KM = 40;

// Depth "fog": darkens (not fades to transparent — these are opaque base/
// overlay layers, and alpha-fading them would reveal the green
// 'background' layer underneath, not a natural black falloff) terrain
// colour with distance from the resort's own coordinate, so whatever
// mountain you're actually looking at keeps full colour while everything
// further out reads as progressively darker — real visual focus, like a
// camera's depth of field. MapLibre's own built-in Sky fog (SKY_NIGHT's
// fog-* properties, already at their max range/blend values) wasn't a
// strong enough effect on its own; this reuses the same resort-distance
// technique the contour radial fade above already uses, but bakes a much
// stronger, fully-controllable falloff directly into the rendered pixels
// instead of relying on MapLibre's fixed fog math. Used by
// registerDarkTerrainProtocol and registerOrographicSnowProtocol below.
const DEPTH_DARKEN_RADIUS_KM = 30;
function depthDarkenFactor(distKm) {
  // Power >1 keeps the near-resort area essentially untouched, then ramps
  // up increasingly steeply toward the radius — fully black at/beyond it.
  // Radius widened from 10km (which read as too intense) so the darkening
  // spreads over a longer distance and more of the scene stays bright.
  return Math.min(1, Math.pow(Math.max(0, distKm) / DEPTH_DARKEN_RADIUS_KM, 1.6));
}

// Live-adjustable via #contour-toggle — read fresh by the tile protocol on
// every tile it generates (see registerDarkTerrainProtocol below), same
// pattern as snowOverlayParams above. Off leaves a plain elevation-shaded
// relief map with no contour lines at all.
let darkTerrainShowContours = true;

let darkTerrainProtocolRegistered = false;
function registerDarkTerrainProtocol() {
  if (darkTerrainProtocolRegistered) return;
  darkTerrainProtocolRegistered = true;
  maplibregl.addProtocol('darkterrain', async (params) => {
    const [z, x, y] = params.url.replace('darkterrain://', '').split('/').map(Number);
    const template = await getDemTileUrlTemplate();
    const demUrl = template.replace('{z}', z).replace('{x}', x).replace('{y}', y);
    const res = await fetch(demUrl);
    const blob = await res.blob();
    const bitmap = await createImageBitmap(blob);
    const size = bitmap.width;

    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0);
    const src = ctx.getImageData(0, 0, size, size).data;

    const elev = new Float32Array(size * size);
    for (let i = 0; i < size * size; i++) {
      elev[i] = decodeTerrainRGB(src[i * 4], src[i * 4 + 1], src[i * 4 + 2]);
    }

    // Pure elevation-shaded base — no contour lines. Those are a separate
    // layer/protocol (registerContourLinesProtocol below) so they can be
    // stacked above the radar overlay while this opaque base basemap stays
    // below it, same as satellite does.
    const baseElev = LOC.baseElev, topElev = LOC.topElev || LOC.summitElev + 200;
    const span = Math.max(1, topElev - baseElev);
    // Longitude only depends on px, latitude only on py — precompute once
    // per column/row rather than recomputing per pixel (see
    // registerContourLinesProtocol below, same technique).
    const lonForPx = new Float64Array(size);
    for (let px = 0; px < size; px++) lonForPx[px] = tilePixelToLonLat(x, y, z, px, 0, size)[0];
    const out = ctx.createImageData(size, size);
    for (let py = 0; py < size; py++) {
      const rowLat = tilePixelToLonLat(x, y, z, 0, py, size)[1];
      const cosAvgLatRad = Math.cos(((LOC.lat + rowLat) / 2) * Math.PI / 180);
      for (let px = 0; px < size; px++) {
        const i = py * size + px;
        const e = elev[i];
        const t = Math.min(1, Math.max(0, (e - baseElev) / span));
        let r = DARK_TERRAIN_BASE_RGB[0] + t * (DARK_TERRAIN_TOP_RGB[0] - DARK_TERRAIN_BASE_RGB[0]);
        let g = DARK_TERRAIN_BASE_RGB[1] + t * (DARK_TERRAIN_TOP_RGB[1] - DARK_TERRAIN_BASE_RGB[1]);
        let b = DARK_TERRAIN_BASE_RGB[2] + t * (DARK_TERRAIN_TOP_RGB[2] - DARK_TERRAIN_BASE_RGB[2]);
        const distKm = approxDistanceKm(LOC.lat, LOC.lon, rowLat, lonForPx[px], cosAvgLatRad);
        const darken = 1 - depthDarkenFactor(distKm);
        r *= darken; g *= darken; b *= darken;
        const o = i * 4;
        out.data[o] = Math.round(r); out.data[o + 1] = Math.round(g); out.data[o + 2] = Math.round(b);
        out.data[o + 3] = 255;
      }
    }
    ctx.putImageData(out, 0, 0);

    const outBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    return { data: await outBlob.arrayBuffer() };
  });
}

// Contour LINES only — fully transparent everywhere except the line pixels
// themselves, so this can sit as its own layer stacked *above* the radar
// colour overlay (unlike the opaque elevation-shaded base above, which
// stays below radar like any other basemap). Same DEM tiles/decode, same
// major/minor band-crossing test as the base protocol used to do inline
// before contours were split out into this separate layer.
let contourLinesProtocolRegistered = false;
function registerContourLinesProtocol() {
  if (contourLinesProtocolRegistered) return;
  contourLinesProtocolRegistered = true;
  maplibregl.addProtocol('darkterraincontours', async (params) => {
    const [z, x, y] = params.url.replace('darkterraincontours://', '').split('/').map(Number);
    const template = await getDemTileUrlTemplate();
    const demUrl = template.replace('{z}', z).replace('{x}', x).replace('{y}', y);
    const res = await fetch(demUrl);
    const blob = await res.blob();
    const bitmap = await createImageBitmap(blob);
    const size = bitmap.width;

    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0);
    const src = ctx.getImageData(0, 0, size, size).data;

    const elev = new Float32Array(size * size);
    for (let i = 0; i < size * size; i++) {
      elev[i] = decodeTerrainRGB(src[i * 4], src[i * 4 + 1], src[i * 4 + 2]);
    }

    // Longitude only depends on px (not py) — precompute once per column
    // rather than recomputing inside the doubly-nested pixel loop below.
    const lonForPx = new Float64Array(size);
    for (let px = 0; px < size; px++) {
      lonForPx[px] = tilePixelToLonLat(x, y, z, px, 0, size)[0];
    }

    const out = ctx.createImageData(size, size);
    for (let py = 0; py < size; py++) {
      const yp1 = Math.min(size - 1, py + 1);
      // Latitude only depends on py — same reasoning, computed once per row.
      // cosAvgLatRad likewise only needs LOC.lat + this row's lat, not px.
      const rowLat = tilePixelToLonLat(x, y, z, 0, py, size)[1];
      const cosAvgLatRad = Math.cos(((LOC.lat + rowLat) / 2) * Math.PI / 180);
      for (let px = 0; px < size; px++) {
        const i = py * size + px;
        const xp1 = Math.min(size - 1, px + 1);
        const e = elev[i];
        const eRight = elev[py * size + xp1], eDown = elev[yp1 * size + px];
        const band = Math.floor(e / DARK_TERRAIN_CONTOUR_INTERVAL_M);
        const isMinorContour = band !== Math.floor(eRight / DARK_TERRAIN_CONTOUR_INTERVAL_M) || band !== Math.floor(eDown / DARK_TERRAIN_CONTOUR_INTERVAL_M);
        const majorBand = Math.floor(e / DARK_TERRAIN_MAJOR_CONTOUR_INTERVAL_M);
        const isMajorContour = majorBand !== Math.floor(eRight / DARK_TERRAIN_MAJOR_CONTOUR_INTERVAL_M) || majorBand !== Math.floor(eDown / DARK_TERRAIN_MAJOR_CONTOUR_INTERVAL_M);
        const o = i * 4;
        if (isMajorContour || isMinorContour) {
          const distKm = approxDistanceKm(LOC.lat, LOC.lon, rowLat, lonForPx[px], cosAvgLatRad);
          const radialFade = Math.max(0, 1 - distKm / CONTOUR_FADE_RADIUS_KM);
          if (isMajorContour) {
            out.data[o] = DARK_TERRAIN_MAJOR_CONTOUR_RGB[0]; out.data[o + 1] = DARK_TERRAIN_MAJOR_CONTOUR_RGB[1]; out.data[o + 2] = DARK_TERRAIN_MAJOR_CONTOUR_RGB[2];
            out.data[o + 3] = Math.round(255 * 0.9 * radialFade);
          } else {
            out.data[o] = DARK_TERRAIN_CONTOUR_RGB[0]; out.data[o + 1] = DARK_TERRAIN_CONTOUR_RGB[1]; out.data[o + 2] = DARK_TERRAIN_CONTOUR_RGB[2];
            out.data[o + 3] = Math.round(255 * 0.65 * radialFade);
          }
        } else {
          out.data[o + 3] = 0; // fully transparent — the base/satellite/radar below shows through
        }
      }
    }
    ctx.putImageData(out, 0, 0);

    const outBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    return { data: await outBlob.arrayBuffer() };
  });
}

// Guarantees the contour-lines layer renders above radar-layer regardless
// of which was added/reordered more recently — MapLibre stacks layers by
// array position, and whichever of the two was added/moved *last* ends up
// on top, so this must be re-asserted both when dark mode turns on (here)
// and whenever radar-layer is (re)created (radarDrawFrame). Positioned
// directly below 'resort-lifts-line' (like radar-layer itself) rather than
// the absolute top of the stack, so it doesn't bury lift markers/pins.
function bringContoursAboveRadar() {
  if (!map) return;
  const before = map.getLayer('resort-lifts-line') ? 'resort-lifts-line' : undefined;
  if (map.getLayer('dark-terrain-contours-layer')) map.moveLayer('dark-terrain-contours-layer', before);
  // Same reasoning for the country outline — low-zoom reference layers that
  // should stay visible above radar's colour drape if both happen to be on
  // screen at once (unusual — radar is a close-in regional overlay, the
  // outline usually only reads at country-scale zoom — but cheap to keep
  // correct regardless).
  if (map.getLayer('country-outline-layer')) map.moveLayer('country-outline-layer', before);
}

function toggleContours() {
  darkTerrainShowContours = !darkTerrainShowContours;
  const btn = document.getElementById('contour-toggle');
  if (btn) {
    btn.classList.toggle('active', darkTerrainShowContours);
    btn.title = darkTerrainShowContours ? 'Hide contour lines' : 'Show contour lines';
  }
  if (map.getLayer('dark-terrain-contours-layer')) {
    map.setLayoutProperty('dark-terrain-contours-layer', 'visibility', darkTerrainShowContours ? 'visible' : 'none');
  }
}

// Shared by the raw Snow Test trial toggle (#basemap-toggle) and the
// settings-cog "Dark mode" toggle further down — one source of truth for
// switching the basemap + contours-layer + sky together, so the two
// surfaces can never disagree. Forces darkTerrainShowContours back to true
// on every enable, overriding whatever the separate Snow-Test-only contour
// trial button last left it at.
// Country outline (dark mode only) — the pure elevation-shaded basemap has
// no visual distinction between ocean and low-lying/coastal land (both read
// as near-black "base" colour), unlike satellite mode where a real photo
// makes the coastline obvious. Draws a subtle boundary line from MapLibre's
// own public demo vector tiles (Natural Earth country polygons, free/no-key,
// served by the MapLibre project itself for exactly this kind of use —
// https://github.com/maplibre/demotiles) so there's still a "you are here"
// reference at low zoom. ADM0_A3 (3-letter ISO code) is the field that
// source's countries layer is filterable by — confirmed against MapLibre's
// own demo style.json, not guessed.
const RESORT_COUNTRY_ISO3 = {
  ruapehu: 'NZL', cardrona: 'NZL', mtlyford: 'NZL', roundhill: 'NZL', treblecone: 'NZL', mthutt: 'NZL',
  loveland: 'USA', mtvernon: 'USA',
};

let darkTerrainActive = false;
function setDarkMode(enabled, withContours = true) {
  if (!map) return;
  darkTerrainActive = enabled;
  // Combined toggle defaults contours on (no separate control offered on
  // the regular Map tab/settings cog); High-Res explicitly passes false for
  // a plain relief map, so its orographic colour ramp isn't competing with
  // contour lines for visual attention.
  darkTerrainShowContours = withContours;
  const trialBtn = document.getElementById('basemap-toggle');
  if (trialBtn) {
    trialBtn.classList.toggle('active', enabled);
    trialBtn.title = enabled ? 'Switch to satellite basemap' : 'Switch to dark terrain basemap (trial)';
  }
  // Snow-Test-only trial control (contours on/off, independent of dark mode
  // as a whole) — must never surface on prod's Map tab just because dark
  // mode got turned on via the settings cog there. isSnowTestMode gates it
  // exactly like the other trial buttons at the top of this script.
  const contourBtn = document.getElementById('contour-toggle');
  if (contourBtn) {
    contourBtn.style.display = (enabled && isSnowTestMode) ? 'flex' : 'none';
    contourBtn.classList.toggle('active', darkTerrainShowContours);
    contourBtn.title = 'Hide contour lines';
  }
  if (enabled) {
    registerDarkTerrainProtocol();
    registerContourLinesProtocol();
    if (map.getLayer('dark-terrain-layer')) map.removeLayer('dark-terrain-layer');
    if (map.getSource('dark-terrain')) map.removeSource('dark-terrain');
    map.addSource('dark-terrain', { type: 'raster', tiles: ['darkterrain://{z}/{x}/{y}'], tileSize: 512 });
    // Inserted in the same slot 'satellite' occupies (right below hillshade/
    // snow-relief), so those still layer on top of whichever basemap is showing.
    map.addLayer({ id: 'dark-terrain-layer', type: 'raster', source: 'dark-terrain' }, 'depth-shade');
    map.setLayoutProperty('satellite', 'visibility', 'none');
    map.setLayoutProperty('dark-terrain-layer', 'visibility', 'visible');

    // Contour lines: a separate transparent-except-lines layer, added (or
    // reused) here and immediately re-asserted above any existing radar
    // layer — see bringContoursAboveRadar().
    if (!map.getSource('dark-terrain-contours')) {
      map.addSource('dark-terrain-contours', { type: 'raster', tiles: ['darkterraincontours://{z}/{x}/{y}'], tileSize: 512 });
    }
    if (!map.getLayer('dark-terrain-contours-layer')) {
      map.addLayer({ id: 'dark-terrain-contours-layer', type: 'raster', source: 'dark-terrain-contours' });
    }
    map.setLayoutProperty('dark-terrain-contours-layer', 'visibility', darkTerrainShowContours ? 'visible' : 'none');

    // Country outline — real vector source (not a custom raster protocol
    // like the two above), MapLibre resolves the TileJSON URL itself.
    if (!map.getSource('country-boundaries')) {
      map.addSource('country-boundaries', { type: 'vector', url: 'https://demotiles.maplibre.org/tiles/tiles.json' });
    }
    if (!map.getLayer('country-outline-layer')) {
      map.addLayer({
        id: 'country-outline-layer', type: 'line', source: 'country-boundaries', 'source-layer': 'countries',
        filter: ['==', ['get', 'ADM0_A3'], RESORT_COUNTRY_ISO3[resortKey] || 'NZL'],
        // Subtle neutral grey, not the blue-ish tint it started as — reads
        // as a quiet reference line rather than a prominent feature.
        paint: { 'line-color': '#9a9ea6', 'line-width': 1.2, 'line-opacity': 0.5 },
      });
    }
    map.setLayoutProperty('country-outline-layer', 'visibility', 'visible');

    bringContoursAboveRadar();
  } else {
    map.setLayoutProperty('satellite', 'visibility', 'visible');
    if (map.getLayer('dark-terrain-layer')) map.setLayoutProperty('dark-terrain-layer', 'visibility', 'none');
    if (map.getLayer('dark-terrain-contours-layer')) map.setLayoutProperty('dark-terrain-contours-layer', 'visibility', 'none');
    // Satellite is a real photo — the coastline is already obvious there,
    // no need for the reference outline.
    if (map.getLayer('country-outline-layer')) map.setLayoutProperty('country-outline-layer', 'visibility', 'none');
  }
  // Fog is bundled into the sky object in this API (see SKY_NIGHT above),
  // not a separate call — SKY_DAY carries no fog-* properties at all, so
  // switching back to satellite naturally has none, same as it always did.
  map.setSky(enabled ? SKY_NIGHT : SKY_DAY);
  // Hourly view's snow/freezing-level overlay ramp branches on
  // darkTerrainActive (see buildSnowRamp) — reapply now so toggling dark
  // mode updates its colours immediately instead of waiting for the next
  // timeline scrub to recompute the ramp.
  if (viewMode === 'hourly' && forecastHours.length) openMapView(currentIndex);
}

function toggleBasemap() {
  setDarkMode(!darkTerrainActive);
}

// ── Settings (Winter snow / Dark mode) — applied here, controlled from the
// React layer ────────────────────────────────────────────────────────────
// Wraps two of the Snow Test trials above in simplified, locked on/off
// switches:
//   - "Winter snow": the slope-aware snow overlay (🏔️ trial button), fixed
//     to a region-appropriate min elevation and hand-tuned slope/fade/
//     opacity. No sliders offered.
//   - "Dark mode": the dark-terrain basemap + contour lines (🌑
//     trial button) as one combined toggle — contours are always on
//     whenever this is on. The separate #contour-toggle trial control (on/
//     off for contours alone) stays Snow-Test-only, not duplicated here.
// The actual on/off switches live in the React app's MapSettingsMenu
// (App.jsx), in the same row as the resort switcher — not inside this
// iframe — since that's the only way for them to share that row's plane/
// height. This file just applies whichever setting is asked of it (see the
// 'apply-settings' message listener below) and persists it, same
// localStorage key/format the React layer reads/writes directly (same-
// origin, so no bridge is needed for THAT half — only a live toggle while
// this iframe is already mounted needs the message, since only this script
// holds the actual MapLibre `map` instance).
// Same key/format the React-layer MapSettingsMenu (App.jsx) reads and
// writes — this file only ever reads it (see restoreMapSettings below);
// writes happen on the React side since that's where the switches live.
const SETTINGS_STORAGE_KEY = 'sc-map-settings';
function loadMapSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY)) || {}; }
  catch (e) { return {}; }
}

// Ruapehu (Whakapapa) is the only North Island NZ resort configured here;
// every other NZ resort is South Island; Loveland/Mt Vernon are Colorado, USA.
const WINTER_SNOW_REGION = {
  ruapehu: 'northIslandNZ',
  cardrona: 'southIslandNZ', mtlyford: 'southIslandNZ', roundhill: 'southIslandNZ',
  treblecone: 'southIslandNZ', mthutt: 'southIslandNZ',
  loveland: 'american', mtvernon: 'american',
};
const WINTER_SNOW_MIN_ELEV_BY_REGION = { northIslandNZ: 1400, southIslandNZ: 1200, american: 1000 };
// Everything except minElev (region-dependent, set in applyWinterSnow) is
// fixed — no sliders offered to the user for this toggle.
const WINTER_SNOW_LOCKED_PARAMS = { patchBandM: 0, maxSlopeDeg: 62, fadeDeg: 4, opacity: 0.9 };

function applyWinterSnow(enabled) {
  if (!map) return;
  snowOverlayActive = enabled;
  // Keep the raw Snow-Test trial button + its sliders panel in sync too, in
  // case both surfaces are reachable in the same session (?snow=1) — the
  // panel must never be left open showing stale slider values for a layer
  // this toggle has taken over with locked params.
  const trialBtn = document.getElementById('snow-overlay-toggle');
  if (trialBtn) trialBtn.classList.toggle('active', enabled);
  const controls = document.getElementById('snow-overlay-controls');
  if (controls) controls.style.display = 'none';
  if (!enabled) {
    if (map.getLayer('snow-overlay-layer')) map.removeLayer('snow-overlay-layer');
    return;
  }
  const region = WINTER_SNOW_REGION[resortKey] || 'southIslandNZ';
  Object.assign(snowOverlayParams, WINTER_SNOW_LOCKED_PARAMS, {
    minElev: WINTER_SNOW_MIN_ELEV_BY_REGION[region],
  });
  addOrRefreshSnowOverlayLayer(true);
  if (map.getLayer('snow-overlay-layer')) map.setPaintProperty('snow-overlay-layer', 'raster-opacity', snowOverlayParams.opacity);
}

// Called once, at the end of map.on('load') in initMap() above — picks up
// whatever was last saved (by this iframe's own previous session, or by the
// React-layer settings menu, same key/format either way).
function restoreMapSettings() {
  const settings = loadMapSettings();
  if (settings.winterSnow) applyWinterSnow(true);
  if (isHighResMode) {
    // Always the dark relief basemap with no contour lines here, regardless
    // of whatever's saved from the regular Map tab's settings cog — a plain
    // dark background is what makes the orographic overlay's colour ramp
    // read clearly, and satellite imagery/contour lines would compete with it.
    setDarkMode(true, false);
    // The wind-driven overlay is this page's only feature — always on, no
    // toggle button (see its removal above). toggleOrographicSnow() flips
    // orographicSnowActive (starts false) and does the actual layer setup,
    // same call a button click would have made.
    if (!orographicSnowActive) toggleOrographicSnow();
  } else if (settings.darkMode) {
    setDarkMode(true);
  }
}

// Live bridge from the React-layer MapSettingsMenu (App.jsx) — sent whenever
// a switch is flipped while this iframe is already mounted (a fresh mount
// picks the setting up on its own via restoreMapSettings() above, since
// localStorage is shared same-origin; only an already-running map needs to
// be told to actually re-render its layers/sky).
window.addEventListener('message', (event) => {
  if (event.data?.type !== 'apply-settings') return;
  if (typeof event.data.winterSnow === 'boolean' && event.data.winterSnow !== snowOverlayActive) {
    applyWinterSnow(event.data.winterSnow);
  }
  if (typeof event.data.darkMode === 'boolean' && event.data.darkMode !== darkTerrainActive) {
    setDarkMode(event.data.darkMode);
  }
});

// Decorative only: applies the single selected hour's wind speed/direction
// uniformly across the whole view (not a true spatially-varying field), but
// each particle is tracked as a real lng/lat and projected to screen pixels

function degToCompass(deg) {
  if (deg == null) return '';
  const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── Click-to-probe popup — snow depth + elevation at the clicked point ──────
let currentSnowLine = null;
let currentHourCm = 0;
let currentAccumTotalCm = 0;

function getDepthAtElevation(elev) {
  if (currentSnowLine == null || elev < currentSnowLine) return 0;
  if (viewMode === 'hourly') return currentHourCm;
  const frac = Math.min(1, (elev - currentSnowLine) / (TOP_ELEV - currentSnowLine));
  return currentAccumTotalCm * frac;
}

let clickPopupEl = null;
let clickPopupTimer = null;

function showClickPopup(x, y, text) {
  if (clickPopupEl) clickPopupEl.remove();
  clickPopupEl = document.createElement('div');
  clickPopupEl.className = 'click-popup';
  clickPopupEl.style.left = x + 'px';
  clickPopupEl.style.top = y + 'px';
  // pill+stem+dot (see .sf-pill/.sf-stem/.sf-dot) — the dot lands exactly on
  // the tapped pixel (.click-popup's own translate(-50%,-100%) anchors this
  // whole stack's bottom edge there), so it's visually unambiguous which
  // point on the map this number actually describes.
  clickPopupEl.innerHTML = '<div class="sf-pill"></div><div class="sf-stem"></div><div class="sf-dot"></div>';
  clickPopupEl.querySelector('.sf-pill').textContent = text;
  document.getElementById('map-screen').appendChild(clickPopupEl);

  clearTimeout(clickPopupTimer);
  clickPopupTimer = setTimeout(() => {
    if (clickPopupEl) { clickPopupEl.remove(); clickPopupEl = null; }
  }, 4000);
}

// Accumulated-snowfall depth gradient: the "Plasma" palette (ice blue → blue →
// purple → magenta → red → orange → gold). Fixed thresholds/labels; the alpha
// ramp fades the lightest band and firms up toward the deepest.
const DEPTH_BANDS = [
  { max: 1,        label: '0–1 cm',   swatch: 'rgb(240,249,255)', color: 'rgba(240,249,255,0.30)' },
  { max: 2,        label: '1–2 cm',   swatch: 'rgb(170,222,255)', color: 'rgba(170,222,255,0.80)' },
  { max: 4,        label: '2–4 cm',   swatch: 'rgb(130,150,255)', color: 'rgba(130,150,255,0.84)' },
  { max: 10,       label: '5–10 cm',  swatch: 'rgb(170,80,240)',  color: 'rgba(170,80,240,0.87)' },
  { max: 15,       label: '10–15 cm', swatch: 'rgb(214,47,150)',  color: 'rgba(214,47,150,0.89)' },
  { max: 25,       label: '15–25 cm', swatch: 'rgb(244,63,96)',   color: 'rgba(244,63,96,0.91)' },
  { max: 50,       label: '25–50 cm', swatch: 'rgb(255,120,40)',  color: 'rgba(255,120,40,0.93)' },
  { max: Infinity, label: '50 cm+',   swatch: 'rgb(255,205,40)',  color: 'rgba(255,205,40,0.95)' },
];

// Build the colour-relief fill for the currently selected forecast hour:
// flat blue tint from the snow line up when there's no active snowfall, or the
// intensity-scaled blue→white gradient (scaled by snowfall amount) when there is.
const SNOWFALL_THRESHOLD_MM = 0.1;

function buildSnowRamp(hour) {
  // A malformed/missing hour would otherwise produce a garbage 'interpolate'
  // expression below — MapLibre's color-relief renderer can't recover from
  // that mid-frame and the whole map goes blank, not just this layer. A flat
  // transparent ramp is always a safe, valid fallback.
  if (!hour || hour.freezingLevel == null || hour.snowfallMm == null) {
    return ['interpolate', ['linear'], ['elevation'], 0, 'rgba(255,255,255,0)', TOP_ELEV, 'rgba(255,255,255,0)'];
  }
  const snowing = hour.snowfallMm >= SNOWFALL_THRESHOLD_MM;

  // Where the tint starts (its lower edge), as a true elevation:
  //  • No active snowfall → the FREEZING LEVEL itself (the 0°C isotherm). Below it
  //    the air is above freezing, so nothing should be tinted. (Previous bug: this
  //    used freezing − 300m, so the blue drape spilled ~300m below the freezing
  //    level — e.g. covering a +1.8°C base that sits below the freezing level.)
  //  • Active snowfall → the SNOW LINE (freezing − 300m): falling snow survives
  //    ~300m into the above-freezing layer before melting, so it lies that low.
  const boundary = snowing ? hour.freezingLevel - SNOW_OFFSET : hour.freezingLevel;

  // Nothing to draw when the boundary is above the entire displayed terrain —
  // e.g. an off-season resort with the freezing level kilometres above the peak.
  // A flat transparent ramp avoids the static cap the clamp would otherwise pin
  // to the summit (which never moves as you scrub the timeline).
  if (boundary >= TOP_ELEV) {
    return [
      'interpolate', ['linear'], ['elevation'],
      0, 'rgba(255,255,255,0)',
      TOP_ELEV, 'rgba(255,255,255,0)'
    ];
  }

  // Clamp below TOP_ELEV so the ramp's stops stay strictly ascending.
  const line = Math.min(boundary, TOP_ELEV - 2);

  if (!snowing) {
    // Freezing-level overlay (no active snowfall). Dark contour mode uses a
    // darker blue than the daytime tint (which read as too bright/saturated
    // against the dark relief basemap), but at 0.15 opacity it disappeared
    // entirely against the near-black terrain — bumped back up so it's
    // still visibly darker/less saturated than daytime, just not invisible.
    const color = darkTerrainActive ? 'rgba(35,85,180,0.35)' : 'rgba(60,130,255,0.2)';
    return [
      'interpolate', ['linear'], ['elevation'],
      line - 1, 'rgba(255,255,255,0)',
      line, color,
      TOP_ELEV, color
    ];
  }

  // Intensity scales the colour/opacity with forecasted snowfall amount (mm).
  const intensity = Math.max(0.65, Math.min(1, hour.snowfallMm / 14));
  const a1 = (0.85 * intensity).toFixed(2);
  const a2 = (0.97 * intensity).toFixed(2);
  const a3 = (1 * intensity).toFixed(2);
  const midPoint = Math.min(line + 100, TOP_ELEV - 1);

  // Dark contour mode: darker grey instead of the near-white daytime tint —
  // white read as blown-out against the dark relief basemap.
  const [c0, c1, c2] = darkTerrainActive
    ? ['90,95,105', '110,115,125', '130,135,145']
    : ['205,225,255', '225,240,255', '248,251,255'];

  return [
    'interpolate', ['linear'], ['elevation'],
    line - 1, `rgba(${c0},0)`,
    line, `rgba(${c0},${a1})`,
    midPoint, `rgba(${c1},${a2})`,
    TOP_ELEV, `rgba(${c2},${a3})`
  ];
}

// The 'snow-relief' layer isn't guaranteed to exist the instant the map is
// constructed (style/layers attach asynchronously), so poll briefly until it
// does rather than relying on a single 'load'/'idle' event that may fire too early.
let applyRampToken = 0;
function applyRampWhenReady(rampArray) {
  if (!map) return; // map failed to initialize — nothing to paint, and must not throw here
  const token = ++applyRampToken;
  const tryApply = () => {
    if (token !== applyRampToken) return; // a newer selection was made — abandon this one
    if (map.getLayer('snow-relief')) {
      map.setPaintProperty('snow-relief', 'color-relief-color', rampArray);
    } else {
      setTimeout(tryApply, 80);
    }
  };
  tryApply();
}

// Pin + black pill at a map point. On the HOURLY map it sits persistently at the
// field (this hour's snowfall rate). On the ACCUMULATED map it opens at the field
// (window total), fades out after 4s, and tapping the map moves it to that point
// and restarts the fade.
let snowfallMarker = null;
let snowfallFadeTimer = null;

function ensureSnowfallMarker(lngLat, label) {
  if (!snowfallMarker) {
    const el = document.createElement('div');
    el.className = 'snowfall-marker';
    el.innerHTML = '<div class="sf-pill"></div><div class="sf-stem"></div><div class="sf-dot"></div>';
    snowfallMarker = new maplibregl.Marker({ element: el, anchor: 'bottom' }).setLngLat(lngLat).addTo(map);
  }
  const el = snowfallMarker.getElement();
  el.querySelector('.sf-pill').textContent = label;
  snowfallMarker.setLngLat(lngLat);
  el.style.opacity = '1';
  return el;
}

function removeSnowfallMarker() {
  if (snowfallFadeTimer) { clearTimeout(snowfallFadeTimer); snowfallFadeTimer = null; }
  if (snowfallMarker) { snowfallMarker.remove(); snowfallMarker = null; }
}

// Hourly: persistent pill at the field (no fade). Empty label hides it.
function showSnowfallMarker(label) {
  if (!label) { removeSnowfallMarker(); return; }
  if (snowfallFadeTimer) { clearTimeout(snowfallFadeTimer); snowfallFadeTimer = null; }
  ensureSnowfallMarker(LOC.center || [LOC.lon, LOC.lat], label);
}

// Accumulated: pill at lngLat that fades out after 4s. Empty label hides it.
function flashSnowfallMarker(lngLat, label) {
  if (!label) { removeSnowfallMarker(); return; }
  ensureSnowfallMarker(lngLat, label);
  if (snowfallFadeTimer) clearTimeout(snowfallFadeTimer);
  snowfallFadeTimer = setTimeout(() => {
    if (snowfallMarker) snowfallMarker.getElement().style.opacity = '0';
  }, 4000);
}

let currentIndex = -1;

function openMapView(index) {
  // The terrain/satellite map must always exist regardless of whether
  // forecast data is ready yet (a slow weather fetch shouldn't leave the
  // whole map blank) — initMap() never depended on forecastHours before, and
  // must not start doing so now. Isolated in try/catch: everything below
  // (the timeline UI / data panel) is plain DOM/data logic that has nothing
  // to do with WebGL, and must not break just because the map did.
  try { initMap(); } catch (e) { console.error('initMap failed', e); }

  // forecastHours can legitimately be empty (e.g. every model's hourly rows
  // got filtered out for this resort/period, or the weather fetch is still
  // in flight) — bail out of the hour-dependent bits instead of indexing
  // into it, since the fallback would be `hour === undefined` and
  // buildSnowRamp(undefined) used to throw (corrupting the map's snow-relief
  // paint expression and blanking the whole render loop, not just the
  // overlay). The base map still shows fine either way.
  if (forecastHours.length === 0) {
    applyRampWhenReady(buildSnowRamp(null));
    return;
  }
  currentIndex = Math.max(0, Math.min(index, forecastHours.length - 1));
  const hour = forecastHours[currentIndex];

  applyRampWhenReady(buildSnowRamp(hour));
  // Regenerating orographic-snow-layer's tiles is real per-pixel DEM work,
  // unlike buildSnowRamp's cheap interpolation array — only worth doing on
  // an actual hour change (here), not on every smooth-playback animation
  // frame (see startPlay's blendHour loop, which intentionally skips this).
  refreshOrographicSnow();

  // Must mirror buildSnowRamp's own boundary exactly (see the "Previous
  // bug" comment there) — this used freezing-300m unconditionally, so on a
  // non-snowing hour the probe's "above the line" cutoff sat 300m below
  // where the map actually stops tinting, letting a tap in that gap report
  // non-zero snowfall for an area showing no shading at all.
  const hourSnowing = hour.snowfallMm >= SNOWFALL_THRESHOLD_MM;
  currentSnowLine = hourSnowing ? hour.freezingLevel - SNOW_OFFSET : hour.freezingLevel;
  currentHourCm = hourSnowing ? hour.snowfallMm / 10 : 0;

  document.getElementById('si-time').textContent = fmtTime(hour.time);
  document.getElementById('si-temp').textContent = hour.temp.toFixed(1) + '°C';
  document.getElementById('si-fl').textContent = Math.round(hour.freezingLevel) + ' m';
  document.getElementById('si-sl').textContent = Math.round(hour.freezingLevel - SNOW_OFFSET) + ' m';
  document.getElementById('si-snow').textContent = hour.snowfallMm.toFixed(1) + ' mm';
  document.getElementById('si-wind').textContent = hour.windSpeedKmh != null
    ? `${Math.round(hour.windSpeedKmh)} km/h ${degToCompass(hour.windDirDeg)}`
    : '—';

  document.getElementById('tl-prev').disabled = currentIndex <= 0;
  document.getElementById('tl-next').disabled = currentIndex >= forecastHours.length - 1;
  document.getElementById('tl-label').textContent = fmtTime(hour.time);

  const slider = document.getElementById('tl-slider');
  slider.max = forecastHours.length - 1;
  slider.value = currentIndex;

  if (currentIndex >= forecastHours.length - 1) stopPlay();

  // Render freezing level overlay for hourly view
  if (viewMode === 'hourly') {
    pwRenderFreezingOverlay();
    // Update observation pills to show forecasted temperature
    for (const id in pwState) pwRenderPill(id);
    // Update pseudo pills to show forecasted temperature
    pwRenderPseudoPills();
    // Snowfall pin/pill at the field (only while snow is falling this hour)
    showSnowfallMarker(hour.snowfallMm >= SNOWFALL_THRESHOLD_MM ? `❄ ${hour.snowfallMm.toFixed(1)} mm/hr` : '');
  }

  setTimeout(() => { if (map) map.resize(); }, 60);
}

function stepHour(delta) {
  if (currentIndex < 0) return;
  openMapView(currentIndex + delta);
}

// ── Accumulated snowfall view — total depth over the next 5/10/15 days ──────
// The mountain is tinted with all eight depth bands stacked by elevation so the
// colour key is visible across the terrain; the legend highlights which single
// band the actual forecast total falls into. Band colours come from DEPTH_BANDS
// (the Plasma palette).
function renderDepthLegend(activeBand) {
  const el = document.getElementById('depth-legend');
  el.innerHTML = DEPTH_BANDS.map(b => `
    <div class="legend-row${b === activeBand ? ' active-band' : ''}">
      <div class="legend-swatch" style="background:${b.swatch}"></div>
      <span>${b.label}</span>
    </div>
  `).join('');
}

// Stack only the depth bands actually reached by the forecast total, evenly
// between the snow line and the summit, as hard-edged steps. A light total
// (e.g. 5cm, band index 1) only shows a couple of pale blue steps; a big
// total (e.g. 120cm, band index 7) shows the full climb through blue/purple
// to red. Previously this always stacked all 10 bands regardless of the
// real total, so a 2cm and a 200cm forecast rendered identically.
function buildAccumRamp(snowLine, bandIndex) {
  const n = bandIndex + 1;
  const bandWidth = (TOP_ELEV - snowLine) / n;
  // A narrow snowLine..TOP_ELEV gap (e.g. snowLine clamped right up against
  // TOP_ELEV) can make bandWidth sub-1, so "end - 1" would fall below "start"
  // and break the ramp's required ascending order — nudge it down to a small
  // fraction of the band width instead of a flat 1m in that case.
  const edgeGap = Math.min(1, bandWidth / 4);
  const stops = ['interpolate', ['linear'], ['elevation'], snowLine - 1, 'rgba(255,255,255,0)'];
  DEPTH_BANDS.slice(0, n).forEach((b, i) => {
    const start = snowLine + bandWidth * i;
    const end = snowLine + bandWidth * (i + 1);
    stops.push(start, b.color);
    stops.push(end - edgeGap, b.color);
  });
  return stops;
}

function renderAccumulatedView() {
  if (forecastHours.length === 0) return;
  initMap();

  const nowMs = Date.now();
  let startIdx = 0, bestDiff = Infinity;
  forecastHours.forEach((r, i) => {
    const diff = Math.abs(new Date(r.time).getTime() - nowMs);
    if (diff < bestDiff) { bestDiff = diff; startIdx = i; }
  });
  const window_ = forecastHours.slice(startIdx, startIdx + accumDays * 24);
  const totalCm = window_.reduce((s, r) => s + r.snowfallMm, 0) / 10;
  // Use the lowest freezing level reached during the window, not the average —
  // averaging dilutes a cold snow event with milder days elsewhere in the same
  // window, which made a longer period (e.g. 15 Day) show a *higher* snow line
  // than a shorter one (10 Day) it fully contains. The minimum can only stay
  // the same or drop as the window grows, so longer periods never show less
  // low-elevation coverage than the shorter periods nested inside them.
  const minFreezing = Math.min(...window_.map((r) => r.freezingLevel));
  // Clamp below TOP_ELEV — see buildSnowRamp for why (freezing level can
  // forecast above the resort's summit in its off-season).
  const snowLine = Math.min(minFreezing - SNOW_OFFSET, TOP_ELEV - 2);

  const bandIndex = DEPTH_BANDS.findIndex(b => totalCm <= b.max);
  const band = bandIndex === -1 ? DEPTH_BANDS[DEPTH_BANDS.length - 1] : DEPTH_BANDS[bandIndex];

  applyRampWhenReady(buildAccumRamp(snowLine, bandIndex === -1 ? DEPTH_BANDS.length - 1 : bandIndex));

  currentSnowLine = snowLine;
  currentAccumTotalCm = totalCm;

  document.getElementById('accum-period-label').textContent = `Next ${accumDays} Days`;
  document.getElementById('accum-total').textContent = totalCm.toFixed(0) + ' cm';
  document.getElementById('accum-snowline').textContent = Math.round(snowLine) + ' m';
  renderDepthLegend(band);
  updateAccumMinSummary();
  // Snowfall pin/pill — opens at the field with the window total, then fades
  // after 4s. Tapping the map moves it (see the map click handler).
  if (totalCm >= 0.1) flashSnowfallMarker(LOC.center || [LOC.lon, LOC.lat], `❄ ${totalCm.toFixed(0)} cm`);
  else removeSnowfallMarker();

  setTimeout(() => { if (map) map.resize(); }, 60);
}

// Headline figures shown in the minimised drawer's grey space (accumulated mode).
function updateAccumMinSummary() {
  const el = document.getElementById('drawer-min-summary');
  if (!el) return;
  el.innerHTML = `
    <div class="dms-main">
      <span class="dms-eyebrow">Next ${accumDays} Days · Snowfall</span>
      <span class="dms-total">${currentAccumTotalCm != null ? currentAccumTotalCm.toFixed(0) + ' cm' : '—'}</span>
    </div>
    <div class="dms-side">
      <span class="l">Snow line</span>
      <span class="v">${currentSnowLine != null ? Math.round(currentSnowLine) + ' m' : '—'}</span>
    </div>`;
}

let viewMode = 'hourly'; // 'hourly' | 'accumulated'
let accumDays = 5;

// Persist the map view selection so it carries across location switches (each
// resort reloads this page in the iframe, which would otherwise reset to the
// default hourly view). Same-origin localStorage survives that reload.
function pwPersist(key, val) { try { localStorage.setItem(key, val); } catch (e) {} }

function setViewMode(mode) {
  // No regional station covers this resort (the US ones) — fall back rather
  // than entering a mode that can never load anything.
  if (mode === 'radar' && !RADAR_REGION) mode = 'hourly';
  viewMode = mode;
  pwPersist('sp-view-mode', mode);
  document.querySelectorAll('#mode-switch .pill-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('period-switch').style.display = mode === 'accumulated' ? 'flex' : 'none';
  // No forecast data backs the Live temperature map or the Radar map (neither
  // has a model to switch), so the model switcher has nothing to do there.
  document.getElementById('model-switch').style.display = (mode === 'live' || mode === 'radar') ? 'none' : 'block';
  syncTopControlsLayout();
  if (mode === 'live') closeModelMenu();
  document.getElementById('timeline').style.display = mode === 'hourly' ? 'flex' : 'none';
  document.getElementById('speed-select').style.display = mode === 'hourly' ? 'flex' : 'none';
  document.getElementById('info-hourly').style.display = mode === 'hourly' ? 'block' : 'none';
  document.getElementById('info-accum').style.display = mode === 'accumulated' ? 'block' : 'none';
  document.getElementById('info-live').style.display = mode === 'live' ? 'block' : 'none';
  document.getElementById('live-timeline').style.display = mode === 'live' ? 'flex' : 'none';
  document.getElementById('radar-timeline').style.display = mode === 'radar' ? 'flex' : 'none';
  document.getElementById('map-screen').classList.toggle('live-mode', mode === 'live');
  document.getElementById('map-screen').classList.toggle('accum-mode', mode === 'accumulated');
  document.getElementById('map-screen').classList.toggle('radar-mode', mode === 'radar');
  // Radar always shows real station pills regardless of pwVisible (see
  // pwRenderPill/toggleObsLayer) — keep the icon's lit state honest about
  // that instead of looking "off" while pills are actually showing.
  { const obsBtn = document.getElementById('obs-toggle'); if (obsBtn) obsBtn.classList.toggle('active', pwVisible || mode === 'radar'); }
  // Radar is a clean read of live precipitation — clear whatever snow/temp
  // colour drape the previous mode left painted on 'snow-relief' so it isn't
  // still showing through/under the radar image. Leaving radar re-paints the
  // correct ramp anyway (openMapView/renderAccumulatedView/renderLiveTempView
  // all call applyRampWhenReady themselves).
  if (mode === 'radar') applyRampWhenReady(buildSnowRamp(null));
  // orographic-snow-layer is tied to forecastHours[currentIndex] and only
  // refreshed from openMapView (the 'hourly' branch below) — hide it in
  // every other mode rather than leaving a stale hour's overlay showing;
  // it comes back automatically next time openMapView -> refreshOrographicSnow
  // runs (a fresh addLayer, so no explicit "show again" needed here).
  if (mode !== 'hourly' && map && map.getLayer('orographic-snow-layer')) {
    map.setLayoutProperty('orographic-snow-layer', 'visibility', 'none');
  }
  // Snowfall pin shows on hourly + accumulated; clear it only in live/radar view.
  if ((mode === 'live' || mode === 'radar') && snowfallMarker) { snowfallMarker.remove(); snowfallMarker = null; }
  // The minimised-drawer summary is accumulated-only; clear it elsewhere so the
  // :empty rule keeps it hidden.
  if (mode !== 'accumulated') { const dms = document.getElementById('drawer-min-summary'); if (dms) dms.innerHTML = ''; }
  if (mode !== 'live' && mode !== 'hourly') {
    document.getElementById('fl-overlay').style.display = 'none';
  }
  if (mode !== 'live') {
    pwStopLivePlay();
    if (pwDisplayTime != null) { pwDisplayTime = null; for (const id in pwState) pwRenderPill(id); }
  }
  if (mode !== 'radar') radarStopPlay();
  if (map && map.getLayer('radar-layer')) map.setLayoutProperty('radar-layer', 'visibility', mode === 'radar' ? 'visible' : 'none');

  if (mode === 'hourly') {
    stopPlay();
    openMapView(currentIndex < 0 ? 0 : currentIndex);
    pwRenderFreezingOverlay();
  } else if (mode === 'live') {
    stopPlay();
    renderLiveTempView();
  } else if (mode === 'radar') {
    stopPlay();
    radarEnterMode();
  } else {
    stopPlay();
    renderAccumulatedView();
  }
  // Tick the real-time freezing-level nowcast only while in live view.
  if (mode === 'live') pwStartNowcast(); else pwStopNowcast();
}

// True measured cadence of the regional feed (differs from the national
// composite's) — see src/radarRegionalCalibration.js / the radar-map.html
// writeup for how this was probed.
const RADAR_SLOT_MINUTES = [5, 12, 20, 27, 35, 42, 50, 57];
const radarPad2 = (n) => String(n).padStart(2, '0');
function radarFilenameFor(date) {
  return '' + date.getUTCFullYear() + radarPad2(date.getUTCMonth() + 1) + radarPad2(date.getUTCDate()) + radarPad2(date.getUTCHours()) + radarPad2(date.getUTCMinutes());

function radarCandidateTimestamps(count, from) {
  const out = [];

  while (out.length < count) {
    const hourMinutes = RADAR_SLOT_MINUTES.filter((m) => m <= cursor.getUTCMinutes());
    let slot;
    if (hourMinutes.length > 0) {
      slot = new Date(cursor);
      slot.setUTCMinutes(hourMinutes[hourMinutes.length - 1], 0, 0);
    } else {
      slot = new Date(cursor);
      slot.setUTCHours(slot.getUTCHours() - 1, RADAR_SLOT_MINUTES[RADAR_SLOT_MINUTES.length - 1], 0, 0);
    }
    out.push(radarFilenameFor(slot));
    cursor = new Date(slot.getTime() - 60000);
  }
  return out;
}

function radarTsToDate(ts) {

  const { crop, isolate } = RADAR_CALIBRATION;

  const top = Math.round(ih * crop.topPct / 100), bottom = Math.round(ih * crop.bottomPct / 100);
  const left = Math.round(iw * crop.leftPct / 100), right = Math.round(iw * crop.rightPct / 100);
  const cw = Math.max(1, iw - left - right), ch = Math.max(1, ih - top - bottom);

  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const [h, s, v] = radarRgbToHsv(d[i], d[i + 1], d[i + 2]);

// frame — the single-site scan's return quality genuinely degrades near max
// range, and this also avoids a hard-edged cutoff if the view ever pans out
// far enough to see the coverage boundary. Mirrors radar-map.html's
// applyRadialFade (same fadeStartFrac).
function radarApplyRadialFade(canvas, fadeStartFrac = 0.82) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const maxR = Math.min(w, h) / 2;
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (d[i + 3] === 0) continue;
      const distFrac = Math.hypot(x - cx, y - cy) / maxR;
      if (distFrac > fadeStartFrac) {
        const fade = Math.max(0, 1 - (distFrac - fadeStartFrac) / (1 - fadeStartFrac));
        d[i + 3] = Math.round(d[i + 3] * fade);
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}
async function radarFetchAndProcessFrame(ts) {
  const res = await fetch(radarFrameUrl(ts));
  if (!res.ok) return null;
  const blob = await res.blob();
  const blobUrl = URL.createObjectURL(blob);
  try {
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = blobUrl;
    });
    const canvas = radarApplyRadialFade(radarCropAndIsolate(img));
    return { timestamp: ts, dataUrl: canvas.toDataURL('image/png') };
  } finally {
    URL.revokeObjectURL(blobUrl);
  }
}

// "Last 1-2 hours" rather than the feed's full (year-plus) archive — a
// lightweight rolling window that's fast to fetch and process on tab open,
// not a scrubber through months of history.
const RADAR_MAX_FRAMES = 16; // ~2h at the feed's ~7.5-min cadence
const RADAR_REFRESH_POLL_MS = 90000;
let radarFrames = [];       // [{ timestamp, dataUrl }], oldest -> newest
let radarCurrentIndex = -1;
let radarPlayTimer = null;
let radarLoadPromise = null;
let radarPollStarted = false;

function radarDrawFrame(i) {
  if (!map || !radarFrames[i]) return;
  radarCurrentIndex = i;
  const f = radarFrames[i];
  if (map.getSource('radar-src')) {
    map.getSource('radar-src').updateImage({ url: f.dataUrl });
  } else if (map.getLayer('satellite')) {
    // 'satellite' existing is this file's established proxy for "the style
    // has actually attached" (see applyRampWhenReady above) — addSource/
    // addLayer can throw if called before that, so this must not be assumed
    // just because openMapView() already returned.
    map.addSource('radar-src', { type: 'image', url: f.dataUrl, coordinates: RADAR_CALIBRATION.corners });
    // Resort lift lines ('resort-lifts-line', added during initial map setup
    // for the resorts that have lift data) should read as ground markers
    // above the radar colour drape, not buried under it — insert radar-layer
    // before it when it exists. Not every resort has lifts (see the liftData
    // ternary above), so this must not assume the layer is there.
    map.addLayer({
      id: 'radar-layer', type: 'raster', source: 'radar-src',
      paint: { 'raster-opacity': RADAR_CALIBRATION.opacity, 'raster-fade-duration': 0 },
      layout: { visibility: viewMode === 'radar' ? 'visible' : 'none' },
    }, map.getLayer('resort-lifts-line') ? 'resort-lifts-line' : undefined);
    // Dark mode's contour-lines layer (if already on) was inserted at this
    // same 'before resort-lifts-line' slot earlier — radar-layer just took
    // that exact spot, which would otherwise leave contours buried
    // underneath it. Re-assert contours back on top (see setDarkMode).
    bringContoursAboveRadar();
  } else {
    setTimeout(() => radarDrawFrame(i), 80);
    return;
  }
  radarUpdateTimelineUi(i);
}

}

function radarStepFrame(delta) {

// Steps through the real fetched frames one at a time — raw imagery only,
// no cross-fade or motion interpolation (that produced visible warping/
// tearing artifacts on some frames — see chat, removed). Fixed 1s per frame
// regardless of the real gap between frames, for a fast, snappy cycle
// through the set rather than pacing to real elapsed time.
const RADAR_PLAY_FRAME_MS = 1000;
function radarStartPlay() {
  if (radarFrames.length < 2) return;
  if (radarCurrentIndex >= radarFrames.length - 1) radarDrawFrame(0);
  document.getElementById('rtl-play').textContent = '⏸';
  radarPlayTimer = setInterval(() => {
    if (radarCurrentIndex >= radarFrames.length - 1) { radarStopPlay(); return; }
    radarDrawFrame(radarCurrentIndex + 1);
  }, RADAR_PLAY_FRAME_MS);
}
function radarStopPlay() {
  if (radarPlayTimer) { clearInterval(radarPlayTimer); radarPlayTimer = null; }
  document.getElementById('rtl-play').textContent = '▶';
}

async function radarLoadFrames() {
  const found = [];
  for (const ts of radarCandidateTimestamps(24)) {
    if (found.length >= RADAR_MAX_FRAMES) break;
    const frame = await radarFetchAndProcessFrame(ts).catch(() => null);
    if (frame) found.push(frame);
  }
  if (found.length === 0) return;
  radarFrames = found.reverse(); // oldest -> newest
  radarDrawFrame(radarFrames.length - 1);
}

// Polls for a newer frame; if you're viewing the latest one ("live") it
// auto-advances so the drape tracks reality, otherwise your scrub position
// is left alone. Mirrors public/radar-map.html's refresh logic.
async function radarPollForNewFrame() {
  if (radarFrames.length === 0) return;
  const latestKnown = radarFrames[radarFrames.length - 1].timestamp;
  const candidates = radarCandidateTimestamps(4).filter((ts) => ts > latestKnown).reverse();
  for (const ts of candidates) {
    const frame = await radarFetchAndProcessFrame(ts).catch(() => null);
    if (!frame) continue;
    const wasAtLive = radarCurrentIndex === radarFrames.length - 1 && !radarPlayTimer;
    const currentTs = radarFrames[radarCurrentIndex]?.timestamp;
    radarFrames.push(frame);
    if (radarFrames.length > RADAR_MAX_FRAMES) radarFrames.shift();
    document.getElementById('rtl-slider').max = radarFrames.length - 1;
    if (wasAtLive) {
      radarDrawFrame(radarFrames.length - 1);
    } else {
      const idx = radarFrames.findIndex((f) => f.timestamp === currentTs);
      radarCurrentIndex = idx >= 0 ? idx : 0;
      document.getElementById('rtl-slider').value = radarCurrentIndex;
      document.getElementById('rtl-prev').disabled = radarCurrentIndex <= 0;
      document.getElementById('rtl-next').disabled = radarCurrentIndex >= radarFrames.length - 1;
    }
  }
}

function radarEnterMode() {
  if (map && map.getLayer('radar-layer')) map.setLayoutProperty('radar-layer', 'visibility', 'visible');
  if (!radarPollStarted) {

    setInterval(radarPollForNewFrame, RADAR_REFRESH_POLL_MS);
  }
  if (radarFrames.length > 0) {
    radarDrawFrame(radarCurrentIndex < 0 ? radarFrames.length - 1 : radarCurrentIndex);
    return;
  }
  if (!radarLoadPromise) {
    document.getElementById('rtl-label').textContent = 'Loading…';
    radarLoadPromise = radarLoadFrames();

}

// Blend two hours' freezing level/snowfall linearly so the snow-relief ramp
// (built from whichever blended values come out) animates as a continuous
// fade between hours instead of jumping in discrete steps during playback.
function blendHour(a, b, t) {
  return {
    freezingLevel: a.freezingLevel + (b.freezingLevel - a.freezingLevel) * t,
    snowfallMm: a.snowfallMm + (b.snowfallMm - a.snowfallMm) * t

}

function togglePlay() {

function startPlay() {
  if (currentIndex < 0) return;
  if (currentIndex >= forecastHours.length - 1) openMapView(0); // restart from the beginning
  document.getElementById('tl-play').textContent = '⏸';
  if (playTimer) cancelAnimationFrame(playTimer);

  const tickMs = BASE_INTERVAL_MS / playSpeed;
  let tickStart = performance.now();

  const frame = (now) => {
    if (currentIndex >= forecastHours.length - 1) { stopPlay(); return; }
    const t = Math.min(1, (now - tickStart) / tickMs);
    const from = forecastHours[currentIndex];
    const to = forecastHours[currentIndex + 1];
    const blended = blendHour(from, to, t);
    applyRampWhenReady(buildSnowRamp(blended));
    // Keep the tap-to-probe in sync during smooth playback too, not just at
    // each full-hour tick (openMapView) — same boundary logic as there/
    // buildSnowRamp, so a tap mid-animation still matches what's rendered.
    const blendedSnowing = blended.snowfallMm >= SNOWFALL_THRESHOLD_MM;
    currentSnowLine = blendedSnowing ? blended.freezingLevel - SNOW_OFFSET : blended.freezingLevel;
    currentHourCm = blendedSnowing ? blended.snowfallMm / 10 : 0;
    showSnowfallMarker(blendedSnowing ? `❄ ${blended.snowfallMm.toFixed(1)} mm/hr` : '');

    if (t >= 1) {
      openMapView(currentIndex + 1);
      tickStart = now;
      if (currentIndex >= forecastHours.length - 1) return; // stopPlay() already ran inside openMapView
    }
    playTimer = requestAnimationFrame(frame);
  };
  playTimer = requestAnimationFrame(frame);
}

// This page always opens straight into the 3D map — to the hour given by
// ?time=2026-06-25T20:00 if present, otherwise the closest hour to now.
function openFromQueryParams() {
  // openMapView() itself now handles forecastHours being empty (it still
  // creates the base map either way) — this must not bail out before ever
  // reaching it, or the map never initializes while data is slow to load.
  if (forecastHours.length === 0) { openMapView(0); restoreViewMode(); return; }
  const targetTime = new URLSearchParams(window.location.search).get('time');
  const targetMs = targetTime ? new Date(targetTime).getTime() : Date.now();
  let bestIdx = 0, bestDiff = Infinity;
  forecastHours.forEach((r, i) => {
    const diff = Math.abs(new Date(r.time).getTime() - targetMs);
    if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
  });
  openMapView(bestIdx);
  restoreViewMode();
}

function pwAgo(unixSec) {

  if (s < 45) return 'just now';
