<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whakapapa — Snowfall Elevation Forecast</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.min.css" />
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #0f1c30 0%, #14253e 100%);
    min-height: 100vh;
    color: #fff;
  }

  /* ── Fullscreen map ────────────────────────────────────────────────── */
  #map-screen { position: fixed; inset: 0; z-index: 500; }
  #map { width: 100%; height: 100%; }
  #wind-canvas { position: absolute; inset: 0; z-index: 4; pointer-events: none; }

  /* ── Timeline scrubber (play/pause + draggable slider) ─────────────────── */
  #timeline {
    position: absolute; left: 20px; right: 20px; bottom: 20px; z-index: 10;
    display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(14px);
    border-radius: 30px; padding: 10px 18px;
    box-shadow: 0 6px 26px rgba(0,0,0,0.35);
  }
  #tl-play {
    flex-shrink: 0; background: rgba(255,255,255,0.14); color: #fff; border: none;
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #tl-play:hover { background: rgba(255,255,255,0.26); }
  #tl-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: rgba(255,255,255,0.25);
    cursor: pointer; outline: none;
  }
  #tl-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer;
    border: 3px solid #2563eb;
  }
  #tl-slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer; border: 3px solid #2563eb;
  }
  .tl-step {
    flex-shrink: 0; background: transparent; color: rgba(255,255,255,0.85); border: none;
    font-size: 1.2rem; cursor: pointer; width: 26px; height: 38px;
    display: flex; align-items: center; justify-content: center;
  }
  .tl-step:hover:not(:disabled) { color: #fff; }
  .tl-step:disabled { opacity: 0.3; cursor: default; }
  #tl-label {
    flex-shrink: 0; color: #fff; font-size: 0.78rem; font-weight: 600;
    min-width: 118px; text-align: right; font-variant-numeric: tabular-nums;
  }

  #snow-info {
    position: absolute; bottom: 92px; left: 20px; z-index: 10;
    background: rgba(10,20,36,0.78); backdrop-filter: blur(14px);
    border-radius: 14px; padding: 16px 20px; min-width: 220px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  #snow-info h3 { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); margin-bottom: 10px; }
  .si-row { display: flex; justify-content: space-between; gap: 14px; font-size: 0.84rem; padding: 4px 0; }
  .si-row .l { color: rgba(255,255,255,0.55); }
  .si-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }

  #speed-select {
    position: absolute; bottom: 92px; right: 20px; z-index: 10;
    display: flex; gap: 4px;
    background: rgba(10,20,36,0.78); backdrop-filter: blur(14px);
    border-radius: 12px; padding: 5px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .speed-btn {
    background: transparent; color: rgba(255,255,255,0.6); border: none;
    padding: 7px 11px; border-radius: 8px; font-size: 0.72rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .speed-btn:hover { color: #fff; }
  .speed-btn.active { background: #2563eb; color: #fff; }

  #map-enlarge, #map-close {
    position: absolute; top: 20px; z-index: 20;
    background: rgba(255,255,255,0.12); color: #fff; border: none;
    width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem; cursor: pointer;
    transition: background 0.15s;
  }
  #map-enlarge { left: 20px; }
  #map-close { right: 64px; display: none; }
  #map-enlarge:hover, #map-close:hover { background: rgba(255,255,255,0.25); }
  #map-screen.is-fullscreen #map-enlarge { display: none; }
  #map-screen.is-fullscreen #map-close { display: block; }

  /* ── Click-to-probe popup ──────────────────────────────────────────── */
  .click-popup {
    position: absolute; z-index: 30; transform: translate(-50%, -130%);
    background: rgba(0,0,0,0.88); color: #fff;
    padding: 8px 16px; border-radius: 999px;
    font-size: 0.8rem; font-weight: 600; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    pointer-events: none;
  }

  /* ── Top mode/period switchers ──────────────────────────────────────── */
  #top-controls {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 15;
    display: flex; gap: 10px;
  }
  .pill-group {
    display: flex; gap: 4px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(14px);
    border-radius: 12px; padding: 5px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .pill-btn {
    background: transparent; color: rgba(255,255,255,0.65); border: none;
    padding: 8px 16px; border-radius: 8px; font-size: 0.78rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .pill-btn:hover { color: #fff; }
  .pill-btn.active { background: #2563eb; color: #fff; }
  #period-switch { display: none; }

  /* ── Accumulated snowfall info + depth legend ───────────────────────── */
  #info-accum { display: none; }
  #accum-total { font-size: 1.7rem; font-weight: 800; margin: 2px 0 12px; }
  .legend-row {
    display: flex; align-items: center; gap: 9px; font-size: 0.78rem;
    padding: 4px 0; color: rgba(255,255,255,0.75);
  }
  .legend-row.active-band { color: #fff; font-weight: 700; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.35); }

</style>
</head>
<body>

<div id="map-screen">
  <div id="map"></div>
  <canvas id="wind-canvas"></canvas>
  <button id="map-enlarge" onclick="enterFullscreenView()" title="Fullscreen">⤢</button>
  <button id="map-close" onclick="exitFullscreenView()" title="Close fullscreen">✕</button>

  <div id="top-controls">
    <div class="pill-group" id="mode-switch">
      <button class="pill-btn active" data-mode="hourly" onclick="setViewMode('hourly')">Hourly</button>
      <button class="pill-btn" data-mode="accumulated" onclick="setViewMode('accumulated')">Accumulated</button>
    </div>
    <div class="pill-group" id="period-switch">
      <button class="pill-btn active" data-days="5" onclick="setPeriod(5)">5 Day</button>
      <button class="pill-btn" data-days="10" onclick="setPeriod(10)">10 Day</button>
      <button class="pill-btn" data-days="15" onclick="setPeriod(15)">15 Day</button>
    </div>
  </div>

  <div id="snow-info">
    <div id="info-hourly">
      <h3>Selected Forecast Hour</h3>
      <div class="si-row"><span class="l">Time</span><span class="v" id="si-time">—</span></div>
      <div class="si-row"><span class="l">Summit Temp</span><span class="v" id="si-temp">—</span></div>
      <div class="si-row"><span class="l">Freezing Level</span><span class="v" id="si-fl">—</span></div>
      <div class="si-row"><span class="l">Snow Line</span><span class="v" id="si-sl">—</span></div>
      <div class="si-row"><span class="l">Snowfall (1h)</span><span class="v" id="si-snow">—</span></div>
      <div class="si-row"><span class="l">Wind</span><span class="v" id="si-wind">—</span></div>
    </div>
    <div id="info-accum">
      <h3 id="accum-period-label">Next 5 Days</h3>
      <div id="accum-total">—</div>
      <div class="si-row"><span class="l">Approx. Snow Line</span><span class="v" id="accum-snowline">—</span></div>
      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 12px 0 10px;">
      <div id="depth-legend"></div>
    </div>
  </div>
  <div id="timeline">
    <button id="tl-play" onclick="togglePlay()">▶</button>
    <button class="tl-step" id="tl-prev" onclick="stepHour(-1)">‹</button>
    <input type="range" id="tl-slider" min="0" max="0" step="1" value="0">
    <button class="tl-step" id="tl-next" onclick="stepHour(1)">›</button>
    <span id="tl-label">—</span>
  </div>
  <div id="speed-select">
    <button class="speed-btn" data-speed="1" onclick="setSpeed(1)">1×</button>
    <button class="speed-btn" data-speed="2" onclick="setSpeed(2)">2×</button>
    <button class="speed-btn active" data-speed="3" onclick="setSpeed(3)">3×</button>
    <button class="speed-btn" data-speed="5" onclick="setSpeed(5)">5×</button>
    <button class="speed-btn" data-speed="10" onclick="setSpeed(10)">10×</button>
  </div>
</div>

<script>
// ── Resort configs — matches snow-cam-dashboard's RESORTS object exactly ─────
const RESORT_CONFIG = {
  ruapehu: {
    name: 'Mt Ruapehu (Whakapapa)',
    lat: -39.28, lon: 175.57, summitElev: 2300, baseElev: 1630, timezone: 'Pacific/Auckland',
    topElev: 2750, // approx summit/crater rim for the colour ramp's upper bound
    center: [175.55, -39.25], zoom: 12.6, pitch: 64, bearing: 160
  },
  cardrona: {
    name: 'Cardrona Alpine Resort',
    lat: -44.76, lon: 169.0, summitElev: 1860, baseElev: 1640, timezone: 'Pacific/Auckland',
    topElev: 1950, // approx summit ridge for the colour ramp's upper bound
    // Camera framing targets the actual ski basin (not the weather sample point above).
    center: [168.9501, -44.8676], zoom: 13.6, pitch: 62, bearing: 200
  }
};

const resortKey = new URLSearchParams(window.location.search).get('resort') === 'cardrona' ? 'cardrona' : 'ruapehu';
const LOC = RESORT_CONFIG[resortKey];
const TOP_ELEV = LOC.topElev;
const SNOW_OFFSET = 300; // snow falls to 300m below the freezing level

document.title = `${LOC.name} — Snowfall Elevation Forecast`;

let forecastHours = [];

// ── Fetch hourly forecast from Open-Meteo, GFS + ECMWF averaged ─────────────
// GFS exposes a direct freezing-level field; ECMWF doesn't (Open-Meteo always
// returns null for it), so ECMWF's freezing level is derived the same way the
// main dashboard does it — linear interpolation between a summit and base
// temperature sample. Snowfall and freezing level are then averaged across
// both models so the map isn't fully exposed to one model's individual bias
// or glitches.
async function loadForecast() {
  try {
    const base = `https://api.open-meteo.com/v1/forecast?latitude=${LOC.lat}&longitude=${LOC.lon}&temperature_unit=celsius&timezone=${LOC.timezone}&forecast_days=16`;
    const gfsSummitUrl = `${base}&wind_speed_unit=kmh&elevation=${LOC.summitElev}&hourly=temperature_2m,precipitation,snowfall,freezinglevel_height,windspeed_700hPa,winddirection_700hPa&models=gfs_global`;
    const ecmwfSummitUrl = `${base}&elevation=${LOC.summitElev}&hourly=temperature_2m,snowfall&models=ecmwf_ifs025`;
    const ecmwfBaseUrl = `${base}&elevation=${LOC.baseElev}&hourly=temperature_2m&models=ecmwf_ifs025`;

    const [gfsRes, ecmwfSummitRes, ecmwfBaseRes] = await Promise.all([
      fetch(gfsSummitUrl), fetch(ecmwfSummitUrl), fetch(ecmwfBaseUrl)
    ]);
    if (!gfsRes.ok) throw new Error(`Open-Meteo responded ${gfsRes.status}`);
    const gfs = (await gfsRes.json()).hourly;
    const ecmwfSummit = ecmwfSummitRes.ok ? (await ecmwfSummitRes.json()).hourly : null;
    const ecmwfBase = ecmwfBaseRes.ok ? (await ecmwfBaseRes.json()).hourly : null;

    // GFS occasionally spits out a spurious single-hour precip/snow spike at a
    // given grid cell (a model artifact, especially near steep terrain). Cap
    // any one hour's snowfall so a single glitchy reading can't blow out the
    // multi-day accumulated total.
    const MAX_HOURLY_SNOWFALL_MM = 60; // ~6cm/hr, generous even for a true storm pulse

    forecastHours = gfs.time.map((t, i) => {
      const gfsFL = gfs.freezinglevel_height[i];
      const gfsSnowMm = Math.min((gfs.snowfall[i] || 0) * 10, MAX_HOURLY_SNOWFALL_MM);
      const gfsTemp = gfs.temperature_2m[i];

      let ecmwfFL = null;
      if (ecmwfSummit && ecmwfBase) {
        const summitT = ecmwfSummit.temperature_2m[i];
        const baseT = ecmwfBase.temperature_2m[i];
        if (summitT != null && baseT != null && summitT !== baseT) {
          ecmwfFL = LOC.baseElev + (baseT * (LOC.summitElev - LOC.baseElev)) / (baseT - summitT);
        }
      }
      const ecmwfSnowMm = ecmwfSummit?.snowfall?.[i] != null
        ? Math.min(ecmwfSummit.snowfall[i] * 10, MAX_HOURLY_SNOWFALL_MM)
        : null;
      const ecmwfTemp = ecmwfSummit?.temperature_2m?.[i] ?? null;

      return {
        time: t,
        temp: ecmwfTemp != null ? (gfsTemp + ecmwfTemp) / 2 : gfsTemp,
        precip: gfs.precipitation[i],
        snowfallMm: ecmwfSnowMm != null ? (gfsSnowMm + ecmwfSnowMm) / 2 : gfsSnowMm,
        freezingLevel: ecmwfFL != null ? (gfsFL + ecmwfFL) / 2 : gfsFL,
        // GFS only — used purely to drive the decorative wind streamline
        // overlay, not averaged with ECMWF like the other fields.
        windSpeedKmh: gfs.windspeed_700hPa?.[i] ?? null,
        windDirDeg: gfs.winddirection_700hPa?.[i] ?? null
      };
    }).filter(r => r.freezingLevel != null);
  } catch (err) {
    forecastHours = buildDemoForecast();
  }
  openFromQueryParams();
}

// Fallback so the demo still works offline / if the API is unreachable.
function buildDemoForecast() {
  const rows = [];
  const start = new Date();
  start.setMinutes(0, 0, 0);
  for (let i = 0; i < 48; i++) {
    const t = new Date(start.getTime() + i * 3600 * 1000);
    const wave = Math.sin(i / 6) * 0.5 + 0.5; // a storm-like bump
    const snowfallMm = i > 14 && i < 22 ? (8 + wave * 14) : 0;
    rows.push({
      time: t.toISOString().slice(0, 16),
      temp: -2 + Math.sin(i / 8) * 3,
      precip: snowfallMm > 0 ? snowfallMm / 10 : 0,
      snowfallMm,
      freezingLevel: 1500 + Math.sin(i / 10) * 300,
      windSpeedKmh: 20 + wave * 35,
      windDirDeg: (270 + i * 4) % 360
    });
  }
  return rows;
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString('en-NZ', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

// ── Map ────────────────────────────────────────────────────────────────────
let map = null;

function initMap() {
  if (map) return;
  map = new maplibregl.Map({
    container: 'map',
    zoom: LOC.zoom,
    center: LOC.center,
    pitch: LOC.pitch,
    bearing: LOC.bearing,
    maxPitch: 85,
    attributionControl: false,
    style: {
      version: 8,
      sources: {
        terrain: { type: 'raster-dem', url: 'https://tiles.mapterhorn.com/tilejson.json', tileSize: 512 },
        satellite: {
          type: 'raster',
          tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
          tileSize: 256,
          attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics'
        }
      },
      layers: [
        { id: 'background', type: 'background', paint: { 'background-color': '#2d5a1b' } },
        { id: 'satellite', type: 'raster', source: 'satellite', paint: { 'raster-opacity': 1, 'raster-saturation': 0.1, 'raster-contrast': 0.05 } },
        {
          id: 'depth-shade', type: 'hillshade', source: 'terrain',
          paint: {
            'hillshade-shadow-color': 'rgba(30,20,10,0.45)',
            'hillshade-highlight-color': 'rgba(255,255,255,0)',
            'hillshade-accent-color': 'rgba(80,60,40,0.2)',
            'hillshade-illumination-direction': 310,
            'hillshade-exaggeration': 0.6
          }
        },
        {
          // Forecasted snow coverage, tinted by elevation from the snow line
          // (freezing level − 300m) up to the summit, transparent below.
          id: 'snow-relief', type: 'color-relief', source: 'terrain',
          paint: { 'color-relief-color': ['interpolate', ['linear'], ['elevation'], 0, 'rgba(255,255,255,0)'] }
        }
      ],
      terrain: { source: 'terrain', exaggeration: 1.2 }
    }
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true, showZoom: true, showCompass: true }), 'top-right');
  map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
  // The compact attribution control is a <details> element that MapLibre
  // auto-opens the moment it first populates with attribution text (sources
  // load asynchronously, so this can happen well after map creation) — force
  // it closed that one time so only the small (i) icon shows by default,
  // without blocking the user from opening it themselves afterwards.
  const attribEl = document.querySelector('.maplibregl-ctrl-attrib');
  const attribInner = attribEl?.querySelector('.maplibregl-ctrl-attrib-inner');
  if (attribEl && attribInner) {
    const closeOnceTextAppears = () => {
      if (attribInner.textContent.trim() === '') return;
      attribEl.removeAttribute('open');
      attribEl.classList.remove('maplibregl-compact-show');
      observer.disconnect();
    };
    const observer = new MutationObserver(closeOnceTextAppears);
    observer.observe(attribInner, { childList: true, characterData: true, subtree: true });
  }

  map.on('click', (e) => {
    const rawElev = map.queryTerrainElevation(e.lngLat, { exaggerated: false });
    if (rawElev == null || isNaN(rawElev)) return;
    // The DEM tileset occasionally returns a spurious spike well above the
    // real summit (e.g. 3241m read back for Ruapehu, whose true summit is
    // ~2797m) — clamp to this resort's configured upper bound so the probe
    // popup never shows an impossible elevation.
    const elev = Math.min(rawElev, TOP_ELEV);
    const depthCm = getDepthAtElevation(elev);
    showClickPopup(e.point.x, e.point.y, `${depthCm.toFixed(1)}cm`);
  });

  // Very slow auto-rotate on the initial view, purely decorative — stops for
  // good the moment the user actually touches the map (drag, zoom, pinch,
  // scroll), so it never fights with their own camera control.
  let autoRotateActive = true;
  const stopAutoRotate = () => { autoRotateActive = false; };
  const rotateStep = () => {
    if (!autoRotateActive) return;
    map.setBearing(map.getBearing() + 0.015);
    requestAnimationFrame(rotateStep);
  };
  requestAnimationFrame(rotateStep);
  const mapEl = document.getElementById('map');
  ['mousedown', 'touchstart', 'wheel'].forEach((evt) =>
    mapEl.addEventListener(evt, stopAutoRotate, { once: true, passive: true })
  );
}

// ── Wind streamline overlay ───────────────────────────────────────────────
// Decorative only: applies the single selected hour's wind speed/direction
// uniformly across the whole view (not a true spatially-varying field), but
// each particle is tracked as a real lng/lat on the ground and projected to
// screen pixels via map.project() every frame. That hands perspective to
// MapLibre's actual camera for free — distant particles get small per-frame
// pixel deltas (slow, short), near ones get large deltas (fast, long) — so
// the flow reads as wind moving across the terrain, not rain falling through
// the sky the way a flat screen-space version did.
const WIND_PARTICLE_COUNT = 260;
const WIND_SPEED_MULTIPLIER = 12; // visual-only speedup so flow reads at map scale
let currentWindSpeedKmh = 0;
let currentWindDirDeg = 0;
let windParticles = [];
let windCanvas = null;
let windCtx = null;
let windAnimRunning = false;

function degToCompass(deg) {
  if (deg == null) return '';
  const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function resizeWindCanvas() {
  if (!windCanvas) return;
  const rect = windCanvas.parentElement.getBoundingClientRect();
  windCanvas.width = rect.width;
  windCanvas.height = rect.height;
}

// Move a lng/lat a given distance (metres) along a compass bearing, using a
// flat-earth approximation — plenty accurate at single-mountain map scale.
function destinationPoint(lng, lat, bearingDeg, distanceM) {
  const R = 6371000;
  const bearingRad = (bearingDeg * Math.PI) / 180;
  const dLat = ((distanceM * Math.cos(bearingRad)) / R) * (180 / Math.PI);
  const dLng = ((distanceM * Math.sin(bearingRad)) / (R * Math.cos((lat * Math.PI) / 180))) * (180 / Math.PI);
  return [lng + dLng, lat + dLat];
}

function randomGroundPoint() {
  const b = map.getBounds();
  // Spawn slightly beyond the visible bounds too, so particles can be seen
  // drifting in from just off-screen rather than always popping into view.
  const lngPad = (b.getEast() - b.getWest()) * 0.15;
  const latPad = (b.getNorth() - b.getSouth()) * 0.15;
  return [
    b.getWest() - lngPad + Math.random() * (b.getEast() - b.getWest() + lngPad * 2),
    b.getSouth() - latPad + Math.random() * (b.getNorth() - b.getSouth() + latPad * 2)
  ];
}

function spawnWindParticle() {
  const [lng, lat] = randomGroundPoint();
  return { lng, lat, sx: null, sy: null, life: Math.random() * 90, maxLife: 60 + Math.random() * 60 };
}

function stepWindParticles() {
  const w = windCanvas.width;
  const h = windCanvas.height;
  if (w === 0 || h === 0 || !map) return;

  // Wind direction is meteorological "from" — particles travel toward dir+180.
  const travelBearing = (currentWindDirDeg + 180) % 360;
  const speedMps = (Math.min(currentWindSpeedKmh, 150) / 3.6) * WIND_SPEED_MULTIPLIER;
  const distancePerFrame = speedMps / 60; // approx metres per animation frame

  windCtx.globalCompositeOperation = 'destination-out';
  windCtx.fillStyle = 'rgba(0,0,0,0.1)';
  windCtx.fillRect(0, 0, w, h);
  windCtx.globalCompositeOperation = 'source-over';
  windCtx.lineCap = 'round';

  windParticles.forEach((p) => {
    const [nextLng, nextLat] = destinationPoint(p.lng, p.lat, travelBearing, distancePerFrame);
    p.lng = nextLng;
    p.lat = nextLat;
    p.life += 1;

    const projected = map.project([p.lng, p.lat]);
    const inBounds = isFinite(projected.x) && isFinite(projected.y) &&
      projected.x > -50 && projected.x < w + 50 && projected.y > -50 && projected.y < h + 50;

    if (!inBounds || p.life > p.maxLife) {
      Object.assign(p, spawnWindParticle(), { sx: null, sy: null });
      return;
    }

    if (p.sx != null) {
      // Per-frame pixel travel distance is the natural perspective cue —
      // near (fast-moving-on-screen) particles draw a longer, thicker
      // streak than distant (slow-moving-on-screen) ones, with no manual
      // depth bookkeeping needed.
      const pixelDist = Math.hypot(projected.x - p.sx, projected.y - p.sy);
      const widthScale = Math.min(1, pixelDist / 6);
      windCtx.strokeStyle = `rgba(255,255,255,${0.4 + widthScale * 0.5})`;
      windCtx.lineWidth = 1.8 + widthScale * 3.6;
      windCtx.beginPath();
      windCtx.moveTo(p.sx, p.sy);
      windCtx.lineTo(projected.x, projected.y);
      windCtx.stroke();
    }
    p.sx = projected.x;
    p.sy = projected.y;
  });
}

function windAnimLoop() {
  if (!windAnimRunning) return;
  stepWindParticles();
  requestAnimationFrame(windAnimLoop);
}

function startWindOverlay() {
  windCanvas = document.getElementById('wind-canvas');
  windCtx = windCanvas.getContext('2d');
  resizeWindCanvas();
  window.addEventListener('resize', resizeWindCanvas);
  if (!windAnimRunning) {
    windAnimRunning = true;
    // Particles need real map bounds to spawn into, so wait until the map
    // (created lazily by openMapView) actually exists.
    const tryStart = () => {
      if (!map) { setTimeout(tryStart, 100); return; }
      windParticles = Array.from({ length: WIND_PARTICLE_COUNT }, () => spawnWindParticle());
      requestAnimationFrame(windAnimLoop);
    };
    tryStart();
  }
}

// ── Click-to-probe popup — snow depth + elevation at the clicked point ──────
let currentSnowLine = null;
let currentHourCm = 0;
let currentAccumTotalCm = 0;

function getDepthAtElevation(elev) {
  if (currentSnowLine == null || elev < currentSnowLine) return 0;
  if (viewMode === 'hourly') return currentHourCm;
  const frac = Math.min(1, (elev - currentSnowLine) / (TOP_ELEV - currentSnowLine));
  return currentAccumTotalCm * frac;
}

let clickPopupEl = null;
let clickPopupTimer = null;

function showClickPopup(x, y, text) {
  if (clickPopupEl) clickPopupEl.remove();
  clickPopupEl = document.createElement('div');
  clickPopupEl.className = 'click-popup';
  clickPopupEl.style.left = x + 'px';
  clickPopupEl.style.top = y + 'px';
  clickPopupEl.textContent = text;
  document.getElementById('map-screen').appendChild(clickPopupEl);

  clearTimeout(clickPopupTimer);
  clickPopupTimer = setTimeout(() => {
    if (clickPopupEl) { clickPopupEl.remove(); clickPopupEl = null; }
  }, 4000);
}

// Build the colour-relief fill for the currently selected forecast hour:
// flat 25% blue from the snow line up when there's no active snowfall, or
// the intensity-scaled blue-to-white gradient (scaled by snowfall amount)
// when there is.
const SNOWFALL_THRESHOLD_MM = 0.1;

function buildSnowRamp(hour) {
  const snowLine = hour.freezingLevel - SNOW_OFFSET;

  if (hour.snowfallMm < SNOWFALL_THRESHOLD_MM) {
    const color = 'rgba(60,130,255,0.4)';
    return [
      'interpolate', ['linear'], ['elevation'],
      snowLine - 1, 'rgba(255,255,255,0)',
      snowLine, color,
      TOP_ELEV, color
    ];
  }

  // Intensity scales the colour/opacity with forecasted snowfall amount (mm).
  const intensity = Math.max(0.65, Math.min(1, hour.snowfallMm / 14));
  const a1 = (0.85 * intensity).toFixed(2);
  const a2 = (0.97 * intensity).toFixed(2);
  const a3 = (1 * intensity).toFixed(2);

  return [
    'interpolate', ['linear'], ['elevation'],
    snowLine - 1, 'rgba(205,225,255,0)',
    snowLine, `rgba(205,225,255,${a1})`,
    snowLine + 100, `rgba(225,240,255,${a2})`,
    TOP_ELEV, `rgba(248,251,255,${a3})`
  ];
}

// The 'snow-relief' layer isn't guaranteed to exist the instant the map is
// constructed (style/layers attach asynchronously), so poll briefly until it
// does rather than relying on a single 'load'/'idle' event that may fire too early.
let applyRampToken = 0;
function applyRampWhenReady(rampArray) {
  const token = ++applyRampToken;
  const tryApply = () => {
    if (token !== applyRampToken) return; // a newer selection was made — abandon this one
    if (map.getLayer('snow-relief')) {
      map.setPaintProperty('snow-relief', 'color-relief-color', rampArray);
    } else {
      setTimeout(tryApply, 80);
    }
  };
  tryApply();
}

let currentIndex = -1;

function openMapView(index) {
  currentIndex = Math.max(0, Math.min(index, forecastHours.length - 1));
  const hour = forecastHours[currentIndex];

  initMap();

  applyRampWhenReady(buildSnowRamp(hour));

  currentSnowLine = hour.freezingLevel - SNOW_OFFSET;
  currentHourCm = hour.snowfallMm / 10;

  document.getElementById('si-time').textContent = fmtTime(hour.time);
  document.getElementById('si-temp').textContent = hour.temp.toFixed(1) + '°C';
  document.getElementById('si-fl').textContent = Math.round(hour.freezingLevel) + ' m';
  document.getElementById('si-sl').textContent = Math.round(hour.freezingLevel - SNOW_OFFSET) + ' m';
  document.getElementById('si-snow').textContent = hour.snowfallMm.toFixed(1) + ' mm';
  document.getElementById('si-wind').textContent = hour.windSpeedKmh != null
    ? `${Math.round(hour.windSpeedKmh)} km/h ${degToCompass(hour.windDirDeg)}`
    : '—';
  currentWindSpeedKmh = hour.windSpeedKmh ?? 0;
  currentWindDirDeg = hour.windDirDeg ?? 0;

  document.getElementById('tl-prev').disabled = currentIndex <= 0;
  document.getElementById('tl-next').disabled = currentIndex >= forecastHours.length - 1;
  document.getElementById('tl-label').textContent = fmtTime(hour.time);

  const slider = document.getElementById('tl-slider');
  slider.max = forecastHours.length - 1;
  slider.value = currentIndex;

  if (currentIndex >= forecastHours.length - 1) stopPlay();

  setTimeout(() => map.resize(), 60);
}

function stepHour(delta) {
  if (currentIndex < 0) return;
  openMapView(currentIndex + delta);
}

// ── Accumulated snowfall view — total depth over the next 5/10/15 days ──────
// Distinct depth bands so colours are easy to tell apart at a glance: pale
// blue (light) through to red (extreme), each with good contrast against
// its neighbours. The mountain is tinted with all five bands stacked by
// elevation (light blue near the snow line, up through blue/teal/amber to
// red at the summit) so the colour key is clearly visible across the
// terrain — the legend highlights which single band the actual forecast
// total falls into.
const DEPTH_BANDS = [
  { max: 1,        label: '0–1 cm',     swatch: '#ffffff', color: 'rgba(255,255,255,0.30)' },
  { max: 2,        label: '1–2 cm',     swatch: '#e8f4ff', color: 'rgba(232,244,255,0.80)' },
  { max: 4,        label: '2–4 cm',     swatch: '#b8dcfc', color: 'rgba(184,220,252,0.84)' },
  { max: 10,       label: '5–10 cm',    swatch: '#7bb8ea', color: 'rgba(123,184,234,0.87)' },
  { max: 15,       label: '10–15 cm',   swatch: '#4f8fe0', color: 'rgba(79,143,224,0.89)' },
  { max: 25,       label: '15–25 cm',   swatch: '#6a4fd8', color: 'rgba(106,79,216,0.91)' },
  { max: 50,       label: '25–50 cm',   swatch: '#9530d8', color: 'rgba(149,48,216,0.93)' },
  { max: Infinity, label: '50 cm+',     swatch: '#c41e3a', color: 'rgba(196,30,58,0.95)' }
];

function renderDepthLegend(activeBand) {
  const el = document.getElementById('depth-legend');
  el.innerHTML = DEPTH_BANDS.map(b => `
    <div class="legend-row${b === activeBand ? ' active-band' : ''}">
      <div class="legend-swatch" style="background:${b.swatch}"></div>
      <span>${b.label}</span>
    </div>
  `).join('');
}

// Stack only the depth bands actually reached by the forecast total, evenly
// between the snow line and the summit, as hard-edged steps. A light total
// (e.g. 5cm, band index 1) only shows a couple of pale blue steps; a big
// total (e.g. 120cm, band index 7) shows the full climb through blue/purple
// to red. Previously this always stacked all 10 bands regardless of the
// real total, so a 2cm and a 200cm forecast rendered identically.
function buildAccumRamp(snowLine, bandIndex) {
  const n = bandIndex + 1;
  const bandWidth = (TOP_ELEV - snowLine) / n;
  const stops = ['interpolate', ['linear'], ['elevation'], snowLine - 1, 'rgba(255,255,255,0)'];
  DEPTH_BANDS.slice(0, n).forEach((b, i) => {
    const start = snowLine + bandWidth * i;
    const end = snowLine + bandWidth * (i + 1);
    stops.push(start, b.color);
    stops.push(end - 1, b.color);
  });
  return stops;
}

function renderAccumulatedView() {
  if (forecastHours.length === 0) return;
  initMap();

  const nowMs = Date.now();
  let startIdx = 0, bestDiff = Infinity;
  forecastHours.forEach((r, i) => {
    const diff = Math.abs(new Date(r.time).getTime() - nowMs);
    if (diff < bestDiff) { bestDiff = diff; startIdx = i; }
  });
  const window_ = forecastHours.slice(startIdx, startIdx + accumDays * 24);
  const totalCm = window_.reduce((s, r) => s + r.snowfallMm, 0) / 10;
  // Use the lowest freezing level reached during the window, not the average —
  // averaging dilutes a cold snow event with milder days elsewhere in the same
  // window, which made a longer period (e.g. 15 Day) show a *higher* snow line
  // than a shorter one (10 Day) it fully contains. The minimum can only stay
  // the same or drop as the window grows, so longer periods never show less
  // low-elevation coverage than the shorter periods nested inside them.
  const minFreezing = Math.min(...window_.map((r) => r.freezingLevel));
  const snowLine = minFreezing - SNOW_OFFSET;

  const bandIndex = DEPTH_BANDS.findIndex(b => totalCm <= b.max);
  const band = bandIndex === -1 ? DEPTH_BANDS[DEPTH_BANDS.length - 1] : DEPTH_BANDS[bandIndex];

  applyRampWhenReady(buildAccumRamp(snowLine, bandIndex === -1 ? DEPTH_BANDS.length - 1 : bandIndex));

  currentSnowLine = snowLine;
  currentAccumTotalCm = totalCm;

  document.getElementById('accum-period-label').textContent = `Next ${accumDays} Days`;
  document.getElementById('accum-total').textContent = totalCm.toFixed(0) + ' cm';
  document.getElementById('accum-snowline').textContent = Math.round(snowLine) + ' m';
  renderDepthLegend(band);

  setTimeout(() => map.resize(), 60);
}

let viewMode = 'hourly'; // 'hourly' | 'accumulated'
let accumDays = 5;

function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('#mode-switch .pill-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('period-switch').style.display = mode === 'accumulated' ? 'flex' : 'none';
  document.getElementById('timeline').style.display = mode === 'hourly' ? 'flex' : 'none';
  document.getElementById('speed-select').style.display = mode === 'hourly' ? 'flex' : 'none';
  document.getElementById('info-hourly').style.display = mode === 'hourly' ? 'block' : 'none';
  document.getElementById('info-accum').style.display = mode === 'accumulated' ? 'block' : 'none';

  if (mode === 'hourly') {
    stopPlay();
    openMapView(currentIndex < 0 ? 0 : currentIndex);
  } else {
    renderAccumulatedView();
  }
}

function setPeriod(days) {
  accumDays = days;
  document.querySelectorAll('#period-switch .pill-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days, 10) === days));
  renderAccumulatedView();
}

function enterFullscreenView() {
  const el = document.getElementById('map-screen');
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (req) req.call(el);
}

function exitFullscreenView() {
  const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if (exit) exit.call(document);
}

function updateFullscreenUI() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
  document.getElementById('map-screen').classList.toggle('is-fullscreen', isFs);
  setTimeout(resizeWindCanvas, 50);
}
['fullscreenchange', 'webkitfullscreenchange', 'msfullscreenchange'].forEach((evt) =>
  document.addEventListener(evt, updateFullscreenUI)
);

// ── Timeline scrubber: drag-to-seek + play/pause autoplay ────────────────────
document.getElementById('tl-slider').addEventListener('input', (e) => {
  stopPlay();
  openMapView(parseInt(e.target.value, 10));
});

let playTimer = null;
let playSpeed = 3;
const BASE_INTERVAL_MS = 700;

// Blend two hours' freezing level/snowfall linearly so the snow-relief ramp
// (built from whichever blended values come out) animates as a continuous
// fade between hours instead of jumping in discrete steps during playback.
function blendHour(a, b, t) {
  return {
    freezingLevel: a.freezingLevel + (b.freezingLevel - a.freezingLevel) * t,
    snowfallMm: a.snowfallMm + (b.snowfallMm - a.snowfallMm) * t
  };
}

function togglePlay() {
  if (playTimer) stopPlay();
  else startPlay();
}

function startPlay() {
  if (currentIndex < 0) return;
  if (currentIndex >= forecastHours.length - 1) openMapView(0); // restart from the beginning
  document.getElementById('tl-play').textContent = '⏸';
  if (playTimer) cancelAnimationFrame(playTimer);

  const tickMs = BASE_INTERVAL_MS / playSpeed;
  let tickStart = performance.now();

  const frame = (now) => {
    if (currentIndex >= forecastHours.length - 1) { stopPlay(); return; }
    const t = Math.min(1, (now - tickStart) / tickMs);
    const from = forecastHours[currentIndex];
    const to = forecastHours[currentIndex + 1];
    applyRampWhenReady(buildSnowRamp(blendHour(from, to, t)));

    if (t >= 1) {
      openMapView(currentIndex + 1);
      tickStart = now;
      if (currentIndex >= forecastHours.length - 1) return; // stopPlay() already ran inside openMapView
    }
    playTimer = requestAnimationFrame(frame);
  };
  playTimer = requestAnimationFrame(frame);
}

function stopPlay() {
  if (playTimer) { cancelAnimationFrame(playTimer); playTimer = null; }
  document.getElementById('tl-play').textContent = '▶';
}

function setSpeed(speed) {
  playSpeed = speed;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.speed, 10) === speed);
  });
  if (playTimer) startPlay(); // restart at the new rate without losing playback state
}

// This page always opens straight into the 3D map — to the hour given by
// ?time=2026-06-25T20:00 if present, otherwise the closest hour to now.
function openFromQueryParams() {
  if (forecastHours.length === 0) return;
  const targetTime = new URLSearchParams(window.location.search).get('time');
  const targetMs = targetTime ? new Date(targetTime).getTime() : Date.now();
  let bestIdx = 0, bestDiff = Infinity;
  forecastHours.forEach((r, i) => {
    const diff = Math.abs(new Date(r.time).getTime() - targetMs);
    if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
  });
  openMapView(bestIdx);
}

loadForecast();
startWindOverlay();
</script>
