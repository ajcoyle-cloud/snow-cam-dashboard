let forecastHours = [];
// Per-model hourly series — { gfs, ecmwf, aifs, ukmo, average }, each either
// an array or null (model failed/unavailable this load). `forecastHours`
// above always points at whichever of these is currently selected; every
// existing hourly/accumulated renderer reads `forecastHours` by reference,
// so switching models is just repointing it and re-running the current view.
let modelHours = { gfs: null, ecmwf: null, aifs: null, ukmo: null, average: null };
let selectedModel = 'average';

// GFS occasionally spits out a spurious single-hour precip/snow spike at a
// given grid cell (a model artifact, especially near steep terrain). Cap any
// one hour's snowfall so a single glitchy reading can't blow out the
// multi-day accumulated total.
const MAX_HOURLY_SNOWFALL_MM = 60; // ~6cm/hr, generous even for a true storm pulse

// A fetch that never rejects — resolves to null on any network-level failure
// (not just a bad status) instead of taking down the whole Promise.all, since
// AIFS/ECMWF/UKMO are optional and GFS must never be blocked by their failure.
// Crucially, this also never HANGS: a request that doesn't settle within
// timeoutMs is aborted and treated as a failure. Promise.all waits for every
// one of its inputs to settle no matter how long that takes, and .catch()
// alone only handles a request actually failing fast -- an upstream
// connection that just sits there (observed as net::ERR_TIMED_OUT after tens
// of seconds) would otherwise stall the whole page's load for however long
// the browser's own connection timeout happens to be.
//
// Retries transient failures (timeout, network error, 429/5xx) with a short
// backoff instead of giving up on the first attempt -- important because
// GFS failing entirely means loadForecast() abandons every model and falls
// back to buildDemoForecast()'s 2-day placeholder, which reads exactly like
// "the timeslider only has 2-3 days of data" if a single slow attempt were
// treated as a hard failure.
const FETCH_TIMEOUT_MS = 10000;
const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
async function fetchOrNull(url, { timeoutMs = FETCH_TIMEOUT_MS, retries = 1 } = {}) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);
      if (res.ok) return res;
      if ((res.status === 429 || res.status >= 500) && attempt < retries) {
        await sleep(500 * (attempt + 1));
        continue;
      }
      return null;
    } catch (e) {
      clearTimeout(timer);
      if (attempt < retries) {
        await sleep(500 * (attempt + 1));
        continue;
      }
      return null;
    }
  }
  return null;
}

// Session-scoped response cache, keyed by the exact request URL (every
// resort/model/elevation combination is a distinct, deterministic URL — see
// forecastUrlsFor). sessionStorage (not an in-memory object) is what makes
// this actually useful: switching resorts via a pill does a full page reload
// of the iframe, which wipes any in-memory state, but sessionStorage persists
// across same-tab navigations. So the background prefetch below, run from
// whichever resort's page is open now, leaves data behind for the NEXT
// resort's fresh page load to find already sitting there.
const FORECAST_CACHE_TTL_MS = 20 * 60 * 1000; // forecasts don't change fast enough to need shorter
function forecastCacheGet(url) {
  try {
    const raw = sessionStorage.getItem('wf-cache:' + url);
    if (!raw) return null;
    const { t, data } = JSON.parse(raw);
    if (Date.now() - t > FORECAST_CACHE_TTL_MS) return null;
    return data;
  } catch (e) {
    return null;
  }
}
function forecastCacheSet(url, data) {
  try { sessionStorage.setItem('wf-cache:' + url, JSON.stringify({ t: Date.now(), data })); } catch (e) {}
}

// Fetches and parses one Open-Meteo URL to JSON, serving a cached copy when
// one's fresh instead of hitting the network at all. Resolves to null on any
// failure, same contract as fetchOrNull.
async function fetchJsonCached(url, fetchOpts) {
  const cached = forecastCacheGet(url);
  if (cached) return cached;
  const res = await fetchOrNull(url, fetchOpts);
  if (!res) return null;
  try {
    const json = await res.json();
    forecastCacheSet(url, json);
    return json;
  } catch (e) {
    return null;
  }
}

// Quietly warms the cache for every OTHER resort, one at a time (not all in
// parallel — this is a nice-to-have background task, not worth competing for
// bandwidth with anything the user is actually looking at). Skips any URL
// that's already cached and fresh, so this is cheap to call repeatedly.
let otherResortsPrefetched = false;
async function prefetchOtherResorts() {
  if (otherResortsPrefetched) return;
  otherResortsPrefetched = true;
  for (const key of Object.keys(RESORT_CONFIG)) {
    if (key === resortKey) continue;
    const urls = Object.values(forecastUrlsFor(RESORT_CONFIG[key]));
    for (const url of urls) {
      if (forecastCacheGet(url)) continue;
      await fetchJsonCached(url);
    }
  }
}

// Switches the active resort: persists the choice so the main React app's
// location switcher picks it up too, then either tells the parent (if this
// page is embedded in the app's map tab, which just re-keys its iframe to the
// new resort) or, if opened standalone, navigates this tab itself.
function navigateToResort(key) {
  try { localStorage.setItem('sc-resort', key); } catch (e) {}
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'resort-select', resort: key }, '*');
  } else {
    const url = new URL(window.location.href);
    url.searchParams.set('resort', key);
    window.location.href = url.toString();
  }
}

// Pills are only shown once zoomed out past RESORT_PILL_MAX_ZOOM.
function updateResortPillVisibility() {
  const show = map.getZoom() <= RESORT_PILL_MAX_ZOOM;
  for (const key in resortPillMarkers) {
    resortPillMarkers[key].getElement().style.display = show ? '' : 'none';
  }
}

function initResortPills() {
  Object.keys(RESORT_CONFIG).forEach((key) => {
    const r = RESORT_CONFIG[key];
    const isSelf = key === resortKey;
    const wrap = document.createElement('div');
    wrap.className = 'resort-pill-wrap';
    wrap.innerHTML = `
      <div class="resort-pill">${RESORT_PILL_LABELS[key] || key}</div>
      <div class="resort-pill-stem"></div>
      <div class="resort-pill-dot"></div>
    `;
    const el = wrap.querySelector('.resort-pill');
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isSelf) {
        // This resort's own pill — same map instance, so flying back to its
        // default always lands exactly right. Ramp auto-rotate back in once
        // it settles (the pill click itself stopped rotation via the
        // interaction listener).
        map.flyTo({ center: r.center, zoom: r.zoom, pitch: r.pitch, bearing: r.bearing, duration: 2000, essential: true });
        map.once('moveend', () => {
          if (typeof window.__startAutoRotateRampIn === 'function') window.__startAutoRotateRampIn();
        });
        return;
      }
      // Switching to a DIFFERENT resort. Deliberately do NOT fly THIS (old)
      // map to the new coordinates: it would land there without the
      // destination's terrain loaded, so its camera sits too high/pulled-back,
      // and it could never match the freshly-loaded new resort (a separate
      // iframe instance) — that mismatch was the whole "fly-in doesn't match
      // the loaded view" bug. Navigate straight away and let the NEW map
      // perform the fly-in from its own settled, terrain-correct state (see
      // maybeSignalMapReady), so the fly-in always ends exactly on the loaded
      // default view.
      navigateToResort(key);
    });
    // anchor 'bottom' puts the dot (not the pill) exactly on the resort's
    // coordinate — the pill floats above it, clear of the terrain.
    resortPillMarkers[key] = new maplibregl.Marker({ element: wrap, anchor: 'bottom' }).setLngLat([r.lon, r.lat]).addTo(map);
    const stemEl = wrap.querySelector('.resort-pill-stem');
    stemEl.style.height = `${el.offsetWidth}px`;
  });
  updateResortPillVisibility();
  map.on('zoom', updateResortPillVisibility);
}

// Build one model's hourly series. GFS exposes a direct freezing-level field
// and precip/wind; the other models don't, so their freezing level is derived
// the same way the main dashboard does it — linear interpolation between a
// summit and base temperature sample — and they borrow GFS's precip/wind
// (the only source that has it) rather than going without.
// gfsBaseHourly is always GFS's own base-elevation fetch (windspeed_850hPa/
// winddirection_850hPa), regardless of which model's summit/base this row
// otherwise comes from — only GFS requests wind at all (see
// forecastUrlsFor), same reasoning as the existing `gfs` param for the
// summit-level (700hPa) wind below.
function buildModelHours(summit, base, gfs, gfsBaseHourly) {
  if (!summit) return null;
  const useDirectFL = !!summit.freezinglevel_height;
  return summit.time.map((t, i) => {
    const summitT = summit.temperature_2m[i];
    const baseT = base?.temperature_2m?.[i] ?? null;
    let fl = useDirectFL ? summit.freezinglevel_height[i] : null;
    if (fl == null && baseT != null && summitT != null && baseT !== summitT) {
      fl = LOC.baseElev + (baseT * (LOC.summitElev - LOC.baseElev)) / (baseT - summitT);
    }
    let snowMm = summit.snowfall?.[i] != null
      ? Math.min(summit.snowfall[i] * 10, MAX_HOURLY_SNOWFALL_MM)
      : null;
    // Some models (notably AIFS, which predicts total precip but has no true
    // rain/snow-separation microphysics) intermittently report 0mm snowfall
    // despite sub-zero temps and real precipitation — a known upstream data
    // gap, not an absence of snow. Estimate from precip using the same ~7:1
    // snow-to-liquid ratio the main dashboard falls back to in this case.
    const summitPrecip = summit.precipitation?.[i] ?? null;
    if (summitT < 0 && summitPrecip > 0 && snowMm === 0) {
      snowMm = Math.min(summitPrecip * 7, MAX_HOURLY_SNOWFALL_MM);
    }
    return {
      time: t,
      temp: summitT,
      baseTemp: baseT,
      precip: gfs?.precipitation?.[i] ?? null,
      snowfallMm: snowMm,
      freezingLevel: fl,
      windSpeedKmh: gfs?.windspeed_700hPa?.[i] ?? null,
      windDirDeg: gfs?.winddirection_700hPa?.[i] ?? null,
      // Base-elevation (850hPa) wind — used to interpolate a base-to-summit
      // wind gradient in the orographic overlay instead of applying the
      // summit-level reading uniformly at every elevation. null when
      // gfsBaseHourly wasn't fetched/available (e.g. demo fallback data);
      // callers fall back to the summit vector in that case.
      windSpeedKmhBase: gfsBaseHourly?.windspeed_850hPa?.[i] ?? null,
      windDirDegBase: gfsBaseHourly?.winddirection_850hPa?.[i] ?? null
    };
  }).filter(r => r.temp != null && r.freezingLevel != null && r.snowfallMm != null);
}

// The "Average" model — mean of every loaded model's temp/snowfall/freezing
// level per hour. Precip/wind aren't averaged (only GFS has them at all).
function buildAverageHours(sources) {
  const loaded = sources.filter(Boolean);
  if (loaded.length === 0) return null;
  const base = loaded.reduce((longest, s) => s.length > longest.length ? s : longest, loaded[0]);
  return base.map((_, i) => {
    const rows = loaded.map(s => s[i]).filter(Boolean);
    if (rows.length === 0) return null;
    const avg = (pick) => {
      const vals = rows.map(pick).filter(v => v != null);
      return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
    };
    // Median for snowfall — UKMO consistently forecasts higher than
    // GFS/ECMWF/AIFS for this region, and a mean lets that one outlier drag
    // the accumulated total up every hour. Median excludes whichever model
    // is consistently highest (or lowest) instead of diluting toward it.
    const median = (pick) => {
      const vals = rows.map(pick).filter(v => v != null).sort((a, b) => a - b);
      if (!vals.length) return null;
      const mid = Math.floor(vals.length / 2);
      return vals.length % 2 !== 0 ? vals[mid] : (vals[mid - 1] + vals[mid]) / 2;
    };
    const first = rows[0];
    return {
      time: first.time,
      temp: avg(r => r.temp),
      baseTemp: avg(r => r.baseTemp),
      precip: first.precip,
      snowfallMm: median(r => r.snowfallMm),
      freezingLevel: avg(r => r.freezingLevel),
      windSpeedKmh: first.windSpeedKmh,
      windDirDeg: first.windDirDeg,
      windSpeedKmhBase: first.windSpeedKmhBase,
      windDirDegBase: first.windDirDegBase
    };
  }).filter(Boolean).filter(r => r.temp != null && r.freezingLevel != null && r.snowfallMm != null);
}

// The 8 Open-Meteo requests one resort's forecast needs (summit+base for
// each of GFS/ECMWF/AIFS/UKMO). Shared between this page's own fetch and the
// background prefetch of every OTHER resort, so both build identical URLs
// (required for the response cache below to actually hit).
function forecastUrlsFor(r) {
  const base = `https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&temperature_unit=celsius&timezone=${r.timezone}&forecast_days=16`;
  return {
    gfsSummitUrl: `${base}&wind_speed_unit=kmh&elevation=${r.summitElev}&hourly=temperature_2m,precipitation,snowfall,freezinglevel_height,windspeed_700hPa,winddirection_700hPa&models=gfs_global`,
    // windspeed_850hPa/winddirection_850hPa (~1500m, roughly base-elevation)
    // feeds the orographic overlay's base-to-summit wind interpolation (see
    // buildModelHours/orographicsnow:// protocol) — same field the Forecast
    // tab's own separate fetch already uses for its base-level wind.
    gfsBaseUrl: `${base}&wind_speed_unit=kmh&elevation=${r.baseElev}&hourly=temperature_2m,windspeed_850hPa,winddirection_850hPa&models=gfs_global`,
    ecmwfSummitUrl: `${base}&elevation=${r.summitElev}&hourly=temperature_2m,precipitation,snowfall&models=ecmwf_ifs025`,
    ecmwfBaseUrl: `${base}&elevation=${r.baseElev}&hourly=temperature_2m&models=ecmwf_ifs025`,
    aifsSummitUrl: `${base}&elevation=${r.summitElev}&hourly=temperature_2m,precipitation,snowfall&models=ecmwf_aifs025_single`,
    aifsBaseUrl: `${base}&elevation=${r.baseElev}&hourly=temperature_2m&models=ecmwf_aifs025_single`,
    ukmoSummitUrl: `${base}&elevation=${r.summitElev}&hourly=temperature_2m,precipitation,snowfall&models=ukmo_seamless`,
    ukmoBaseUrl: `${base}&elevation=${r.baseElev}&hourly=temperature_2m&models=ukmo_seamless`,
  };
}

async function loadForecast() {
  const {
    gfsSummitUrl, gfsBaseUrl, ecmwfSummitUrl, ecmwfBaseUrl,
    aifsSummitUrl, aifsBaseUrl, ukmoSummitUrl, ukmoBaseUrl
  } = forecastUrlsFor(LOC);

  // GFS is the heaviest request (more fields than the other three, and the
  // one other models' precip/wind rows borrow via buildModelHours' 3rd arg)
  // so it gets more timeout headroom and an extra retry — but it is NOT a
  // single point of failure for the other three: each model below is built
  // independently, so GFS having a bad day doesn't throw away perfectly
  // good ECMWF/AIFS/UKMO data. (buildModelHours' `gfs` param is read with
  // `?.` throughout, so passing it null when GFS failed just means those
  // rows lack precip/wind, not that the whole model comes back null — its
  // temp/freezing-level/snowfall come from the model's own summit/base data.)
  // The 2-day demo placeholder is now only the fallback of last resort when
  // truly nothing came back at all, not whenever GFS specifically was slow.
  const gfsFetchOpts = { timeoutMs: 15000, retries: 2 };
  const [gfs, gfsBaseJson, ecmwfSummitJson, ecmwfBaseJson, aifsSummitJson, aifsBaseJson, ukmoSummitJson, ukmoBaseJson] = await Promise.all([
    fetchJsonCached(gfsSummitUrl, gfsFetchOpts), fetchJsonCached(gfsBaseUrl, gfsFetchOpts),
    fetchJsonCached(ecmwfSummitUrl), fetchJsonCached(ecmwfBaseUrl),
    fetchJsonCached(aifsSummitUrl), fetchJsonCached(aifsBaseUrl),
    fetchJsonCached(ukmoSummitUrl), fetchJsonCached(ukmoBaseUrl),
  ]);
  const gfsHourly = gfs ? gfs.hourly : null;
  const gfsBase = gfsBaseJson ? gfsBaseJson.hourly : null;
  const ecmwfSummit = ecmwfSummitJson ? ecmwfSummitJson.hourly : null;
  const ecmwfBase = ecmwfBaseJson ? ecmwfBaseJson.hourly : null;
  const aifsSummit = aifsSummitJson ? aifsSummitJson.hourly : null;
  const aifsBase = aifsBaseJson ? aifsBaseJson.hourly : null;
  const ukmoSummit = ukmoSummitJson ? ukmoSummitJson.hourly : null;
  const ukmoBase = ukmoBaseJson ? ukmoBaseJson.hourly : null;

  modelHours.gfs = gfsHourly ? buildModelHours(gfsHourly, gfsBase, gfsHourly, gfsBase) : null;
  modelHours.ecmwf = ecmwfSummit ? buildModelHours(ecmwfSummit, ecmwfBase, gfsHourly, gfsBase) : null;
  modelHours.aifs = aifsSummit ? buildModelHours(aifsSummit, aifsBase, gfsHourly, gfsBase) : null;
  modelHours.ukmo = ukmoSummit ? buildModelHours(ukmoSummit, ukmoBase, gfsHourly, gfsBase) : null;
  modelHours.average = buildAverageHours([modelHours.gfs, modelHours.ecmwf, modelHours.aifs, modelHours.ukmo]);

  if (!modelHours.gfs && !modelHours.ecmwf && !modelHours.aifs && !modelHours.ukmo) {
    // Every model failed — genuinely nothing to show, not just GFS being slow.
    modelHours = { gfs: buildDemoForecast(), ecmwf: null, aifs: null, ukmo: null, average: null };
  }
  restoreSelectedModel();
  buildModelMenu();
  forecastHours = modelHours[selectedModel] || modelHours.average
    || modelHours.gfs || modelHours.ecmwf || modelHours.aifs || modelHours.ukmo || [];
  openFromQueryParams();
  // Quietly warm the cache for every other resort now that this one's own
  // (much more urgent) load is done, so tapping a resort pill later finds
  // that resort's weather data already sitting in sessionStorage instead of
  // waiting on a fresh 8-request fetch after the fly-in animation lands.
  prefetchOtherResorts();
}

// Which model is shown persists across resort switches (this page reloads
// fresh in the iframe each time), same pattern as restoreViewMode() below.
function restoreSelectedModel() {
  let saved = null;
  try { saved = localStorage.getItem('sp-map-model'); } catch (e) {}
  selectedModel = (saved && modelHours[saved]) ? saved : (modelHours.average ? 'average' : 'gfs');
}

function selectModel(key) {
  if (!modelHours[key] || key === selectedModel) { closeModelMenu(); return; }
  selectedModel = key;
  pwPersist('sp-map-model', key);
  forecastHours = modelHours[key];
  buildModelMenu();
  closeModelMenu();
  if (viewMode === 'accumulated') renderAccumulatedView();
  else if (viewMode === 'hourly') openMapView(Math.min(currentIndex, forecastHours.length - 1));
}

const MODEL_META = {
  average: { label: 'Average', color: '#e2e8f0' },
  gfs: { label: 'GFS Model', color: '#3b82f6' },
  ecmwf: { label: 'ECMWF IFS', color: '#10b981' },
  aifs: { label: 'AIFS', color: '#f59e0b' },
  ukmo: { label: 'UKMO', color: '#f472b6' },
};

function buildModelMenu() {
  const btn = document.getElementById('model-switch-label');
  const list = document.getElementById('model-switch-list');
  if (!btn || !list) return;
  btn.textContent = MODEL_META[selectedModel]?.label || 'Average';
  list.innerHTML = Object.keys(MODEL_META).map(key => {
    const available = !!modelHours[key];
    const active = key === selectedModel;
    return `<button class="model-option ${active ? 'active' : ''}" ${available ? '' : 'disabled'} onclick="selectModel('${key}')">
      <span class="model-option-swatch" style="background:${MODEL_META[key].color}"></span>
      ${MODEL_META[key].label}
    </button>`;
  }).join('');
  // Label text width just changed, which shifts #model-switch's left edge —
  // recompute the Live/Hourly/Accum/Radar (+period) group's clearance.
  syncTopControlsLayout();
}

// Desktop-only: #top-controls is left-anchored at 50%+8px and grows
// rightward as the Accum-mode period-switch appears, while #model-switch is
// independently right-anchored — on narrower desktop/laptop widths (or a
// wide model label like "ECMWF IFS") there isn't always enough room between
// them, so cap #top-controls to whatever space is actually free rather than
// letting it run into the model switch. overflow-x:auto (see CSS) makes the
// pills scroll into view in that squeezed case instead of overlapping.
function syncTopControlsLayout() {
  const topControls = document.getElementById('top-controls');
  const modelSwitch = document.getElementById('model-switch');
  if (!topControls || !modelSwitch) return;
  if (window.innerWidth <= 700) { topControls.style.maxWidth = ''; return; }
  if (getComputedStyle(modelSwitch).display === 'none') { topControls.style.maxWidth = ''; return; }
  const gap = 20;
  const modelLeft = modelSwitch.getBoundingClientRect().left;
  const topControlsLeft = topControls.getBoundingClientRect().left;
  topControls.style.maxWidth = Math.max(120, modelLeft - topControlsLeft - gap) + 'px';
}
window.addEventListener('resize', syncTopControlsLayout);

function toggleModelMenu() {
  document.getElementById('model-switch').classList.toggle('open');
}
function closeModelMenu() {
  document.getElementById('model-switch')?.classList.remove('open');
}
document.addEventListener('click', (e) => {
  const el = document.getElementById('model-switch');
  if (el && el.classList.contains('open') && !el.contains(e.target)) closeModelMenu();
});

// Fallback so the demo still works offline / if the API is unreachable.
function buildDemoForecast() {
  const rows = [];
  const start = new Date();
  start.setMinutes(0, 0, 0);
  for (let i = 0; i < 48; i++) {
    const t = new Date(start.getTime() + i * 3600 * 1000);
    const wave = Math.sin(i / 6) * 0.5 + 0.5; // a storm-like bump
    const snowfallMm = i > 14 && i < 22 ? (8 + wave * 14) : 0;
    rows.push({
      time: t.toISOString().slice(0, 16),
      temp: -2 + Math.sin(i / 8) * 3,
      precip: snowfallMm > 0 ? snowfallMm / 10 : 0,
      snowfallMm,
      freezingLevel: 1500 + Math.sin(i / 10) * 300,
      windSpeedKmh: 20 + wave * 35,
      windDirDeg: (270 + i * 4) % 360
    });
  }
  return rows;
}

// en-NZ's combined date+time toLocaleString (e.g. "Thu, 9 Jul at 8:00 pm")
// doesn't fit the timeslider's label pill — built by hand instead, dropping
// "at" and the ":00" for on-the-hour times ("8pm" not "8:00pm"), used by both
// the hourly and radar timeslider labels.
function fmtClock(d) {
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return m === 0 ? `${h}${ampm}` : `${h}:${String(m).padStart(2, '0')}${ampm}`;
}
function fmtTime(iso) {
  const d = new Date(iso);
  const datePart = d.toLocaleDateString('en-NZ', { weekday: 'short', day: 'numeric', month: 'short' });
  return `${datePart} ${fmtClock(d)}`;
}

// ── Map ────────────────────────────────────────────────────────────────────
let map = null;

// Tells the parent app (if embedded) once there's actually something worth
// looking at, so it can hold a cover overlay over the old content until this
// new resort's map is ready instead of flashing a blank/half-loaded map
// during the iframe swap. Deliberately gated on the map STYLE only, not on
// the weather fetch (openMapView() shows a valid terrain/satellite map
// immediately regardless of forecast data — the snow overlay/data panel can
// fill in a moment later without feeling broken). The weather fetch alone
// has been observed taking 20-30s on a slow connection; waiting on it here
// would hold the cover on far longer than the map is actually blank for.
let mapStyleReady = false;
// 'idle' means requested tiles have loaded and no camera transition is in
// progress — it does NOT guarantee the 3D terrain mesh MapLibre builds from
// those DEM tiles has actually been incorporated yet, and — critically — the
// DEM-sampled elevation MapLibre uses to position the camera's ALTITUDE at a
// given center can still be creeping toward its final value for a beat after
// 'idle'. That's why the wrong framing was INTERMITTENT: at identical
// zoom/pitch/bearing/center, whether the camera sits high (wide view) or low
// (tight view) depends on what elevation was sampled at the exact instant of
// the reveal. So don't just wait for a "plausible" reading — wait for it to
// go STABLE (unchanged within ~1m across several consecutive polls), which
// means the sampling has actually settled and the camera won't shift after
// we reveal.
function waitForTerrainStable(cb, prev, stableCount, attempt) {
  prev = (prev === undefined) ? null : prev;
  stableCount = stableCount || 0;
  attempt = attempt || 0;
  let elev = null;
  try { elev = map.queryTerrainElevation(LOC.center, { exaggerated: false }); } catch (e) {}
  const plausible = elev != null && elev > LOC.baseElev * 0.5;
  const steady = plausible && prev != null && Math.abs(elev - prev) < 1;
  const nextStable = steady ? stableCount + 1 : 0;
  // Require ~3 consecutive steady reads (≈240ms of no movement), capped so a
  // permanently-jittery reading can't hang the reveal forever.
  if ((nextStable >= 3) || attempt >= 30) { cb(); return; }
  setTimeout(() => waitForTerrainStable(cb, elev, nextStable, attempt + 1), 80);
}

function maybeSignalMapReady() {
  if (!mapStyleReady || window.parent === window) return;
  // Auto-rotate does not run during load/fly-in (it's only kicked off once
  // the fly-in lands), so there's nothing to pause here — the camera bearing
  // is wherever the constructor set it. Snap to the exact default bearing so
  // the establishing pose and fly-in start from a known orientation.
  map.jumpTo({ center: LOC.center, zoom: LOC.zoom, pitch: LOC.pitch, bearing: LOC.bearing });
  // Cheap and harmless even if unnecessary: forces MapLibre to re-derive its
  // internal projection state from the container's current size right after
  // the snap, in case jumpTo() alone doesn't fully refresh whatever the
  // renderer uses to map zoom -> actual field of view.
  try { map.resize(); } catch (e) {}
  // The snap can itself require a few new edge tiles (rotating back to the
  // default bearing changes what's at the corners of the frustum) — wait
  // for a second 'idle' so the revealed frame is guaranteed fully loaded at
  // the EXACT bearing it's revealed at, not just the one it was idle at a
  // moment ago.
  map.once('idle', () => {
    waitForTerrainStable(() => {
      // Perform the fly-in on THIS map — the new resort's own instance, with
      // its terrain already loaded and settled (waitForTerrainStable above).
      // Reveal at a pulled-back "establishing" pose, then fly in to the exact
      // default. Because the fly happens on the instance that actually stays,
      // landing on loaded terrain, the fly-in ALWAYS ends precisely on the
      // settled default view. The previous approach flew the OLD map to the
      // new coordinates (destination terrain not loaded → camera too high) and
      // then crossfaded to a different, correctly-framed new instance, which
      // is why the fly-in landing never matched the loaded view.
      // Reveal at a pulled-back establishing pose, then fly in. Start well
      // back (≈2.6 zoom levels out) so there's a real approach to see, and
      // hold that establishing shot until the parent's ~0.4s crossfade has
      // finished revealing this frame BEFORE the fly begins — otherwise the
      // first chunk of the approach happens while the frame is still fading
      // in, so you only catch the last ~1s and it feels like it rushes
      // straight into a close-up.
      const startZoom = Math.max(LOC.zoom - 2.6, 8.5);
      map.jumpTo({ center: LOC.center, zoom: startZoom, pitch: LOC.pitch, bearing: LOC.bearing });
      window.parent.postMessage({ type: 'map-ready' }, '*');
      setTimeout(() => {
        map.flyTo({ center: LOC.center, zoom: LOC.zoom, pitch: LOC.pitch, bearing: LOC.bearing, duration: 2600, essential: true });
        // Let the fly-in settle wherever it naturally lands — do NOT jumpTo the
        // exact pose afterward. In this MapLibre's terrain camera, jumping to
        // the same zoom the fly just reached recomputes the camera height and
        // lurches into a visibly closer view, so the "pin" was itself the big
        // jump at the end of the animation. Once landed, ramp the decorative
        // auto-rotate in from a standstill.
        map.once('moveend', () => {
          if (typeof window.__startAutoRotateRampIn === 'function') window.__startAutoRotateRampIn();
        });
      }, 450);
    });
  });
}

function initMap() {
  if (map) return;
  map = new maplibregl.Map({
    container: 'map',
    zoom: LOC.zoom,
    center: LOC.center,
    pitch: LOC.pitch,
    bearing: LOC.bearing,
    maxPitch: 85,
    attributionControl: false,
    style: {
      version: 8,
      sources: {
        terrain: { type: 'raster-dem', url: 'https://tiles.mapterhorn.com/tilejson.json', tileSize: 512 },
        satellite: {
          type: 'raster',
          tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
          tileSize: 256,
          attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics'
        }
      },
      layers: [
        { id: 'background', type: 'background', paint: { 'background-color': '#2d5a1b' } },
        { id: 'satellite', type: 'raster', source: 'satellite', paint: { 'raster-opacity': 1, 'raster-saturation': 0.1, 'raster-contrast': 0.05 } },
        {
          id: 'depth-shade', type: 'hillshade', source: 'terrain',
          paint: {
            'hillshade-shadow-color': 'rgba(30,20,10,0.45)',
            'hillshade-highlight-color': 'rgba(255,255,255,0)',
            'hillshade-accent-color': 'rgba(80,60,40,0.2)',
            'hillshade-illumination-direction': 310,
            'hillshade-exaggeration': 0.6
          }
        },
        {
          // Forecasted snow coverage, tinted by elevation from the snow line
          // (freezing level − 300m) up to the summit, transparent below.
          id: 'snow-relief', type: 'color-relief', source: 'terrain',
          paint: { 'color-relief-color': ['interpolate', ['linear'], ['elevation'], 0, 'rgba(255,255,255,0)'] }
        }
      ],
      terrain: { source: 'terrain', exaggeration: 1.2 }
    }
  });

  // Keyboard shortcuts (desktop — these only fire once the map iframe has
  // focus, i.e. after the user has clicked/interacted with the map).
  window.addEventListener('keydown', (e) => {
    // Space plays/pauses whichever timeline the current view shows.
    if (e.code === 'Space' || e.key === ' ') {
      const ae = document.activeElement;
      if (ae && (ae.tagName === 'TEXTAREA' || (ae.tagName === 'INPUT' && ae.type === 'text'))) return;
      e.preventDefault(); // stop the page from scrolling
      if (typeof viewMode !== 'undefined') {
        if (viewMode === 'hourly') togglePlay();
        else if (viewMode === 'live') pwTogglePlay();
        else if (viewMode === 'radar') radarTogglePlay();
        // accumulated view has no timeline — nothing to toggle
      }
      return;
    }
    // Press "c" over the map to read the current camera params, for dialing a
    // resort's default view in to a hand-picked framing: navigate to the view
    // you want, press c, copy the popup text. Kept permanently as a tuning aid.
    if ((e.key === 'c' || e.key === 'C') && map) {
      const cc = map.getCenter();
      window.prompt('Camera (copy this):', JSON.stringify({
        center: [ +cc.lng.toFixed(5), +cc.lat.toFixed(5) ],
        zoom: +map.getZoom().toFixed(2),
        pitch: +map.getPitch().toFixed(1),
        bearing: +map.getBearing().toFixed(1)
      }));
    }
  });

  // MapLibre reads the container's actual pixel size to compute the camera
  // projection — for a pitched 3D view, that's what determines the real
  // field of view for a given "zoom" number, not just how large things look.
  // A single resize() call at 'load' (see below) assumed the container was
  // already at its final size by then, but comparing a fly-in landing
  // screenshot against a freshly-loaded page at IDENTICAL zoom/pitch/bearing
  // showed drastically different fields of view (wide vs. tightly cropped) —
  // exactly what a wrong canvas size at first render would cause, since a
  // one-shot resize() can still fire before the iframe's layout has actually
  // settled. Watch the container itself and resize on every real change
  // instead of guessing when "settled" is.
  try {
    map.resize(); // immediate correction; ResizeObserver's own first callback is async
    const mapContainerEl = document.getElementById('map');
    if (mapContainerEl && typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(() => map.resize()).observe(mapContainerEl);
    }
  } catch (e) {}

  // Clear "bluebird" sky, only visible above the horizon when the camera
  // pitches up further than the default view. Set via Map#setSky once the
  // style has actually finished loading — calling it immediately after
  // the constructor (or putting "sky" directly in the style object) is
  // too early and the call is silently dropped. Not a layers[] entry
  // either: this MapLibre version's style spec layers[] array doesn't
  // accept a "sky" type at all, and adding one there fails validation
  // for the whole style. Unlike Mapbox's gradient-based sky, MapLibre's
  // model is just a sky-color (zenith) blending into a horizon-color —
  // bright blue overhead fading to a pale, almost-white blue at the
  // horizon. Overridden to a dark navy night sky further below, once the
  // rest of 'load' has run, if the settings-cog "Dark mode" toggle
  // was left on from a previous visit (restoreMapSettings()) — see
  // setDarkMode() near the dark-terrain trial code.
  map.on('load', () => {
    // Container sizing is handled by the ResizeObserver set up right after
    // construction, above.
    map.setSky(SKY_DAY);

    const liftData = resortKey === 'ruapehu' ? WHAKAPAPA_LIFTS
      : resortKey === 'cardrona' ? CARDRONA_LIFTS
      : resortKey === 'loveland' ? LOVELAND_LIFTS
      : resortKey === 'mtlyford' ? MTLYFORD_LIFTS
      : resortKey === 'roundhill' ? ROUNDHILL_LIFTS
      : resortKey === 'treblecone' ? TREBLE_CONE_LIFTS
      : resortKey === 'mthutt' ? MTHUTT_LIFTS
      : null;
    if (liftData) {
      map.addSource('resort-lifts', { type: 'geojson', data: liftData });
      map.addLayer({
        id: 'resort-lifts-line',
        type: 'line',
        source: 'resort-lifts',
        paint: {
          // Pure white lifts on the orographic High-Res map only (they read
          // clearly against the bold rainbow drape); the usual red everywhere
          // else. Full opacity on High-Res so white stays truly white rather
          // than picking up a tint from the colours underneath.
          'line-color': isHighResMode ? '#ffffff' : '#e60000',
          'line-width': 1.4,
          'line-opacity': isHighResMode ? 1 : 0.9
        }
      });
    }
    // Live PredictWind observation pills + temperature profile (both resorts).
    initStationPill();
    // Other-resort navigation pills — present in every view mode (live,
    // hourly, accumulated), gated only by zoom level.
    initResortPills();
    // Snow Test tab (?snow=1) turns the particle trial on automatically —
    // everyday resort/map views leave it off (see toggleSnowParticles).
    if (new URLSearchParams(window.location.search).get('snow') === '1') toggleSnowParticles();
    mapStyleReady = true;
    // 'load' only means the style/sources attached, not that terrain/
    // satellite tiles have actually finished loading and rendering —
    // revealing this frame right here left it visibly still settling
    // (terrain popping in) for a moment after the crossfade, which never
    // quite matched where the pill's flyTo (on the OLD, already-loaded page)
    // had landed after its full 2.5s animation. 'idle' fires once camera
    // transitions are done AND every requested tile has loaded, so waiting
    // for it guarantees this frame is the fully-settled one.
    map.once('idle', maybeSignalMapReady);

    // Re-apply settings-cog preferences (Winter snow / Dark mode)
    // left on from a previous visit — after everything above so the layers
    // setDarkMode()/applyWinterSnow() reference ('satellite', 'depth-shade',
    // 'resort-lifts-line') already exist. Declared later in this script
    // (function-hoisted, safe to call from here).
    restoreMapSettings();
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true, showZoom: true, showCompass: true }), 'top-right');
  map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
  // The compact attribution control is a <details> element that MapLibre
  // auto-opens the moment it first populates with attribution text (sources
  // load asynchronously, so this can happen well after map creation) — force
  // it closed that one time so only the small (i) icon shows by default,
  // without blocking the user from opening it themselves afterwards.
  const attribEl = document.querySelector('.maplibregl-ctrl-attrib');
  const attribInner = attribEl?.querySelector('.maplibregl-ctrl-attrib-inner');
  if (attribEl && attribInner) {
    const closeOnceTextAppears = () => {
      if (attribInner.textContent.trim() === '') return;
      attribEl.removeAttribute('open');
      attribEl.classList.remove('maplibregl-compact-show');
      observer.disconnect();
    };
    const observer = new MutationObserver(closeOnceTextAppears);
    observer.observe(attribInner, { childList: true, characterData: true, subtree: true });
  }

  map.on('click', (e) => {
    // High-Res has its own precise, position-aware probe (see below) — this
    // generic one reports a single flat per-hour/per-elevation number with
    // no real x/y variation, which is exactly what High-Res must NOT show.
    if (isHighResMode) return;
    // The click-to-probe popup reports snow depth (cm) for the snowfall/
    // accumulated views; it has no meaning on the Live temperature map, so
    // skip it there.
    if (viewMode === 'live') return;
    const rawElev = map.queryTerrainElevation(e.lngLat, { exaggerated: false });
    if (rawElev == null || isNaN(rawElev)) return;
    // The DEM tileset occasionally returns a spurious spike well above the
    // real summit (e.g. 3241m read back for Ruapehu, whose true summit is
    // ~2797m) — clamp to this resort's configured upper bound so the probe
    // popup never shows an impossible elevation.
    const elev = Math.min(rawElev, TOP_ELEV);
    const depthCm = getDepthAtElevation(elev);
    if (viewMode === 'accumulated') {
      // Move the black snowfall pill to the tapped point (depth there) and
      // restart its 4s fade — the pill is the readout on the accumulated map.
      flashSnowfallMarker(e.lngLat, `❄ ${depthCm.toFixed(1)} cm`);
    } else {
      showClickPopup(e.point.x, e.point.y, `${depthCm.toFixed(1)}cm`);
    }
  });

  // High-Res: precise, position-aware tap-to-probe. Unlike getDepthAtElevation
  // (used by the generic handler above — one flat number for the whole
  // mountain in Hourly mode, ignoring x/y entirely, which is the exact bug
  // reported: tapping an unshaded/lee area still showing the same "1-2cm" as
  // a shaded/windward one), this recomputes the real per-point calculation —
  // same gradient/wind-vector/multiplier formula the coloured overlay itself
  // is rendered with (see orographicWindVectorsForHour/orographicMultiplier
  // above) — so the number always matches the colour under your finger.
  map.on('click', (e) => {
    if (!isHighResMode) return;
    const hour = forecastHours[currentIndex];
    if (!hour || hour.windSpeedKmh == null || hour.windDirDeg == null || hour.freezingLevel == null || hour.snowfallMm == null) return;
    const rawElev = map.queryTerrainElevation(e.lngLat, { exaggerated: false });
    if (rawElev == null || isNaN(rawElev)) return;
    const elev = Math.min(rawElev, TOP_ELEV);

    const snowing = hour.snowfallMm >= SNOWFALL_THRESHOLD_MM;
    const boundary = snowing ? hour.freezingLevel - SNOW_OFFSET : hour.freezingLevel;
    if (elev < boundary) { showClickPopup(e.point.x, e.point.y, '0.0cm'); return; }
    if (!snowing) { showClickPopup(e.point.x, e.point.y, 'No active snowfall'); return; }

    const grad = orographicSampleGradient(e.lngLat);
    if (!grad) {
      // Terrain query failed for a neighbour point (e.g. right at a tile
      // edge) — report the unadjusted point-forecast value rather than
      // nothing, but say so plainly instead of implying it's spatially precise.
      showClickPopup(e.point.x, e.point.y, `~${(hour.snowfallMm / 10).toFixed(1)}cm (unadjusted)`);
      return;
    }
    const vectors = orographicWindVectorsForHour(hour);
    const { U, V } = orographicWindAtElevation(vectors, elev);
    const multiplier = orographicMultiplier(U, V, grad.gradEast, grad.gradNorth);
    const cm = (hour.snowfallMm * multiplier) / 10;
    showClickPopup(e.point.x, e.point.y, `${cm.toFixed(1)}cm`);
  });

  // A user drag/zoom/rotate/pitch invalidates every particle's last screen
  // than let it draw bogus streaks connecting stale to fresh projections.
  // The decorative auto-rotate below also fires movestart/moveend every
  // single frame via setBearing(), but those calls have no originalEvent
  // (only real user gestures do) — skip pausing for those so the overlay
  // keeps flowing smoothly while the camera idles.
  let windInteractionActive = false;
  map.on('movestart', (e) => {
    if (!e.originalEvent) return;
    windInteractionActive = true;
  });
  map.on('moveend', () => {
    if (!windInteractionActive) return;
    windInteractionActive = false;
  });

  // Very slow auto-rotate, purely decorative — stops for good the moment the
  // user actually touches the map (drag, zoom, pinch, scroll) so it never
  // fights their own camera control. It does NOT start on load: it's kicked
  // off (ramped in) once the fly-in lands the camera on the default view (see
  // the fly-in reveal and the self-pill handler), so nothing rotates during
  // the approach. Also toggleable via the rotate button.
  const AUTO_ROTATE_SPEED = 0.015;   // degrees per frame at full speed
  const AUTO_ROTATE_RAMP_MS = 2500;  // ease the speed up from 0 over this long
  let autoRotateActive = false;
  let autoRotateRampStart = null;    // performance.now() when a ramp began; null = full speed
  const mapEl = document.getElementById('map');
  const rotateStep = () => {
    if (!autoRotateActive) return;
    let speed = AUTO_ROTATE_SPEED;
    if (autoRotateRampStart != null) {
      const t = Math.min((performance.now() - autoRotateRampStart) / AUTO_ROTATE_RAMP_MS, 1);
      speed = AUTO_ROTATE_SPEED * (t * t); // quadratic ease-in: starts still, builds smoothly to full
      if (t >= 1) autoRotateRampStart = null;
    }
    map.setBearing(map.getBearing() + speed);
    requestAnimationFrame(rotateStep);
  };
  const stopAutoRotate = () => {
    autoRotateActive = false;
    autoRotateRampStart = null;
    document.getElementById('rotate-toggle').classList.remove('active');
  };
  const startAutoRotate = (ramp) => {
    if (autoRotateActive) return;
    autoRotateActive = true;
    autoRotateRampStart = ramp ? performance.now() : null;
    document.getElementById('rotate-toggle').classList.add('active');
    requestAnimationFrame(rotateStep);
    armInteractionStop();
  };
  // Auto-rotate stops for good the moment the user touches the map (drag, zoom,
  // pinch, scroll) so it never fights their own camera control — re-armed each
  // time rotation is (re)started.
  const armInteractionStop = () => {
    ['mousedown', 'touchstart', 'wheel'].forEach((evt) =>
      mapEl.addEventListener(evt, stopAutoRotate, { once: true, passive: true })
    );
  };
  // Exposed for the top-left rotate button.
  window.toggleAutoRotate = () => {
    if (autoRotateActive) stopAutoRotate();
    else startAutoRotate(true);
  };
  // Called once the camera lands on the default view (fly-in complete) to ramp
  // the decorative rotation in from a standstill.
  window.__startAutoRotateRampIn = () => startAutoRotate(true);
}

// ── Trial: real 3D snow particles ────────────────────────────────────────
// A MapLibre "custom layer" drawing raw WebGL point sprites positioned with
// MercatorCoordinate.fromLngLat(lngLat, altitudeMeters) — the same 3D space
// (and the same projection matrix) the terrain itself renders into, so with
// depth testing on, mountains between a flake and the camera occlude it
// correctly. This is a first trial: off by default, toggled via the
// snowflake button next to the rotate control, not tied to any real
// forecast/weather data.
function createSnowLayer(loc) {
  const PARTICLE_COUNT = 700;
  // Spawn area is a rough circle around the resort's own centre — not tied to
  // the actual camera framing, so it reads fine at the default view but may
  // look sparse/dense if you zoom far in or out. (First trial used 0.03/~3km,
  // which was too tight — barely covered the visible frame at the resort's
  // usual wide, pitched establishing shot.)
  const SPAWN_RADIUS_DEG = 0.08; // ~8km at these latitudes
  const TOP_ALT = (loc.topElev || loc.summitElev + 200) + 400;
  const BOTTOM_ALT = Math.max(0, loc.baseElev - 300);
  const FALL_SPEED = 40; // metres/sec — tuned by eye, not physically modelled

  const lngs = new Float64Array(PARTICLE_COUNT);
  const lats = new Float64Array(PARTICLE_COUNT);
  const alts = new Float64Array(PARTICLE_COUNT);
  const phases = new Float32Array(PARTICLE_COUNT);
  const sways = new Float32Array(PARTICLE_COUNT);
  const verts = new Float32Array(PARTICLE_COUNT * 3);

  function respawn(i, randomAltitude) {
    const ang = Math.random() * Math.PI * 2;
    const r = Math.random() * SPAWN_RADIUS_DEG;
    lngs[i] = loc.center[0] + (Math.cos(ang) * r) / Math.cos((loc.center[1] * Math.PI) / 180);
    lats[i] = loc.center[1] + Math.sin(ang) * r;
    alts[i] = randomAltitude ? BOTTOM_ALT + Math.random() * (TOP_ALT - BOTTOM_ALT) : TOP_ALT;
    phases[i] = Math.random() * Math.PI * 2;
    sways[i] = 0.00015 + Math.random() * 0.00025; // small side-to-side drift, in degrees of longitude
  }
  for (let i = 0; i < PARTICLE_COUNT; i++) respawn(i, true);

  let program, buffer, aPos, uMatrix, lastT = null;

  return {
    id: 'snow-particles',
    type: 'custom',
    renderingMode: '3d',
    onAdd(map, gl) {
      const compile = (type, src) => {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
          console.error('snow-particles shader compile error:', gl.getShaderInfoLog(s));
        }
        return s;
      };
      program = gl.createProgram();
      gl.attachShader(program, compile(gl.VERTEX_SHADER, `
        uniform mat4 u_matrix;
        attribute vec3 a_pos;
        void main() {
          gl_Position = u_matrix * vec4(a_pos, 1.0);
          gl_PointSize = 7.0;
        }
      `));
      // A pure white dot barely shows up against snow-covered white terrain —
      // first trial's actual failure mode (per a live screenshot: the layer
      // was active but effectively invisible). Gives each flake a soft dark
      // rim around a white core so it reads against light AND dark
      // backgrounds instead of just one.
      gl.attachShader(program, compile(gl.FRAGMENT_SHADER, `
        precision mediump float;
        void main() {
          float dist = length(gl_PointCoord - vec2(0.5));
          if (dist > 0.5) discard;
          float core = 1.0 - smoothstep(0.24, 0.4, dist);
          float rim = smoothstep(0.24, 0.4, dist) * (1.0 - smoothstep(0.4, 0.5, dist));
          vec3 color = mix(vec3(0.2, 0.28, 0.4), vec3(1.0), core);
          gl_FragColor = vec4(color, max(core, rim * 0.7));
        }
      `));
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('snow-particles program link error:', gl.getProgramInfoLog(program));
      }
      aPos = gl.getAttribLocation(program, 'a_pos');
      uMatrix = gl.getUniformLocation(program, 'u_matrix');
      buffer = gl.createBuffer();
    },
    render(gl, matrix) {
      const now = performance.now();
      const dt = lastT == null ? 0 : Math.min(0.1, (now - lastT) / 1000);
      lastT = now;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        alts[i] -= FALL_SPEED * dt;
        phases[i] += dt;
        if (alts[i] < BOTTOM_ALT) respawn(i, false);
        const swayLng = Math.sin(phases[i]) * sways[i];
        const mc = maplibregl.MercatorCoordinate.fromLngLat([lngs[i] + swayLng, lats[i]], alts[i]);
        verts[i * 3] = mc.x; verts[i * 3 + 1] = mc.y; verts[i * 3 + 2] = mc.z;
      }

      gl.useProgram(program);
      gl.uniformMatrix4fv(uMatrix, false, matrix);
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, verts, gl.DYNAMIC_DRAW);
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
      gl.enable(gl.DEPTH_TEST);
      // Flakes shouldn't occlude each other/write into the depth buffer —
      // only terrain should ever block them — just test against what's
      // already there.
      gl.depthMask(false);
      gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);
      gl.depthMask(true);
    }
  };
}

let snowParticlesActive = false;
let snowParticlesAnimHandle = null;
function toggleSnowParticles() {
  if (!map) return;
  snowParticlesActive = !snowParticlesActive;
  const btn = document.getElementById('snow-toggle');
  if (btn) btn.classList.toggle('active', snowParticlesActive);
  if (snowParticlesActive) {
    if (!map.getLayer('snow-particles')) map.addLayer(createSnowLayer(LOC));
    const loop = () => {
      if (!snowParticlesActive) return;
      map.triggerRepaint();
      snowParticlesAnimHandle = requestAnimationFrame(loop);
    };
    loop();
  } else {
    if (snowParticlesAnimHandle) cancelAnimationFrame(snowParticlesAnimHandle);
    snowParticlesAnimHandle = null;
    if (map.getLayer('snow-particles')) map.removeLayer('snow-particles');
  }
}

// ── Trial: slope-aware snow overlay ("world-based angle shader") ───────────
// Goal: whiten flat/low-angle ground above a given elevation (realistic snow
// cover) while leaving steep faces/cliffs showing the bare summer satellite
// imagery — snow doesn't stick to a near-vertical rock face. MapLibre has no
// paint-expression input for per-pixel slope (color-relief only takes
// ['elevation']; hillshade computes slope internally but doesn't expose it),
// so this derives it by hand: a custom tile protocol re-fetches the exact
// same terrain-rgb DEM tiles already driving hillshade/color-relief, decodes
// elevation per pixel, computes slope via finite differences against
// neighboring pixels, and outputs a white PNG tile whose alpha encodes
// "flat enough and high enough to hold snow" — added as an ordinary raster
// layer, no custom WebGL/terrain-internals needed for the actual draw.
//
// Known limitations of this first trial:
// - The DEM source doesn't set `encoding`, so MapLibre's own terrain/
//   hillshade/color-relief default to reading it as "mapbox". decodeTerrainRGB
//   below tries that same formula first, but falls back to "terrarium" when
//   the result is nowhere near a plausible elevation — protects the elevation
//   cutoff and slope calc here in case mapterhorn's tiles turn out to use the
//   other encoding (a mismatch would otherwise decode elevation as wildly
//   too large, making the elevation gate never trigger and slope read far
//   steeper than real terrain).
// - Slope is computed from each tile's own pixels only (neighbors clamped at
//   the tile edge, not sampled from the adjacent tile), so faint seams may
//   be visible at tile boundaries.
// - Not wired to the resort's actual live freezing level/snow line yet —
//   the elevation/slope/fade sliders (#snow-overlay-controls) are for
//   hand-tuning what "realistic" should even look like first.
// Live-adjustable via the slider panel — read fresh by the tile protocol on
// every tile it generates, not baked in as constants.
const snowOverlayParams = { minElev: 0, patchBandM: 150, maxSlopeDeg: 40, fadeDeg: 8, opacity: 0.9 };

// No real DEM anywhere on earth is outside roughly this band (Dead Sea
// shore to above Everest, with margin) — used only to sanity-check which
// encoding formula actually matches the tiles below.
const PLAUSIBLE_ELEV_MIN_M = -500;
const PLAUSIBLE_ELEV_MAX_M = 9500;

function decodeTerrainRGB(r, g, b) {
  const mapbox = -10000 + (r * 256 * 256 + g * 256 + b) * 0.1;
  if (mapbox >= PLAUSIBLE_ELEV_MIN_M && mapbox <= PLAUSIBLE_ELEV_MAX_M) return mapbox;
  // mapbox decode landed way outside anything real — these tiles are almost
  // certainly "terrarium"-encoded instead, so retry with that formula.
  return (r * 256 + g + b / 256) - 32768;
}

function tileCenterLatRad(y, z) {
  const n = Math.pow(2, z);
  return Math.atan(Math.sinh(Math.PI * (1 - (2 * (y + 0.5)) / n)));
}

// Web Mercator tile pixel -> [lon, lat] — used by the contour radial-fade
// (see registerContourLinesProtocol) to know how far a given pixel is from
// the resort's own coordinate.
function tilePixelToLonLat(x, y, z, px, py, size) {
  const n = Math.pow(2, z);
  const lon = ((x + px / size) / n) * 360 - 180;
  const latRad = Math.atan(Math.sinh(Math.PI * (1 - (2 * (y + py / size)) / n)));
  return [lon, (latRad * 180) / Math.PI];
}

// Equirectangular approximation, not full great-circle — plenty accurate at
// the tens-of-km scale this is used at (a few km of error over 200km is
// visually meaningless for a smooth fade), and much cheaper per-pixel than
// Haversine.
function approxDistanceKm(lat1, lon1, lat2, lon2, cosAvgLatRad) {
  const R = 6371;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = (((lon2 - lon1) * Math.PI) / 180) * cosAvgLatRad;
  return R * Math.sqrt(dLat * dLat + dLon * dLon);
}

// Deterministic 2D value noise (smoothed integer-lattice hash), used to make
// the snow/no-snow transition near "Min elevation" break up into shrinking
// patches instead of fading as a uniform sheet — a real snowline doesn't dim
// evenly, it gets patchier and the patches get smaller until there's none.
// Seeded from *world* pixel coordinates (tile index * tile size + in-tile
// pixel offset, at a fixed zoom), so neighbouring tiles connect with no seam.
function noiseHash(ix, iy) {
  let n = ix * 374761393 + iy * 668265263;
  n = (n ^ (n >> 13)) * 1274126177;
  n ^= n >> 16;
  return ((n >>> 0) % 65536) / 65536;
}
function smoothstep01(t) { return t * t * (3 - 2 * t); }
function valueNoise2D(x, y) {
  const x0 = Math.floor(x), y0 = Math.floor(y);
  const sx = smoothstep01(x - x0), sy = smoothstep01(y - y0);
  const n00 = noiseHash(x0, y0),     n10 = noiseHash(x0 + 1, y0);
  const n01 = noiseHash(x0, y0 + 1), n11 = noiseHash(x0 + 1, y0 + 1);
  const a = n00 + (n10 - n00) * sx;
  const b = n01 + (n11 - n01) * sx;
  return a + (b - a) * sy;
}
// Size, in raw DEM-tile pixels, of one noise cell — tuned by eye so patches
// read as plausible snow-patch clusters rather than fine grain or giant
// blobs at typical Snow Test zoom levels.
const SNOW_PATCH_CELL_PX = 22;

let demTileUrlTemplate = null;
async function getDemTileUrlTemplate() {
  if (demTileUrlTemplate) return demTileUrlTemplate;
  const res = await fetch('https://tiles.mapterhorn.com/tilejson.json');
  const json = await res.json();
  demTileUrlTemplate = json.tiles[0];
  return demTileUrlTemplate;
}

let snowOverlayProtocolRegistered = false;
function registerSnowOverlayProtocol() {
  if (snowOverlayProtocolRegistered) return;
  snowOverlayProtocolRegistered = true;
  maplibregl.addProtocol('snowslope', async (params) => {
    const [z, x, y] = params.url.replace('snowslope://', '').split('/').map(Number);
    const template = await getDemTileUrlTemplate();
    const demUrl = template.replace('{z}', z).replace('{x}', x).replace('{y}', y);
    const res = await fetch(demUrl);
    const blob = await res.blob();
    const bitmap = await createImageBitmap(blob);
    const size = bitmap.width;

    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0);
    const src = ctx.getImageData(0, 0, size, size).data;

    const elev = new Float32Array(size * size);
    for (let i = 0; i < size * size; i++) {
      elev[i] = decodeTerrainRGB(src[i * 4], src[i * 4 + 1], src[i * 4 + 2]);
    }

    // Read live so a slider drag is reflected the moment refreshSnowOverlay()
    // forces these tiles to be regenerated (see below) — not captured once
    // when the protocol was registered.
    const { minElev, patchBandM, maxSlopeDeg, fadeDeg } = snowOverlayParams;
    const metersPerPixel = (156543.03392 * Math.cos(tileCenterLatRad(y, z))) / Math.pow(2, z) * (256 / size);
    const out = ctx.createImageData(size, size);
    for (let py = 0; py < size; py++) {
      const ym1 = Math.max(0, py - 1), yp1 = Math.min(size - 1, py + 1);
      for (let px = 0; px < size; px++) {
        const i = py * size + px;
        const xm1 = Math.max(0, px - 1), xp1 = Math.min(size - 1, px + 1);
        const dzdx = (elev[py * size + xp1] - elev[py * size + xm1]) / (2 * metersPerPixel);
        const dzdy = (elev[yp1 * size + px] - elev[ym1 * size + px]) / (2 * metersPerPixel);
        const slopeDeg = (Math.atan(Math.sqrt(dzdx * dzdx + dzdy * dzdy)) * 180) / Math.PI;
        const elevHere = elev[i];
        const highEnough = elevHere >= minElev;
        const slopeFade = highEnough
          ? Math.min(1, Math.max(0, (maxSlopeDeg - slopeDeg) / fadeDeg))
          : 0;

        // Patchiness: within patchBandM metres above minElev, coverage ramps
        // 0→1 with height. Value noise is thresholded against that coverage,
        // so surviving patches shrink and fragment as coverage falls, rather
        // than the whole area dimming uniformly — vanishing entirely at/below
        // minElev (patchBandM=0 reproduces the old hard cutoff exactly).
        let patchAlpha = 1;
        if (highEnough && patchBandM > 0) {
          const coverage = Math.min(1, (elevHere - minElev) / patchBandM);
          if (coverage < 1) {
            const worldPx = x * size + px;
            const worldPy = y * size + py;
            const n = valueNoise2D(worldPx / SNOW_PATCH_CELL_PX, worldPy / SNOW_PATCH_CELL_PX);
            // Soft-edged threshold (0.12-wide ramp) so patch edges aren't a
            // hard per-pixel on/off flicker.
            patchAlpha = Math.min(1, Math.max(0, (coverage - n) / 0.12 + 0.5));
          }
        }

        const o = i * 4;
        out.data[o] = 255; out.data[o + 1] = 255; out.data[o + 2] = 255;
        out.data[o + 3] = Math.round(slopeFade * patchAlpha * 235);
      }
    }
    ctx.putImageData(out, 0, 0);

    const outBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    return { data: await outBlob.arrayBuffer() };
  });
}

// Elevation/slope/fade changes need the tiles themselves regenerated —
// MapLibre caches rendered tiles by source, so remove+re-add is the
// reliable way to force every visible tile through the protocol again.
// Opacity is a plain paint property and doesn't need this (see the
// oninput handler below).
function refreshSnowOverlay() {
  if (!map || !snowOverlayActive) return;
  if (map.getLayer('snow-overlay-layer')) map.removeLayer('snow-overlay-layer');
  if (map.getSource('snow-overlay')) map.removeSource('snow-overlay');
  map.addSource('snow-overlay', { type: 'raster', tiles: ['snowslope://{z}/{x}/{y}'], tileSize: 512 });
  map.addLayer({
    id: 'snow-overlay-layer', type: 'raster', source: 'snow-overlay',
    paint: { 'raster-opacity': snowOverlayParams.opacity },
  }, map.getLayer('resort-lifts-line') ? 'resort-lifts-line' : undefined);
}

// Debounced so dragging a slider doesn't fire a full tile-regeneration pass
// on every intermediate value — only once movement pauses for a beat.
let snowOverlayRefreshTimer = null;
function scheduleSnowOverlayRefresh() {
  clearTimeout(snowOverlayRefreshTimer);
  snowOverlayRefreshTimer = setTimeout(refreshSnowOverlay, 250);
}

function initSnowOverlayControls() {
  const elevInput = document.getElementById('soc-elev');
  // Slider range spans a bit below the base to a bit above the summit —
  // per-resort, via LOC — so it's always a meaningful range regardless of
  // which mountain is loaded.
  const lo = Math.round(LOC.baseElev - 500);
  const hi = Math.round((LOC.topElev || LOC.summitElev + 200) + 200);
  elevInput.min = lo; elevInput.max = hi;
  snowOverlayParams.minElev = LOC.baseElev;
  elevInput.value = snowOverlayParams.minElev;
  document.getElementById('soc-elev-val').textContent = Math.round(snowOverlayParams.minElev);

  document.getElementById('soc-patch').value = snowOverlayParams.patchBandM;
  document.getElementById('soc-patch-val').textContent = snowOverlayParams.patchBandM;

  document.getElementById('soc-slope').value = snowOverlayParams.maxSlopeDeg;
  document.getElementById('soc-slope-val').textContent = snowOverlayParams.maxSlopeDeg;
  document.getElementById('soc-fade').value = snowOverlayParams.fadeDeg;
  document.getElementById('soc-fade-val').textContent = snowOverlayParams.fadeDeg;
  document.getElementById('soc-opacity').value = Math.round(snowOverlayParams.opacity * 100);
  document.getElementById('soc-opacity-val').textContent = Math.round(snowOverlayParams.opacity * 100) + '%';
}

function onSnowOverlayElevInput(v) {
  snowOverlayParams.minElev = +v;
  document.getElementById('soc-elev-val').textContent = Math.round(+v);
  scheduleSnowOverlayRefresh();
}
function onSnowOverlayPatchInput(v) {

  document.getElementById('soc-patch-val').textContent = v;
  scheduleSnowOverlayRefresh();
}
function onSnowOverlaySlopeInput(v) {

  document.getElementById('soc-slope-val').textContent = v;
  scheduleSnowOverlayRefresh();
}
function onSnowOverlayFadeInput(v) {
  snowOverlayParams.fadeDeg = Math.max(1, +v); // guard div-by-zero in the fade calc above
  document.getElementById('soc-fade-val').textContent = v;
  scheduleSnowOverlayRefresh();
}
function onSnowOverlayOpacityInput(v) {
  snowOverlayParams.opacity = +v / 100;
  document.getElementById('soc-opacity-val').textContent = v + '%';
  // Opacity alone doesn't need tile regeneration — updates instantly.
