        <div class="obs-cell"><span class="k">Gust</span><span class="vv">${last.gustKt.toFixed(1)} kt</span></div>
        <div class="obs-cell"><span class="k">24h Max Gust</span><span class="vv">${(maxGust.gustKt * KT_TO_KMH).toFixed(1)} km/h</span></div>
        <div class="obs-cell"><span class="k">24h Temp Range</span><span class="vv">${tLo.toFixed(1)} – ${tHi.toFixed(1)}°C</span></div>
        <div class="obs-cell"><span class="k">Direction</span><span class="vv">${pwCompass(last.dir)} · ${last.dir}°</span></div>
        <div class="obs-cell"><span class="k">Last Updated</span><span class="vv">${agoTxt}</span></div>
      </div>
      <div class="obs-graph-title">Temperature · last 12 hours</div>
      ${pwTempGraph(series, 12)}
    </div>`;
  const close = () => back.remove();
  back.addEventListener('click', (e) => { if (e.target === back) close(); });
  back.querySelector('.obs-close').addEventListener('click', close);
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
  });
  document.getElementById('map-screen').appendChild(back);
  pwWireGraphHover(back);
}

function pwRenderPill(trackId) {
  const st = pwState[trackId];
  if (!st || !st.series.length) return;
  const lastTs = st.series[st.series.length - 1].ts;
  // pwDisplayTime !== null when scrubbing the live time slider into the past
  const live = pwDisplayTime == null;

  // In HOURLY view, show forecasted temperature; otherwise show observed
  let tempC;
  if (viewMode === 'hourly' && forecastHours[currentIndex]) {
    tempC = forecastHours[currentIndex].temp;
  } else {
    tempC = live ? st.series[st.series.length - 1].tempC : pwTempAtTime(st.series, pwDisplayTime);
  }

  const ageMin = (Date.now() / 1000 - lastTs) / 60;
  let el = st.marker && st.marker.getElement();
  if (!el) {
    el = document.createElement('div');
    el.className = 'station-pill';
    el.addEventListener('click', (e) => { e.stopPropagation(); pwOpenModal(pwState[trackId]); });
    // subpixelPositioning avoids the whole-pixel snapping that makes pills
    // jitter/wiggle during the slow continuous auto-rotate.
    st.marker = new maplibregl.Marker({ element: el, anchor: 'center', subpixelPositioning: true })
      .setLngLat([st.meta.lon, st.meta.lat]).addTo(map);
  }
  el.style.background = pwTempColor(tempC);
  el.classList.toggle('stale', live && ageMin > 90);
  el.style.display = pwVisible ? '' : 'none';
  // In HOURLY view the pills are showing forecast (not observed) data, so the
  // click-through to the observation modal would be misleading — make them
  // non-interactive there, matching the pseudo pills. Live/accumulated keep the
  // tap-to-open-obs behaviour. The pill never moves: its lng/lat stays the
  // real station's GPS location in every view.
  el.style.pointerEvents = viewMode === 'hourly' ? 'none' : 'auto';
  el.innerHTML = `<span class="dot"></span>${tempC.toFixed(1)}°C`;
}

// Single icon-tap toggle for all live observation pills (on by default).
function toggleObsLayer() {
  pwVisible = !pwVisible;
  const btn = document.getElementById('obs-toggle');
  if (btn) btn.classList.toggle('active', pwVisible);
  for (const id in pwState) {
    const el = pwState[id].marker && pwState[id].marker.getElement();
    if (el) el.style.display = pwVisible ? '' : 'none';
  }
  // Also toggle pseudo pills
  for (const el of document.querySelectorAll('.pseudo-pill')) {
    el.style.display = pwVisible ? '' : 'none';
  }
}

let pwLastError = '';     // last fetch failure, surfaced in the live panel
let pwHasData = false;    // have we ever successfully loaded ≥1 station?

async function pwRefresh(attempt = 0) {
  try {
    const tile = await pwFetchTiles();
    const tracks = tile.tracks || {};
    for (const s of PW_STATIONS) {
      // A station is identified either by an exact trackId or, when the trackId
      // isn't known, by a case-insensitive substring of its name (matched
      // against the fetched tile tracks). Resolve to a concrete trackId first.
      let trackId = s.trackId;
      if (!trackId && s.match) {
        const needle = s.match.toLowerCase();
        trackId = Object.keys(tracks).find((id) => {
          const nm = pwParseMeta(tracks[id].t).name;
          return nm && nm.toLowerCase().includes(needle);
        });
      }
      const tr = trackId && tracks[trackId];
      if (!tr) { console.warn('PredictWind: station', s.name || s.match || s.trackId, 'not in tiles'); continue; }
      const prev = pwState[trackId] || {};
      pwState[trackId] = {
        marker: prev.marker || null,
        meta: pwParseMeta(tr.t),
        series: pwDecodeSeries(tr.s),
        updated: tile.updated,
      };
      pwRenderPill(trackId);
    }
    pwLastError = '';
    pwHasData = true;
    if (typeof pwUpdateTempProfile === 'function') pwUpdateTempProfile();
  } catch (e) {
    pwLastError = e.message;
    console.warn('PredictWind obs fetch failed:', e.message);
    // A cold/flaky mobile connection can fail the first attempts (a stalled
    // request now aborts via pwFetchTimeout instead of hanging). Retry a few
    // times with backoff before falling back to the 5-min interval, and show
    // the failure in the panel so it's never a silent "Waiting…" forever.
    if (!pwHasData && viewMode === 'live') renderLivePanel();
    if (attempt < 4) setTimeout(() => pwRefresh(attempt + 1), 3000 * (attempt + 1));
  }
}

function initStationPill() {
  pwRefresh();
  if (!pwRefreshTimer) pwRefreshTimer = setInterval(() => pwRefresh(), 5 * 60 * 1000);
}

// ── Live temperature profile + whole-mountain colour overlay ───────────────
// Fit a linear lapse rate (temp = a + b·elevation) to the live station
// readings, then drive the elevation-keyed colour-relief layer with it so the
// whole terrain is tinted by modelled live temperature. Recomputed on every
// 5-min obs refresh.
let pwProfile = null; // { a, b, pts:[[elev,temp],...] }
const PW_OVERLAY_ALPHA = 0.72;
// Live time-slider state: scrub the past 6h. pwDisplayTime null = "now"/live.
let pwLiveGrid = [];      // ascending unix-sec timestamps over the past 6h
let pwLiveIdx = 0;        // current slider index into pwLiveGrid
let pwDisplayTime = null; // selected time, or null when showing live/latest
let pwLivePlayTimer = null;

function pwComputeProfile() {
  const pts = [];
  for (const id in pwState) {
    const s = pwState[id];
    if (s.meta.elevM != null && s.series.length) {
      pts.push({ id, elev: s.meta.elevM, temp: s.series[s.series.length - 1].tempC });
    }
  }
  if (pts.length < 2) return null;
  return pwLapseProfile(pts) || pwWeightedFitStations(pts);
}

function pwTempAt(elev) { return pwProfile ? pwProfile.a + pwProfile.b * elev : null; }

// Piecewise-linear live temperature at an arbitrary elevation, interpolated
// between the two nearest REAL stations that bracket it by height. Unlike the
// global lapse fit (pwTempAt), this keeps the interpolated "pseudo" pills
// consistently ordered with the real-station pills around them: a pill lower on
// the mountain never reads colder than a real station above it. (The global fit
// could do exactly that when a real station's reading sat above the average
// line — e.g. Whakapapa-2000m reading warmer than the fitted lapse predicted,
// leaving the interpolated Mid/Base pills just below it looking colder.)
function pwTempPiecewise(elev) {
  const pts = [];
  for (const id in pwState) {
    const s = pwState[id];
    if (s.meta && s.meta.elevM != null && s.series && s.series.length) {
      pts.push([s.meta.elevM, s.series[s.series.length - 1].tempC]);
    }
  }
  if (pts.length < 2) return pwTempAt(elev); // not enough stations — fall back to the global fit
  pts.sort((a, b) => a[0] - b[0]); // ascending by elevation
  const lerp = (a, b) => a[1] + (b[1] - a[1]) * (elev - a[0]) / ((b[0] - a[0]) || 1);
  // Below the lowest / above the highest station: extrapolate along the nearest segment.
  if (elev <= pts[0][0]) return lerp(pts[0], pts[1]);
  if (elev >= pts[pts.length - 1][0]) return lerp(pts[pts.length - 2], pts[pts.length - 1]);
  for (let i = 0; i < pts.length - 1; i++) {
    if (elev >= pts[i][0] && elev <= pts[i + 1][0]) return lerp(pts[i], pts[i + 1]);
  }
  return pwTempAt(elev);
}

// Weighted least-squares fit temp = a + b·elev over [[elev,temp],...] with weights.
// Higher weights give more influence to those points; used to prioritize on-mountain stations.
function pwWeightedFit(pts, weights) {
  const n = pts.length;
  if (n < 2 || !weights || weights.length !== n) return null;

  const sw = weights.reduce((q, w) => q + w, 0);
  if (sw === 0) return null;

  const sx = pts.reduce((q, p, i) => q + p[0] * weights[i], 0);
  const sy = pts.reduce((q, p, i) => q + p[1] * weights[i], 0);
  const sxx = pts.reduce((q, p, i) => q + p[0] * p[0] * weights[i], 0);
  const sxy = pts.reduce((q, p, i) => q + p[0] * p[1] * weights[i], 0);

  const den = sw * sxx - sx * sx;
  if (Math.abs(den) < 1e-6) return null;

  const b = (sw * sxy - sx * sy) / den;
  const a = (sy - b * sx) / sw;
  return { a, b, pts };
}

// Inversion-aware lapse/freezing model (ported from the reference algorithm).
// Derives the real-time lapse from the two highest (mountain) stations and
// anchors the profile ON those mountain stations (their midpoint), so the
// freezing level always stays consistent with the actual on-mountain readings
// and is never dragged off by cold-pooled valley stations. (A previous version
// anchored on the valley average and projected up at a fixed lapse, which on a
// mild/inverted night put the 0°C level ~1000 m below where the summit sensors
// actually sat — e.g. drawer 0°C ≈ 1065 m while the 2000 m station read +0.9°C.)
// Returns { a, b } for temp = a + b·elev (b < 0), or null when there aren't ≥2
// stations (caller then falls back to the weighted least-squares fit).
// pts: [{ elev, temp }].
function pwLapseProfile(pts) {
  if (!pts || pts.length < 2) return null;
  const sorted = pts.slice().sort((a, b) => a.elev - b.elev);
  const lowMtn = sorted[sorted.length - 2];          // two highest = mountain stations
  const highMtn = sorted[sorted.length - 1];

  // Real-time lapse from the two mountain stations, with a physical sanity gate.
  // A short station baseline can read super-adiabatic/inverted from noise, so we
  // only trust rates within 3.0–9.8 °C/km; otherwise use the standard rate.
  const DEFAULT_LAPSE = 0.0065;                       // 6.5 °C/1000m environmental fallback
  let lapse = DEFAULT_LAPSE;
  const altGap = highMtn.elev - lowMtn.elev;
  const tempGap = lowMtn.temp - highMtn.temp;         // > 0 = cooling with height
  if (altGap > 0 && tempGap >= 0) {
    const calc = tempGap / altGap;
    if (calc >= 0.0030 && calc <= 0.0098) lapse = calc; // moist 3.0 .. dry 9.8 °C/km
  }

  // Anchor on the mountain stations' midpoint (the on-mountain truth), not the
  // valley — valleys cold-pool and would pull the 0°C level far below the summit.
  const baseAlt = (lowMtn.elev + highMtn.elev) / 2;
  const baseTemp = (lowMtn.temp + highMtn.temp) / 2;
  const b = -lapse;
  return { a: baseTemp - b * baseAlt, b };
}

// Fallback weighting used when pwLapseProfile can't apply (too few stations).
// pts: [{ id, elev, temp }] -> weighted least-squares { a, b }.
function pwWeightedFitStations(pts) {
  const sortedDesc = pts.slice().sort((a, b) => b.elev - a.elev);
  const weights = pts.map(s => {
    if (resortKey === 'ruapehu') {
      if (s.id === '363045' || s.id === '363044') return 1.0; // Whakapapa 2000m + Halidays Hut
      if (s.id === '362779') return 0.3;                       // National Park Township
      return 0.1;
    }
    if (s.elev === sortedDesc[0].elev || (sortedDesc[1] && s.elev === sortedDesc[1].elev)) return 1.0;
    if (sortedDesc[2] && s.elev === sortedDesc[2].elev) return 0.3;
    return 0.1;
  });
  return pwWeightedFit(pts.map(s => [s.elev, s.temp]), weights);
}

// Least-squares fit temp = a + b·elev over [[elev,temp],...].
function pwFit(pts) {
  const n = pts.length;
  if (n < 2) return null;
  const sx = pts.reduce((q, p) => q + p[0], 0), sy = pts.reduce((q, p) => q + p[1], 0);
  const sxx = pts.reduce((q, p) => q + p[0] * p[0], 0), sxy = pts.reduce((q, p) => q + p[0] * p[1], 0);
  const den = n * sxx - sx * sx;
  if (Math.abs(den) < 1e-6) return null;
  const b = (n * sxy - sx * sy) / den, a = (sy - b * sx) / n;
  return { a, b, pts };
}

// Profile fitted to each station's temperature at a past time `t` with weighted fitting.
function pwComputeProfileAt(t) {
  const pts = [];
  for (const id in pwState) {
    const s = pwState[id];
    if (s.meta.elevM != null && s.series.length >= 2 && t >= s.series[0].ts) {
      pts.push({ id, elev: s.meta.elevM, temp: pwTempAtTime(s.series, t) });
    }
  }
  if (pts.length < 2) return null;
  return pwLapseProfile(pts) || pwWeightedFitStations(pts);
}

// Discrete temperature bands (°C). Each band is a solid colour with a hard
// edge — no smooth blend. Band [edge, edge+step) is coloured at its midpoint.
const PW_BAND_STEP = 1;
const PW_BAND_LO = -12;
const PW_OVERLAY_MAX_TEMP = 5; // only tint terrain at/below this; warmer = bare tile

// Inverse profile: elevation at which the modelled temperature equals `t`.
function pwElevAtTemp(t) { return (t - pwProfile.a) / pwProfile.b; }

// Build a hard-edged band ramp over elevation. Temperature is linear in
// elevation, so equal-temp bands map to elevation thresholds. MapLibre's
// color-relief layer only renders `interpolate` (not `step`) ramps, so we
// fake the hard edges: hold each band's colour flat, then jump to the next
// across a 0.5 m gap — a near-vertical transition that reads as a crisp edge.
// Terrain warmer than PW_OVERLAY_MAX_TEMP is fully transparent (bare map tile).
function pwBuildTempRamp() {
  const TRANSP = 'rgba(0,0,0,0)';
  const flat = (t) => { const [r, g, b] = pwTempRGB(t); return `rgba(${r},${g},${b},${PW_OVERLAY_ALPHA})`; };
  if (!pwProfile || pwProfile.b >= 0) return TRANSP;
  const EPS = 0.5;
  // boundaries from the warm cutoff down; descending temp -> ascending elevation
  const bounds = [];
  for (let t = PW_OVERLAY_MAX_TEMP; t >= PW_BAND_LO; t -= PW_BAND_STEP) bounds.push({ t, e: pwElevAtTemp(t) });
  const ramp = ['interpolate', ['linear'], ['elevation']];
  let prev = TRANSP;                                   // warmer than cutoff: no overlay
  ramp.push(bounds[0].e - 400, prev);
  for (const bd of bounds) {
    const next = flat(bd.t - PW_BAND_STEP / 2);        // band just colder than this edge
    ramp.push(bd.e - EPS, prev, bd.e, next);
    prev = next;
  }
  ramp.push(bounds[bounds.length - 1].e + 200, prev);
  return ramp;
}

function renderLivePanel() {
  if (!pwProfile) {
    const msg = pwLastError
      ? `Couldn't load observations (${pwLastError}). Retrying…`
      : 'Waiting for observations…';
    document.getElementById('live-rows').innerHTML = `<div class="live-stat">${msg}</div>`;
    document.getElementById('live-legend').innerHTML = '';
    return;
  }
  // Compact summary only — individual station rows removed to save map space.
  const lapse = (-pwProfile.b * 1000).toFixed(1);          // °C per 1000 m (positive = cooling with height)
  const freezeElev = pwProfile.b < 0 ? Math.round(-pwProfile.a / pwProfile.b) : null;
  const summitT = pwTempAt(TOP_ELEV);
  document.getElementById('live-rows').innerHTML = `
    <div class="live-stat"><span>Lapse rate</span><b>${lapse}°C / 1000m</b></div>
    <div class="live-stat"><span>0°C level</span><b>${freezeElev != null ? freezeElev + ' m' : '—'}</b></div>
    <div class="live-stat"><span>Modelled summit (${Math.round(TOP_ELEV)}m)</span><b>${summitT != null ? summitT.toFixed(1) + '°C' : '—'}</b></div>`;

  // banded legend, hard edges matching the overlay. Overlay is clipped to
  // ≤5°C, so the legend runs from that cutoff down to the summit temperature.
  const ehi = Math.max(TOP_ELEV, 2800);
  const top = PW_OVERLAY_MAX_TEMP;
  const bot = Math.min(top - PW_BAND_STEP, Math.floor(pwTempAt(ehi) / PW_BAND_STEP) * PW_BAND_STEP);
  const span = Math.max(PW_BAND_STEP, top - bot);
  const segs = [];
  for (let t = top; t > bot; t -= PW_BAND_STEP) {
    const c = pwTempColor(t - PW_BAND_STEP / 2);
    const x0 = (top - t) / span * 100, x1 = (top - (t - PW_BAND_STEP)) / span * 100;
    segs.push(`${c} ${x0}%`, `${c} ${x1}%`);
  }
  document.getElementById('live-legend').innerHTML =
    `<div class="bar" style="background:linear-gradient(90deg,${segs.join(',')})"></div>
     <div class="ticks"><span>≤${top}°C</span><span>${PW_BAND_STEP}° bands</span><span>${bot}°C</span></div>`;
}

// Called after each obs refresh; recompute the fit and, if Live is active,
// rebuild the 6h time grid and repaint at the currently-selected position.
function pwUpdateTempProfile() {
  pwProfile = pwComputeProfile();
  pwBroadcastProfile();
  // Pseudo summit/base pills aren't live-only — show them on the hourly and
  // accumulated views too (the live path renders them itself, below).
  if (viewMode !== 'live') { pwRenderPseudoPills(); return; }
  pwLiveGrid = pwBuildLiveGrid();
  const slider = document.getElementById('ltl-slider');
  if (pwLiveGrid.length) {
    slider.max = pwLiveGrid.length - 1;
    const wasNow = pwDisplayTime == null;
    pwApplyLiveAt(wasNow ? pwLiveGrid.length - 1 : Math.min(pwLiveIdx, pwLiveGrid.length - 1));
  } else {
    if (pwProfile) applyRampWhenReady(pwBuildTempRamp());
    renderLivePanel();
    pwRenderFreezingOverlay();
    pwRenderPseudoPills();
  }
}

function renderLiveTempView() {
  pwStopLivePlay();
  pwLiveGrid = pwBuildLiveGrid();
  const slider = document.getElementById('ltl-slider');
  if (pwLiveGrid.length) {
    slider.min = 0; slider.max = pwLiveGrid.length - 1;
    pwApplyLiveAt(pwLiveGrid.length - 1); // start at "now"
  } else {
    pwDisplayTime = null;
    pwProfile = pwComputeProfile();
    pwBroadcastProfile();
    if (pwProfile) applyRampWhenReady(pwBuildTempRamp());
    // Repaint real pills so they switch back to observed temps and become
    // clickable again even when there's no live grid to scrub.
    for (const id in pwState) pwRenderPill(id);
    renderLivePanel();
    pwRenderFreezingOverlay();
    pwRenderPseudoPills();
  }
  setTimeout(() => map.resize(), 60);
}

// ── Live time slider: scrub the past 6 hours ───────────────────────────────
function pwBuildLiveGrid(hours = 6) {
  const stations = Object.values(pwState).filter(s => s.meta.elevM != null && s.series.length >= 2);
  if (stations.length < 2) return [];
  const endTs = Math.min(...stations.map(s => s.series[s.series.length - 1].ts));
  const startTs = endTs - hours * 3600;
  // Fine 1-minute grid: station samples are sparse (~10-30 min apart) but
  // pwTempAtTime interpolates linearly between them, so a fine grid gives smooth
  // playback motion instead of big 10-minute jumps. It also makes scrubbing the
  // slider finer-grained. Playback duration is fixed independently (pwTogglePlay).
  const STEP = 60;
  const grid = [];
  for (let t = startTs; t <= endTs; t += STEP) grid.push(t);
  if (grid[grid.length - 1] !== endTs) grid.push(endTs);
  return grid;
}

// Apply the live view at grid index `idx`: refit the profile at that time,
// repaint overlay + pills + panel + freezing marker, and sync the slider.
function pwApplyLiveAt(idx) {
  if (!pwLiveGrid.length) return;
  idx = Math.max(0, Math.min(idx, pwLiveGrid.length - 1));
  pwLiveIdx = idx;
  const t = pwLiveGrid[idx];
  const isNow = idx === pwLiveGrid.length - 1;
  pwDisplayTime = isNow ? null : t;
  pwProfile = isNow ? pwComputeProfile() : pwComputeProfileAt(t);
  if (pwProfile) applyRampWhenReady(pwBuildTempRamp());
  for (const id in pwState) pwRenderPill(id);
  renderLivePanel();
  pwRenderFreezingOverlay();
  pwRenderPseudoPills();
  const slider = document.getElementById('ltl-slider');
  slider.value = idx;
  document.getElementById('ltl-label').textContent =
    (isNow ? 'Now · ' : '') + new Date(t * 1000).toLocaleTimeString('en-NZ', { hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('ltl-prev').disabled = idx <= 0;
  document.getElementById('ltl-next').disabled = idx >= pwLiveGrid.length - 1;
}

function pwStepLive(delta) { pwStopLivePlay(); pwApplyLiveAt(pwLiveIdx + delta); }

function pwTogglePlay() {
  if (pwLivePlayTimer) { pwStopLivePlay(); return; }
  if (!pwLiveGrid.length) return;
  document.getElementById('ltl-play').textContent = '⏸';
  // Play the whole 6h window in a fixed ~16s at a steady ~16fps cadence, advancing
  // a fractional grid position so motion is smooth and the duration stays constant
  // no matter how many grid points there are (decoupled from grid resolution).
  const FRAME_MS = 60;     // ~16 fps render cadence
  const LOOP_MS = 16000;   // full-window playback duration
  const stepPerFrame = Math.max((pwLiveGrid.length - 1) * FRAME_MS / LOOP_MS, 1e-6);
  let pos = pwLiveIdx >= pwLiveGrid.length - 1 ? 0 : pwLiveIdx;
  pwLivePlayTimer = setInterval(() => {
    pos += stepPerFrame;
    if (pos > pwLiveGrid.length - 1) pos = 0; // loop back to 6h ago
    pwApplyLiveAt(Math.round(pos));
  }, FRAME_MS);
}

function pwStopLivePlay() {
  if (pwLivePlayTimer) { clearInterval(pwLivePlayTimer); pwLivePlayTimer = null; }
  const btn = document.getElementById('ltl-play');
  if (btn) btn.textContent = '▶';
}

// ── Real-time freezing-level nowcast ────────────────────────────────────────
// Station obs are sparse and lagging (a sample every ~10-30 min, and the series
// ends at the oldest "latest" sample across stations). Between real points we
// project the freezing level forward from its recent trend to the current
// wall-clock time, so the graph/number tick over second-by-second. The projected
// part is drawn in amber until the next real observation snaps it back to white.
let pwNowcastTimer = null;

function pwProjectedFreezing(fl) {
  if (!fl || fl.length < 2) return null;
  const last = fl[fl.length - 1];
  const now = Date.now() / 1000;
  if (now <= last.ts) return null; // no gap to project across yet
  // Least-squares slope (m/s) over the last ~90 min of freezing-level points.
  const recent = fl.filter(p => p.ts >= last.ts - 90 * 60);
  const pts = recent.length >= 2 ? recent : fl.slice(-2);
  const n = pts.length;
  const sx = pts.reduce((q, p) => q + p.ts, 0);
  const sy = pts.reduce((q, p) => q + p.fl, 0);
  const sxx = pts.reduce((q, p) => q + p.ts * p.ts, 0);
  const sxy = pts.reduce((q, p) => q + p.ts * p.fl, 0);
  const den = n * sxx - sx * sx;
  let slope = Math.abs(den) < 1e-6 ? 0 : (n * sxy - sx * sy) / den;
  const MAX_SLOPE = 500 / 3600;   // cap trend at ±500 m/hr so noise can't run away
  slope = Math.max(-MAX_SLOPE, Math.min(MAX_SLOPE, slope));
  const MAX_HORIZON = 30 * 60;    // never extrapolate more than 30 min past last obs
  const horizon = Math.min(now - last.ts, MAX_HORIZON);
  return { lastTs: last.ts, lastFl: last.fl, nowTs: last.ts + horizon, projFl: last.fl + slope * horizon };
}

function pwStartNowcast() {
  if (pwNowcastTimer) return;
  pwNowcastTimer = setInterval(() => {
    // Only tick when viewing live "now" and not scrubbing/playing history.
    if (viewMode === 'live' && pwDisplayTime == null && !pwLivePlayTimer) pwRenderFreezingOverlay();
  }, 1000);
}

function pwStopNowcast() {
  if (pwNowcastTimer) { clearInterval(pwNowcastTimer); pwNowcastTimer = null; }
}

// ── Freezing-level history sparkline ───────────────────────────────────────
// Reconstruct the 0°C level over the past few hours by refitting the lapse rate
// at each past timestep from the stations' temperature histories, then draw it
// as a bare white line along the bottom of the map.
function pwTempAtTime(series, ts) {
  if (ts <= series[0].ts) return series[0].tempC;
  const n = series.length;
  if (ts >= series[n - 1].ts) return series[n - 1].tempC;
  for (let i = 1; i < n; i++) {
    if (series[i].ts >= ts) {
      const a = series[i - 1], b = series[i];
      return a.tempC + (b.tempC - a.tempC) * (ts - a.ts) / (b.ts - a.ts);
    }
  }
  return series[n - 1].tempC;
}

function pwFreezingSeries(hours = 6) {
  const stationsWithId = Object.entries(pwState)
    .map(([trackId, s]) => ({ trackId, ...s }))
    .filter(s => s.meta.elevM != null && s.series.length >= 2);
  if (stationsWithId.length < 2) return [];
  const endTs = Math.min(...stationsWithId.map(s => s.series[s.series.length - 1].ts));
  const startTs = endTs - hours * 3600;
  const STEP = 15 * 60;
  const out = [];
  for (let t = startTs; t <= endTs; t += STEP) {
    const pts = [];
    for (const s of stationsWithId) {
      if (t >= s.series[0].ts) {
        pts.push({ id: s.trackId, elev: s.meta.elevM, temp: pwTempAtTime(s.series, t) });
      }
    }
    if (pts.length < 2) continue;
    const fit = pwLapseProfile(pts) || pwWeightedFitStations(pts);
    if (fit && fit.b < 0) {
      out.push({ ts: t, fl: -fit.a / fit.b });
    }
  }
  return out;
}

function pwRenderFreezingOverlay() {
  const host = document.getElementById('fl-overlay');

  // HOURLY mode: use pure forecast data - show full 16-day forecast with marker
  if (viewMode === 'hourly') {
    if (!forecastHours || forecastHours.length < 2) { host.style.display = 'none'; return; }

    host.style.display = 'block';
    const W = host.clientWidth || 280, H = host.clientHeight || 162;
    const P = { l: 12, r: 12, t: 18, b: 8 };
    const pw = W - P.l - P.r, ph = H - P.t - P.b;

    if (pw <= 0 || ph <= 0) { host.style.display = 'none'; return; }

    // Use freezing level directly from API when available, fall back to calculating from temps
    const flData = forecastHours
      .map((h, idx) => {
        if (h.temp == null) return null;
        let freezeElev = null;

        // Prefer direct API freezing level data
        if (h.freezingLevel != null) {
          freezeElev = h.freezingLevel;
        } else {
          // Fallback: calculate from temperatures if API doesn't provide freezing level
          const summitTemp = h.temp;
          const baseTemp = h.baseTemp;

          if (summitTemp != null && baseTemp != null && summitTemp !== baseTemp) {
            // Use forecast-based lapse rate
            const forecastLapse = (baseTemp - summitTemp) / (LOC.baseElev - LOC.summitElev);
            // Sanity check: if lapse rate is positive or very small, use standard instead
            if (forecastLapse > -0.002) {
              const stdLapse = -0.0065;
              freezeElev = (0 - summitTemp) / stdLapse + LOC.summitElev;
            } else {
              freezeElev = (0 - summitTemp) / forecastLapse + LOC.summitElev;
            }
          } else if (summitTemp != null) {
            // Fallback: standard lapse rate if base temp not available
            const stdLapse = -0.0065;
            freezeElev = (0 - summitTemp) / stdLapse + LOC.summitElev;
          }
        }

        return freezeElev != null ? { ts: idx, fl: freezeElev } : null;
      })
      .filter(p => p != null);

    if (flData.length < 2) { host.style.display = 'none'; return; }

    const t0 = flData[0].ts, t1 = flData[flData.length - 1].ts;
    const flValues = flData.map(p => p.fl);
    let lo = Math.min(...flValues), hi = Math.max(...flValues);

    // Ensure we have a reasonable range even if all values are the same
    if (hi - lo < 150) { const m = (hi + lo) / 2; lo = m - 75; hi = m + 75; }
    const padv = (hi - lo) * 0.15; lo -= padv; hi += padv;

    const X = (idx) => P.l + (t1 === t0 ? 0 : (idx - t0) / (t1 - t0)) * pw;
    const Y = (v) => P.t + ph - ((v - lo) / (hi - lo)) * ph;

    // Build path through all data points
    const pathPts = flData.map((p, i) => `${i ? 'L' : 'M'}${X(p.ts).toFixed(1)},${Y(p.fl).toFixed(1)}`).join(' ');

    // Marker at the currently selected hour
    const currentHour = forecastHours[currentIndex];
    const markX = X(currentIndex);
    let flValue = null;
    if (currentHour && currentHour.temp != null) {
      // Prefer direct API freezing level data
      if (currentHour.freezingLevel != null) {
        flValue = currentHour.freezingLevel;
      } else {
        // Fallback: calculate from temperatures
        const summitTemp = currentHour.temp;
        const baseTemp = currentHour.baseTemp;
        if (summitTemp != null && baseTemp != null && summitTemp !== baseTemp) {
          const forecastLapse = (baseTemp - summitTemp) / (LOC.baseElev - LOC.summitElev);
          // Sanity check: if lapse rate is positive or very small, use standard instead
          if (forecastLapse > -0.002) {
            const stdLapse = -0.0065;
            flValue = (0 - summitTemp) / stdLapse + LOC.summitElev;
          } else {
            flValue = (0 - summitTemp) / forecastLapse + LOC.summitElev;
          }
        } else if (summitTemp != null) {
          const stdLapse = -0.0065;
          flValue = (0 - summitTemp) / stdLapse + LOC.summitElev;
        }
      }
    }
    if (flValue == null) flValue = lo + (hi - lo) / 2;
    const markY = Y(flValue);

    const svg = host.querySelector('svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.innerHTML =
      `<path d="${pathPts}" fill="none" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8"/>
       <line x1="${markX.toFixed(1)}" y1="${P.t}" x2="${markX.toFixed(1)}" y2="${(P.t + ph).toFixed(1)}" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
       <circle cx="${markX.toFixed(1)}" cy="${markY.toFixed(1)}" r="4" fill="#fff" opacity="0.9" stroke="#7dd3fc" stroke-width="2"/>
       <text x="${markX.toFixed(1)}" y="${(markY - 10).toFixed(1)}" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" opacity="1">${Math.round(flValue)} m</text>`;

    document.getElementById('fl-caption').textContent = 'Freezing Level';
    return;
  }

  // LIVE mode: use observed data
  if (viewMode !== 'live') { host.style.display = 'none'; return; }
  const fl = pwFreezingSeries(6);
  if (fl.length < 2) { host.style.display = 'none'; return; }
  host.style.display = 'block';
  const W = host.clientWidth, H = host.clientHeight;
  const P = { l: 12, r: 12, t: 18, b: 8 };
  const pw = W - P.l - P.r, ph = H - P.t - P.b;
  // Real-time nowcast only when viewing "now" (not scrubbing the slider).
  const proj = pwDisplayTime == null ? pwProjectedFreezing(fl) : null;
  const t0 = fl[0].ts, t1 = Math.max(fl[fl.length - 1].ts, proj ? proj.nowTs : 0);
  const flVals = fl.map(p => p.fl); if (proj) flVals.push(proj.projFl);
  let lo = Math.min(...flVals), hi = Math.max(...flVals);
  if (hi - lo < 150) { const m = (hi + lo) / 2; lo = m - 75; hi = m + 75; }
  const padv = (hi - lo) * 0.25; lo -= padv; hi += padv;
  const X = (ts) => P.l + (t1 === t0 ? 0 : (ts - t0) / (t1 - t0)) * pw;
  const Y = (v) => P.t + ph - ((v - lo) / (hi - lo)) * ph;
  const d = fl.map((p, i) => `${i ? 'L' : 'M'}${X(p.ts).toFixed(1)},${Y(p.fl).toFixed(1)}`).join(' ');

  let extra = '', mx, my, flMark, markColor;
  if (proj) {
    // Amber dashed projection from the last real obs forward to "now".
    const lx = X(proj.lastTs), ly = Y(proj.lastFl);
    mx = X(proj.nowTs); my = Y(proj.projFl); flMark = proj.projFl; markColor = '#fbbf24';
    extra =
      `<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="2.5" fill="#fff" opacity="0.55"/>
       <path d="M${lx.toFixed(1)},${ly.toFixed(1)} L${mx.toFixed(1)},${my.toFixed(1)}" fill="none" stroke="${markColor}" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 4" stroke-opacity="0.95"/>`;
  } else {
    // Scrubbing: marker at the selected time (latest sample when at "now").
    const markTs = pwDisplayTime != null ? pwDisplayTime : fl[fl.length - 1].ts;
    flMark = fl[fl.length - 1].fl;
    for (let i = 1; i < fl.length; i++) {
      if (fl[i].ts >= markTs) {
        const a = fl[i - 1], b = fl[i];
        flMark = a.fl + (b.fl - a.fl) * (markTs - a.ts) / ((b.ts - a.ts) || 1);
        break;
      }
    }
    mx = X(markTs); my = Y(flMark); markColor = '#fff';
  }
  const svg = host.querySelector('svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML =
    `<defs><filter id="fl-text-shadow" x="-30%" y="-40%" width="160%" height="180%">
       <feDropShadow dx="0" dy="1" stdDeviation="1.3" flood-color="#000" flood-opacity="0.9"/>
     </filter></defs>
     <path d="${d}" fill="none" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.6"/>
     ${extra}
     <line x1="${mx.toFixed(1)}" y1="${P.t}" x2="${mx.toFixed(1)}" y2="${(P.t + ph).toFixed(1)}" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
     <circle cx="${mx.toFixed(1)}" cy="${my.toFixed(1)}" r="3.5" fill="${markColor}" opacity="0.9"/>
     <text x="${(mx - 8).toFixed(1)}" y="${(my - 6).toFixed(1)}" text-anchor="end" font-size="12" font-weight="700" fill="${markColor}" opacity="0.95" filter="url(#fl-text-shadow)">${flMark.toFixed(1)} m</text>`;
  document.getElementById('fl-caption').textContent = proj ? 'Freezing Level · now' : 'Freezing Level';
}

// Render pseudo temperature pills for ski field elevations (resort-specific).
function pwRenderPseudoPills() {
  // Remove existing pseudo pills
  for (const el of document.querySelectorAll('.pseudo-pill')) {
    if (el.marker) el.marker.remove();
  }
  // Pseudo pills: elevation and position per resort
  let pseudos = [];
  if (resortKey === 'cardrona') {
    pseudos = [
      { elev: 2178, lat: -44.865401, lon: 168.944538, label: 'Summit' },
      { elev: 1524, lat: -44.874271, lon: 168.964661, label: 'Base' },
    ];
  } else if (resortKey === 'ruapehu') {
    pseudos = [
      { elev: 1750, lat: -39.243813, lon: 175.561419, label: 'Mid' },
      { elev: 1630, lat: -39.236672, lon: 175.556259, label: 'Base' },
      { elev: 1120, lat: -39.199659, lon: 175.538945, label: 'Chateau' },
    ];
  } else if (resortKey === 'loveland') {
    pseudos = [
      { elev: 3871, lat: 39.673167, lon: -105.926355, label: 'Top' },
      { elev: 3292, lat: 39.680855, lon: -105.898442, label: 'Base' },
    ];
  } else if (resortKey === 'roundhill') {
    pseudos = [
      // Summit pill is HOURLY-only: at exactly LOC.summitElev the lapse
      // interpolation below returns summitTemp (= forecastHours[i].temp), so it
      // matches the drawer's "Summit Temp" (si-temp) and the Open-Meteo summit
      // value to the decimal. Hidden in live mode (no reliable summit obs).
      // Summit pill at the top of the Heritage rope tow (the top lift, ~2540m
      // terrain); base pill at the bottom of the main T-bar (the bottom lift,
      // ~1640m). Cold pill high, warm pill low — fixes the inverted-looking order.
      { elev: LOC.summitElev, lat: -43.8284976, lon: 170.6788681, label: 'Summit', hourlyOnly: true },
      { elev: 1800, lat: -43.8250478, lon: 170.6556881, label: 'Base' },
    ];
  } else if (resortKey === 'mtlyford') {
    // Summit pill at the top of the Terako Rope Tow (its southern terminal —
    // the highest lift-served point); base pill at the bottom of the Learner's
    // drag lift (the bottom lift, down at the field base ~1340m). The summit
    // pill keeps elev = LOC.summitElev so its temp syncs exactly to the forecast
    // summit value in hourly view. Both pills show in every view (no hourlyOnly):
    // in live they take interpolated observation temps via pwTempPiecewise, which
    // extrapolates above the top station so summit still reads colder than base.
    pseudos = [
      { elev: LOC.summitElev, lat: -42.4469023, lon: 173.1531393, label: 'Summit' },
      { elev: 1340, lat: -42.4481499, lon: 173.1444332, label: 'Base' },
    ];
  } else if (resortKey === 'mtvernon') {
    pseudos = [
      { elev: LOC.summitElev, lat: 39.72011925175132, lon: -105.26872905339022, label: 'Summit', hourlyOnly: true },
      { elev: 1800, lat: 39.71, lon: -105.27, label: 'Base' },
    ];
  } else if (resortKey === 'treblecone') {
    pseudos = [
      // Summit pill at the Saddle Basin top (~2088 m, up-slope/west); base pill at
      // the Home Basin base (~1260 m, down-slope/east) so they sit at clearly
      // different heights. Summit is hourly-only (synced to the forecast summit temp).
      { elev: LOC.summitElev, lat: -44.6363, lon: 168.8734, label: 'Summit', hourlyOnly: true },
      { elev: 1260, lat: -44.6325, lon: 168.8961, label: 'Base' },
    ];
  }
  if (!pseudos.length) return;
  // First pass: compute each pseudo pill's temperature.
  const items = [];
  for (const p of pseudos) {
    // Summit pseudo pills only make sense against forecast data; skip them in
    // live/accumulated where there's no per-hour summit temp to sync to.
    if (p.hourlyOnly && viewMode !== 'hourly') continue;
    // In HOURLY view, use pure forecast data; otherwise use observed
    let t;
    if (viewMode === 'hourly' && forecastHours[currentIndex]) {
      const hour = forecastHours[currentIndex];
      const summitTemp = hour.temp;
      const baseTemp = hour.baseTemp;

      if (summitTemp != null && baseTemp != null && summitTemp !== baseTemp) {
        // Calculate lapse rate from forecast data (no observed data used)
        const forecastLapse = (baseTemp - summitTemp) / (LOC.baseElev - LOC.summitElev);
        // Sanity check: if lapse rate is positive or very small, use standard instead
        // (positive lapse would mean temperature increases with elevation, which is unphysical)
        if (forecastLapse > -0.002) {
          const stdLapse = -0.0065;
          t = summitTemp + stdLapse * (p.elev - LOC.summitElev);
        } else {
          t = summitTemp + forecastLapse * (p.elev - LOC.summitElev);
        }
      } else if (summitTemp != null) {
        // Fallback if base temp not available: use a standard lapse rate of 0.0065°C/m
        const stdLapse = -0.0065;
        t = summitTemp + stdLapse * (p.elev - LOC.summitElev);
      }
    } else if (pwProfile) {
      // Live/observed: interpolate piecewise between the bracketing real stations
      // so pseudo pills stay ordered with the real pills (see pwTempPiecewise).
      t = pwTempPiecewise(p.elev);
    }
    if (t == null) continue;
    items.push({ p, t });
  }
  // Live/observed guard: interpolated/extrapolated obs can invert — an upper pill
  // reading warmer than a lower one. Clamp each higher pill to be no warmer than
  // the pill below it so they never visually invert. We deliberately do NOT force
  // a full standard lapse: that fabricated large cold offsets over big elevation
  // gaps, dragging mid pills colder than the real stations above them. pwTempPiecewise
  // already keeps pills ordered with the real station pills around them.
  if (viewMode !== 'hourly' && items.length > 1) {
    const asc = items.slice().sort((a, b) => a.p.elev - b.p.elev);
    for (let i = 1; i < asc.length; i++) {
      if (asc[i].t > asc[i - 1].t) asc[i].t = asc[i - 1].t;
    }
  }
  // Second pass: render each pill with its (possibly guarded) temperature.
  for (const { p, t } of items) {
    const el = document.createElement('div');
    el.className = 'station-pill pseudo-pill';
    el.style.background = pwTempColor(t);
    el.style.display = pwVisible ? '' : 'none';
    el.style.pointerEvents = 'none';  // non-interactive
    el.innerHTML = `<span class="dot"></span>${t.toFixed(1)}°C`;
    const marker = new maplibregl.Marker({ element: el, anchor: 'center', subpixelPositioning: true })
      .setLngLat([p.lon, p.lat]).addTo(map);
    el.marker = marker;
  }
}

document.getElementById('ltl-slider').addEventListener('input', (e) => {
  pwStopLivePlay();
  pwApplyLiveAt(parseInt(e.target.value, 10));
});

// ── Mobile bottom-sheet drawer ──────────────────────────────────────────────
// The snow-info panel becomes a swipeable drawer on phones: drag (or tap) the
// handle to snap between the full panel and a thin minimised bar. Pure CSS
// transform handles the open/closed positions; this only flips the class and
// follows the finger for a bit of live feedback.
(function setupDrawer() {
  const mq = window.matchMedia('(max-width: 700px)');
  const drawer = document.getElementById('snow-info');
  const handle = document.getElementById('drawer-handle');
  if (!drawer || !handle) return;

  let minimised = false;
  const setMin = (m) => { minimised = m; drawer.classList.toggle('drawer-min', m); };

  let startY = null, lastY = null, dragging = false, moved = false;
  const point = (e) => (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;

  const onStart = (e) => {
    if (!mq.matches) return;
    dragging = true; moved = false;
    startY = lastY = point(e).clientY;
  };
  const onMove = (e) => {
    if (!dragging) return;
    lastY = point(e).clientY;
    if (Math.abs(lastY - startY) > 4) moved = true;
  };
  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    if (!moved) { setMin(!minimised); return; }  // treat as tap
    const dy = lastY - startY;
    if (dy > 20) setMin(true);
    else if (dy < -20) setMin(false);
  };

  handle.addEventListener('touchstart', onStart, { passive: true });
  handle.addEventListener('touchmove', onMove, { passive: true });
  handle.addEventListener('touchend', onEnd);
  handle.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);

  // Launcher button (shown only while the drawer is hidden) reopens it.
  const launch = document.getElementById('drawer-launch');
  if (launch) launch.addEventListener('click', () => setMin(false));

  // Reset to fully-open when leaving mobile width.
  mq.addEventListener('change', (ev) => { if (!ev.matches) setMin(false); });
})();
</script>
