<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whakapapa — Snowfall Elevation Forecast</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.min.css" />
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #0f1c30 0%, #14253e 100%);
    min-height: 100vh;
    color: #fff;
  }

  /* ── Dark, fully-rounded zoom/compass control pill ──────────────────── */
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group {
    background: rgba(20,20,20,0.78);
    backdrop-filter: blur(14px);
    border: none;
    border-radius: 9999px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group button {
    background-color: transparent;
    width: 32px; height: 32px;
  }
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group button + button {
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group button:hover {
    background-color: rgba(255,255,255,0.15);
  }
  /* Default control icons are dark SVGs meant for a light pill; invert
     them to white so they read clearly on the new dark background. */
  .maplibregl-ctrl-top-right .maplibregl-ctrl-icon {
    filter: invert(1) brightness(1.6);
  }

  /* ── Fullscreen map ────────────────────────────────────────────────── */
  /* Height comes from --app-vh (set by JS below from the actual observed
     box height) rather than plain inset:0/100vh. When this page is embedded
     in the dashboard's iframe, the iframe's box is resized by the outer
     page's own flex layout (e.g. the mobile bottom nav bar's height); on at
     least some mobile WebKit builds, position:fixed's viewport-relative
     sizing here didn't reliably track that resize, leaving #map-screen (and
     everything anchored to its bottom, like #timeline) sized to a stale,
     shorter height — the mountain/controls got squeezed into the top
     portion of the iframe with blank space below. --app-vh is kept in sync
     with a ResizeObserver on the real root element instead, which the map
     canvas's own resize handling already relies on successfully below. */
  #map-screen { position: fixed; top: 0; left: 0; right: 0; height: var(--app-vh, 100vh); z-index: 500; }
  #map { width: 100%; height: 100%; }

  /* ── Timeline scrubber (play/pause + draggable slider) ─────────────────── */
  #timeline, #live-timeline, #radar-timeline {
    position: absolute; left: 20px; right: 20px; bottom: 20px; z-index: 10;
    display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(14px);
    border-radius: 30px; padding: 10px 18px;
    box-shadow: 0 6px 26px rgba(0,0,0,0.35);
  }
  #live-timeline, #radar-timeline { display: none; }
  #tl-play, #ltl-play, #rtl-play {
    flex-shrink: 0; background: rgba(255,255,255,0.14); color: #fff; border: none;
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #tl-play:hover, #ltl-play:hover, #rtl-play:hover { background: rgba(255,255,255,0.26); }
  #tl-slider, #ltl-slider, #rtl-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: rgba(255,255,255,0.25);
    cursor: pointer; outline: none;
  }
  #tl-slider::-webkit-slider-thumb, #ltl-slider::-webkit-slider-thumb, #rtl-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer;
    border: 3px solid #333;
  }
  #tl-slider::-moz-range-thumb, #ltl-slider::-moz-range-thumb, #rtl-slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer; border: 3px solid #333;
  }
  .tl-step {
    flex-shrink: 0; background: transparent; color: rgba(255,255,255,0.85); border: none;
    font-size: 1.2rem; cursor: pointer; width: 26px; height: 38px;
    display: flex; align-items: center; justify-content: center;
  }
  .tl-step:hover:not(:disabled) { color: #fff; }
  .tl-step:disabled { opacity: 0.3; cursor: default; }
  #tl-label, #ltl-label, #rtl-label {
    flex-shrink: 0; color: #fff; font-size: 0.78rem; font-weight: 600;
    min-width: 118px; text-align: right; font-variant-numeric: tabular-nums;
  }

  #snow-info {
    position: absolute; bottom: 92px; left: 20px; z-index: 10;
    background: rgba(10,20,36,0.78); backdrop-filter: blur(14px);
    border-radius: 14px; padding: 16px 20px; min-width: 220px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  #snow-info h3 { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); margin-bottom: 10px; }
  .si-row { display: flex; justify-content: space-between; gap: 14px; font-size: 0.84rem; padding: 4px 0; }
  .si-row .l { color: rgba(255,255,255,0.55); }
  .si-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }

  #speed-select {
    position: absolute; bottom: 92px; right: 20px; z-index: 10;
    display: flex; gap: 4px;
    background: rgba(10,20,36,0.78); backdrop-filter: blur(14px);
    border-radius: 999px; padding: 5px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .speed-btn {
    background: transparent; color: rgba(255,255,255,0.6); border: none;
    padding: 7px 11px; border-radius: 999px; font-size: 0.72rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .speed-btn:hover { color: #fff; }
  .speed-btn.active { background: #333; color: #fff; }

  /* Same grey+blur pill language as the top-controls row (pill-group/
     model-switch/resort-switcher/settings cog — all 38px tall). Background
     is a genuine mid-grey (not a darkened black) with a faint light border
     so these read clearly against a pure-black dark-mode sky too, not just
     against the map imagery. .active is brighter still, as a selected cue. */
  #map-enlarge, #map-close, #obs-toggle, #rotate-toggle, #snow-toggle, #snow-overlay-toggle, #basemap-toggle, #contour-toggle, #orographic-toggle {
    /* z-index above .maplibregl-marker (40) — live station pills are
       lng/lat-anchored, so at some camera angles one projects right under
       this icon row; UI chrome must always win over map content. */
    position: absolute; top: 20px; z-index: 45;
    background: rgba(54,54,62,0.85); backdrop-filter: blur(14px); color: #fff;
    border: 1px solid rgba(255,255,255,0.14);
    width: 38px; height: 38px; border-radius: 50%; font-size: 1.1rem; cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  #map-enlarge { left: 20px; }
  #map-enlarge:hover { background: rgba(70,70,80,0.9); }
  #obs-toggle { left: 64px; }
  #obs-toggle.active { background: rgba(92,92,106,0.95); }
  #obs-toggle:hover { background: rgba(70,70,80,0.9); }
  #obs-toggle.active:hover { background: rgba(106,106,122,0.95); }
  #rotate-toggle { left: 108px; }
  #rotate-toggle.active { background: rgba(92,92,106,0.95); }
  #rotate-toggle:hover { background: rgba(70,70,80,0.9); }
  #rotate-toggle.active:hover { background: rgba(106,106,122,0.95); }
  #snow-toggle { left: 152px; }
  #snow-toggle.active { background: rgba(92,92,106,0.95); }
  #snow-toggle:hover { background: rgba(70,70,80,0.9); }
  #snow-toggle.active:hover { background: rgba(106,106,122,0.95); }
  #snow-overlay-toggle { left: 196px; font-size: 0.95rem; }
  #snow-overlay-toggle.active { background: rgba(92,92,106,0.95); }
  #snow-overlay-toggle:hover { background: rgba(70,70,80,0.9); }
  #snow-overlay-toggle.active:hover { background: rgba(106,106,122,0.95); }
  #basemap-toggle { left: 240px; font-size: 0.95rem; }
  #basemap-toggle.active { background: rgba(92,92,106,0.95); }
  #basemap-toggle:hover { background: rgba(70,70,80,0.9); }
  #basemap-toggle.active:hover { background: rgba(106,106,122,0.95); }
  /* Only meaningful (and only shown — see toggleBasemap()) while the dark
     terrain basemap itself is on, so it sits right after that toggle. */
  #contour-toggle { left: 284px; font-size: 0.95rem; display: none; }
  #contour-toggle.active { background: rgba(92,92,106,0.95); }
  #contour-toggle:hover { background: rgba(70,70,80,0.9); }
  #contour-toggle.active:hover { background: rgba(106,106,122,0.95); }
  /* Wind-driven orographic snow overlay — real per-pixel DEM gradient x
     current hour's wind, replacing the flat elevation-only tint while
     active. Only High-Res tab (?highres=1, see isHighResMode below), not
     Snow Test or the regular Map tab. See toggleOrographicSnow(). */
  #orographic-toggle { left: 328px; font-size: 0.95rem; }
  #orographic-toggle.active { background: rgba(92,92,106,0.95); }
  #orographic-toggle:hover { background: rgba(70,70,80,0.9); }
  #orographic-toggle.active:hover { background: rgba(106,106,122,0.95); }

  /* Tuning panel for the snow-overlay trial — hidden until that toggle is
     on (see toggleSnowOverlay()). Sits below the icon row, clear of
     top-controls/model-switch on the right and #snow-info at the bottom. */
  #snow-overlay-controls {
    display: none; flex-direction: column; gap: 10px;
    position: absolute; top: 70px; left: 20px; z-index: 45; width: 200px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(14px);
    border-radius: 14px; padding: 14px 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    color: #fff; font-size: 0.78rem; font-weight: 600;
  }
  #snow-overlay-controls label { display: flex; flex-direction: column; gap: 4px; }
  #snow-overlay-controls input[type="range"] { width: 100%; accent-color: #4d9fff; }
  #snow-overlay-controls span { color: #9fd3ff; font-variant-numeric: tabular-nums; }
  #map-close { right: 64px; display: none; }
  #map-close:hover { background: rgba(70,70,80,0.9); }
  #map-screen.is-fullscreen #map-enlarge { display: none; }
  #map-screen.is-fullscreen #map-close { display: block; }

  /* ── Click-to-probe popup ──────────────────────────────────────────── */
  /* A pill floating near the tap with no visual link to the actual tapped
     point reads as an approximate/vague reading, not a precise one — now a
     pill+stem+dot stack (same .sf-pill/.sf-stem/.sf-dot language the
     Accum-mode snowfall marker already used, generalised below so both
     share it), with the dot landing exactly on the tapped pixel via
     translate(-50%,-100%) anchoring the whole stack's bottom edge there —
     the same "anchor:bottom" trick a real MapLibre Marker does internally
     (this one is plain screen-space CSS, not a geo-anchored Marker, since
     it's positioned directly from the click event's pixel coordinates). */
  .click-popup {
    position: absolute; z-index: 30; transform: translate(-50%, -100%);
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
  }

  /* ── Top mode/period switchers ──────────────────────────────────────── */
  /* Desktop: left edge fixed at calc(50% + 8px) rather than self-centered
     via translateX(-50%) — pairs with the React-layer resort switcher
     (.map-resort-switch .resort-selector in App.css), whose right edge sits
     8px left of center, so the two form one visually-centered group without
     overlapping (both were previously centered independently on the exact
     same point). Fixing the left edge (instead of centering on own width)
     also means #period-switch appearing/disappearing in Accum mode only
     grows this row rightward into blank space — it never shifts mode-switch
     itself, since nothing here depends on the row's total width. Mobile
     overrides this completely below (max-width: 700px). */
  #top-controls {
    /* z-index above .maplibregl-marker (40) — a live station pill (lng/lat-
       anchored) can project right under this row at some camera angles;
       UI chrome must always win over map content, not the other way round. */
    position: absolute; top: 20px; left: calc(50% + 8px); z-index: 45;
    display: flex; gap: 10px;
    /* Safety net for syncTopControlsLayout()'s inline max-width (JS, see
       below) — on a squeeze, pills scroll into view instead of overlapping
       the model switch. Scrollbar hidden since this is a compact pill row,
       not a scroll affordance users are meant to notice. */
    overflow-x: auto; scrollbar-width: none;
  }
  #top-controls::-webkit-scrollbar { display: none; }
  /* height:38px + box-sizing:border-box makes this match the resort switcher,
     settings cog, and model switch exactly (all 38px tall) — see App.css
     .map-resort-switch .resort-button / .map-settings-toggle. pill-btn has
     no vertical padding of its own; it stretches to the group's full height
     (flex default align-items:stretch) and centers its own text/icon.
     Background is a genuine mid-grey (not a darkened black) with a faint
     light border so it still reads clearly against a pure-black dark-mode
     sky, not just against the map imagery. */
  .pill-group {
    display: flex; gap: 4px; height: 38px; box-sizing: border-box;
    background: rgba(54,54,62,0.85); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px; padding: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .pill-btn {
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: rgba(255,255,255,0.65); border: none;
    padding: 0 16px; border-radius: 999px; font-size: 0.78rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .pill-btn:hover { color: #fff; }
  .pill-btn.active { background: rgba(92,92,106,0.95); color: #fff; }
  #period-switch { display: none; }

  /* ── Model switcher (top-right) — single-select, same visual language as
     the Models dropdown on the forecast table/graph page. ─────────────── */
  /* Desktop: right offset leaves room for the React-layer settings cog
     (.map-settings-menu, 38px circle, right-anchored with the same 20px
     edge margin as this row — see App.css), so the two sit side by side on
     the far right instead of overlapping: 20px edge + 38px cog + 10px gap. */
  #model-switch { position: absolute; top: 20px; right: 68px; z-index: 45; }
  /* In fullscreen, #map-close (40px, right:64px) sits under where this
     button would otherwise land — drop it below the icon row instead. */
  #map-screen.is-fullscreen #model-switch { top: 72px; }
  #model-switch-btn {
    display: flex; align-items: center; gap: 8px;
    height: 38px; box-sizing: border-box;
    background: rgba(54,54,62,0.85); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.14); color: #fff; border-radius: 999px;
    padding: 0 16px; font-size: 0.78rem; font-weight: 700;
    cursor: pointer; font-family: inherit; white-space: nowrap;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .model-switch-arrow { font-size: 0.65em; opacity: 0.7; transition: transform 0.15s; }
  #model-switch.open .model-switch-arrow { transform: rotate(180deg); }
  #model-switch-list {
    display: none;
    position: absolute; top: calc(100% + 8px); right: 0;
    background: rgba(20,20,20,0.92); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 4px 0; min-width: 160px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  }
  #model-switch.open #model-switch-list { display: block; }
  .model-option {
    display: flex; align-items: center; gap: 9px; width: 100%;
    background: transparent; border: none; color: rgba(255,255,255,0.75);
    font-size: 0.82rem; font-weight: 600; text-align: left;
    padding: 9px 16px; cursor: pointer; font-family: inherit;
  }
  .model-option:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .model-option.active { background: rgba(255,255,255,0.1); color: #fff; }
  .model-option:disabled { opacity: 0.35; cursor: not-allowed; }
  .model-option:disabled:hover { background: transparent; }
  .model-option-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* ── Freezing-level sparkline (live mode, just above the time slider) ── */
  #fl-overlay {
    position: absolute; left: 20px; right: 20px; bottom: 80px; height: 162px;
    z-index: 9; pointer-events: none; display: none;
  }
  /* In live mode the panel sits just above the time slider. */
  #map-screen.live-mode #snow-info { bottom: 96px; }
  #fl-overlay svg { width: 100%; height: 100%; display: block; }
  #fl-caption {
    position: absolute; top: 0; right: 16px;
    font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.8); text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }

  /* ── Live temperature panel ─────────────────────────────────────────── */
  #info-live { display: none; }
  #info-live h3 { display: flex; align-items: center; gap: 7px; }
  #info-live h3 .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; animation: pw-pulse 1.8s ease-out infinite; }
  .live-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.8rem; padding: 3px 0; }
  .live-row .ln { display: flex; align-items: center; gap: 7px; color: rgba(255,255,255,0.75); }
  .live-row .sw { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(255,255,255,0.25); }
  .live-row .lt { font-weight: 700; font-variant-numeric: tabular-nums; }
  .live-row .le { color: rgba(255,255,255,0.4); font-size: 0.72rem; font-weight: 500; }
  .live-stat { display: flex; justify-content: space-between; font-size: 0.76rem; padding: 2px 0; color: rgba(255,255,255,0.6); }
  .live-stat b { color: #fff; font-weight: 700; font-variant-numeric: tabular-nums; }
  #live-legend .bar { height: 9px; border-radius: 5px; margin: 4px 0 3px; }
  #live-legend .ticks { display: flex; justify-content: space-between; font-size: 0.62rem; color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums; }

  /* ── Accumulated snowfall info + depth legend ───────────────────────── */
  #info-accum { display: none; }
  #accum-total { font-size: 1.7rem; font-weight: 800; margin: 2px 0 12px; }
  .legend-row {
    display: flex; align-items: center; gap: 9px; font-size: 0.78rem;
    padding: 4px 0; color: rgba(255,255,255,0.75);
  }
  .legend-row.active-band { color: #fff; font-weight: 700; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.35); }

  /* MapLibre markers (station-pill, resort-pill, snowfall marker — anything
     added via `new maplibregl.Marker(...).addTo(map)`) are plain DOM
     elements, not WebGL layers, so they normally paint above the map canvas
     regardless of which raster layers (satellite, dark-terrain, contours,
     radar) are active — but that only holds while nothing else out-stacks
     them. Pin it explicitly rather than relying on default/library
     ordering, so live station pills are guaranteed to stay on top of the
     canvas no matter which basemap/overlay combination is showing. */
  .maplibregl-marker { z-index: 40; }

  /* ── Live observation temp pill (map marker) + modal ─────────────────── */
  .station-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px 5px 9px; border-radius: 999px;
    font-size: 0.82rem; font-weight: 700; line-height: 1;
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.55);
    border: 1.5px solid rgba(255,255,255,0.85);
    box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    cursor: pointer; white-space: nowrap; user-select: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .station-pill:hover { transform: scale(1.06); box-shadow: 0 3px 12px rgba(0,0,0,0.55); }
  .station-pill .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.35); flex-shrink: 0;
  }
  .station-pill.stale { opacity: 0.55; }
  /* Real live station pills now also show in radar mode (previously
     display:none !important on ALL .station-pill here, including real
     ones, on the reasoning that radar should be an otherwise-clean read of
     precipitation) — real observations reading on top of the radar colour
     drape is wanted after all. Pseudo pills (interpolated/estimated
     readings at non-station points, .pseudo-pill — see pwUpdateTempProfile)
     are a modelled fill-in, not a real reading, so they keep the original
     radar-clean behaviour; only real ones (pwRenderPill's .station-pill
     without .pseudo-pill) are exempted below. The whole-mountain snow/temp
     colour drape overlay is unrelated to pills entirely and keeps its own
     separate radar-mode-off behaviour untouched (see viewMode === 'radar'
     checks elsewhere). Pills are DOM markers (.maplibregl-marker), not a
     WebGL layer, so they already render above radar-layer/dark-terrain-
     contours-layer/any basemap combination regardless of dark mode — see
     the .maplibregl-marker z-index rule above, which is what actually
     guarantees "on top" here, not this rule. */
  #map-screen.radar-mode .pseudo-pill { display: none !important; }

  /* ── Snowfall pin + black pill (hourly + accumulated maps) ──────────────── */
  .snowfall-marker { display: flex; flex-direction: column; align-items: center; pointer-events: none; transition: opacity 0.5s ease; }
  /* .sf-pill/.sf-stem/.sf-dot: not scoped to .snowfall-marker specifically —
     also used by .click-popup above, so both the persistent/accumulated
     snowfall marker and the tap-to-probe popup share the exact same
     pill+stalk+dot visual language instead of two different look-and-feels
     for "here's the data point this number came from". */
  .sf-pill {
    background: #000; color: #fff; font-weight: 700; font-size: 0.8rem; line-height: 1;
    padding: 5px 10px; border-radius: 999px; white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.55); box-shadow: 0 2px 8px rgba(0,0,0,0.55);
  }
  .sf-stem { width: 2px; height: 12px; background: rgba(0,0,0,0.8); }
  .sf-dot {
    width: 9px; height: 9px; border-radius: 50%; background: #000;
    border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* ── Other-resort navigation pills (shown when zoomed out) ─────────────── */
  /* The pill itself used to sit centred right on the resort's coordinate,
     which meant its own body covered the ski field it was labelling. Now it
     floats above on a thin stem (height = the pill's own rendered width, set
     in JS — see initResortPills) with a dot at the bottom marking the real
     point, so the pill is out of the way but still clearly points at it. */
  .resort-pill-wrap {
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
  }
  .resort-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 13px; border-radius: 999px;
    font-size: 0.82rem; font-weight: 700; line-height: 1;
    background: #000; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.55);
    border: 1.5px solid rgba(255,255,255,0.75);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer; white-space: nowrap; user-select: none;
    pointer-events: auto;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.25s ease;
  }
  .resort-pill:hover { transform: scale(1.07); box-shadow: 0 3px 12px rgba(0,0,0,0.6); }
  .resort-pill-stem {
    width: 2px; margin-top: 2px;
    background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.3));
  }
  .resort-pill-dot {
    width: 7px; height: 7px; margin-top: -1px; border-radius: 50%;
    background: #fff; border: 1.5px solid rgba(0,0,0,0.6);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.25);
  }

  .obs-modal-backdrop {
    position: absolute; inset: 0; z-index: 1200;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .obs-modal {
    width: 380px; max-width: 100%; max-height: 92%; overflow-y: auto;
    background: rgba(10,20,36,0.92); backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
    padding: 20px 22px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .obs-eyebrow {
    display: flex; align-items: center; gap: 6px; margin-bottom: 7px;
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.11em;
    color: #34d399;
  }
  .obs-eyebrow .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #34d399;
    animation: pw-pulse 1.8s ease-out infinite;
  }
  .obs-eyebrow .ago { color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 0.04em; }
  @keyframes pw-pulse {
    0% { box-shadow: 0 0 0 0 rgba(52,211,153,0.55); }
    70% { box-shadow: 0 0 0 6px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }
  .obs-modal h2 { font-size: 1.05rem; font-weight: 800; margin: 0; }
  .obs-modal .sub { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .obs-close {
    position: absolute; top: 14px; right: 16px; width: 30px; height: 30px;
    background: rgba(255,255,255,0.12); color: #fff; border: none; border-radius: 8px;
    font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .obs-close:hover { background: rgba(255,255,255,0.22); }
  .obs-now { display: flex; align-items: center; gap: 14px; margin: 16px 0 4px; }
  .obs-now .big { font-size: 2.4rem; font-weight: 800; line-height: 1; }
  .obs-now .now-wind { font-size: 0.8rem; color: rgba(255,255,255,0.7); line-height: 1.5; }
  .obs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin: 14px 0 4px; }
  .obs-cell { display: flex; flex-direction: column; gap: 2px; }
  .obs-cell .k { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.42); font-weight: 700; }
  .obs-cell .vv { font-size: 0.92rem; font-weight: 600; }
  .obs-graph-title { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); margin: 18px 0 6px; }
  .obs-graph { width: 100%; display: block; }
  .obs-graph-wrap { position: relative; }
  .g-tip {
    position: absolute; transform: translate(-50%, -135%); pointer-events: none;
    background: rgba(0,0,0,0.9); color: #fff; padding: 4px 9px; border-radius: 7px;
    font-size: 0.72rem; white-space: nowrap; box-shadow: 0 3px 12px rgba(0,0,0,0.5);
    display: flex; align-items: baseline; gap: 6px; font-variant-numeric: tabular-nums;
  }
  .g-tip b { font-size: 0.82rem; font-weight: 700; }
  .g-tip .t { color: rgba(255,255,255,0.6); }

  /* Drawer grab-handle + reopen launcher — only shown on mobile (see media
     query below). */
  #drawer-handle { display: none; }
  #drawer-launch { display: none; }

  /* ── Tablet/iPad layout adjustments for small viewport heights ──────── */
  @media (max-height: 800px) {
    /* On iPad or narrow-height viewports, reduce spacing to fit timeline. */
    #snow-info { bottom: 76px; }
    #speed-select { bottom: 76px; }
    #timeline, #live-timeline { bottom: 12px; padding: 8px 14px; }
  }

  /* ── Mobile layout ──────────────────────────────────────────────────── */
  @media (max-width: 700px) {
    /* No zoom buttons, no on-map fullscreen button on mobile. */
    .maplibregl-ctrl-top-right,
    #map-enlarge { display: none !important; }
    .maplibregl-ctrl-bottom-right { opacity: 0.5; transform: scale(0.85); transform-origin: bottom right; }

    /* Mode toggle (LIVE/HOURLY/ACCUMULATED) pinned to the TOP-RIGHT, on the
       same row as the location switcher (which floats top-left from the React
       layer). Reserve ~152px on the left for that switcher, and ~46px on the
       right for the React-layer settings cog (.map-settings-menu, also on
       this row — 38px button + 12px margin, see App.css), so neither ever
       collides. In accumulated mode the extra 5/10/15 period group wraps to a
       second right-aligned row rather than growing left into the switcher. */
    #top-controls {
      top: 14px;
      left: auto;
      right: 58px;
      transform: none;
      width: max-content;
      max-width: calc(100vw - 198px);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    /* Height matched to the React-layer location switcher (.map-resort-switch
       .resort-button, 38px) so the two sit on the same horizontal line. */
    /* gap/padding trimmed (from 4px/7px 12px, then again from 9px/2px once
       the settings cog started sharing this row's remaining width — see
       #top-controls above) so Live/Hourly/Accum/Radar all fit on one line
       without needing the overflow-x scroll below — kept as a safety net
       for any narrower device rather than the primary fix. */
    .pill-group { overflow-x: auto; min-height: 38px; align-items: center; gap: 1px; padding: 3px; }
    .pill-btn { padding: 6px 6px; font-size: 0.7rem; }

    /* Map toggle buttons (live-obs, auto-rotate) tuck just under the top control
       row (top row sits at 14px and is ~38px tall, ending ~52px). */
    #obs-toggle { top: 60px; left: 14px; }
    #rotate-toggle { top: 60px; left: 60px; }
    #snow-toggle { top: 60px; left: 106px; }
    #snow-overlay-toggle { top: 60px; left: 152px; }
    #basemap-toggle { top: 60px; left: 198px; }
    #contour-toggle { top: 60px; left: 244px; }
    #snow-overlay-controls { top: 106px; left: 12px; right: 12px; width: auto; }
    #map-close { top: 14px; right: 14px; }

    /* Playback speed: compact, top-right, on the same second row. */
    #speed-select { top: 60px; bottom: auto; right: 12px; padding: 4px; }
    .speed-btn { padding: 6px 8px; font-size: 0.66rem; }

    /* Model switcher: its own third row, top-right (row 1 = resort switch +
       mode pills, row 2 = obs/rotate toggles + playback speed). */
    #model-switch { top: 106px; right: 12px; }
    #map-screen.is-fullscreen #model-switch { top: 106px; }
    #model-switch-btn { padding: 8px 12px; font-size: 0.72rem; }

    /* Freezing-level sparkline: overlay it across the bottom of the map, but only
       while the drawer is hidden (it would fight the open drawer otherwise).
       Lifted clear of the launcher button + timeslider. JS sets its inline display
       per mode/data; we only force-hide it when the drawer is open (that
       !important beats the inline display:block). */
    #fl-overlay { left: 12px; right: 12px; bottom: 112px; height: 96px; }
    #snow-info:not(.drawer-min) ~ #fl-overlay { display: none !important; }

    /* Launcher to reopen the drawer once it's hidden: bottom-left, above the
       timeslider. Only shown while the drawer is hidden (.drawer-min). */
    #drawer-launch {
      position: absolute; left: 12px; bottom: 60px; z-index: 12;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.55); color: #fff; border: 1px solid rgba(255,255,255,0.3);
      display: none; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }
    #snow-info.drawer-min ~ #drawer-launch { display: flex; }

    /* Timeline pinned to the very bottom, painted above the drawer's
       background layer (which extends down behind it — see below). */
    #timeline, #live-timeline, #radar-timeline {
      left: 12px; right: 12px; bottom: 14px;
      gap: 8px; padding: 8px 12px;
      z-index: 11;
    }
    #tl-label, #ltl-label, #rtl-label { min-width: 0; font-size: 0.7rem; }

    /* ── Bottom-sheet drawer ──────────────────────────────────────────── */
    /* The drawer's own box now runs all the way to the true bottom of the
       screen (bottom:0) rather than stopping at bottom:80px above the
       timeslider — that previously cut the drawer's background off short,
       leaving a gap of whatever's behind it (the map) showing through
       instead of the drawer continuing down behind the timeline. The
       timeline (z-index 11, above the drawer's z-index 10) still paints on
       top of it, so visually the timeline is unchanged — only the drawer's
       background now actually reaches the bottom edge. Bottom padding grows
       by that same 80px so the drawer's real content still clears the
       timeline; the drawer's rendered top edge (and thus everything above
       it — content, buttons, map) ends up exactly where it was before. */
    #snow-info {
      left: 0; right: 0; bottom: 0;
      min-width: 0; width: 100%;
      border-radius: 18px 18px 0 0;
      padding: 0 20px 96px;
      touch-action: none;
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    /* Same lift in live mode (overrides the desktop live-mode bottom:96px). */
    #map-screen.live-mode #snow-info { bottom: 0; }

    #drawer-handle {
      display: flex; align-items: center; justify-content: center;
      height: 20px; margin: 8px -20px 2px; cursor: grab;
    }
    #drawer-handle .grip {
      width: 38px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.35);
    }

    #drawer-scroll {
      max-height: 45vh; overflow-y: auto;
      transition: max-height 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    /* Minimised: slide the whole panel fully off the bottom of the screen (no
       peeking bar) so it never covers the freezing-level graph. Reopen via the
       #drawer-launch button. */
    #snow-info.drawer-min {
      /* The box is now 80px taller than before (see the padding-bottom change
         above) and sits 80px further down (bottom:0 vs bottom:80px), so its
         own full height (100%) already covers what the old fixed +96px
         offset used to also account for — this now only needs a small fixed
         buffer on top, same final hidden position as before. */
      transform: translateY(calc(100% + 16px));
      pointer-events: none;
    }
    #snow-info.drawer-min #drawer-scroll { overflow: hidden; }

    /* Accumulated mode has no bottom timeline, so the tall background-extending
       padding is just empty grey when minimised. Trim it so the drawer hugs the
       summary and sits low against the screen edge. */
    #map-screen.accum-mode #snow-info.drawer-min { padding-bottom: 14px; }

    /* Minimised-drawer summary: fills the blank grey space with the headline
       figures so the collapsed drawer still carries useful info. Only visible
       while minimised, and only when populated (empty in modes that don't set
       it). */
    #drawer-min-summary { display: none; }
    #snow-info.drawer-min #drawer-min-summary {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 8px 2px 4px;
    }
    #drawer-min-summary:empty { display: none !important; }
    #drawer-min-summary .dms-main { display: flex; flex-direction: column; gap: 1px; }
    #drawer-min-summary .dms-eyebrow {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.45);
    }
    #drawer-min-summary .dms-total { font-size: 1.55rem; font-weight: 800; line-height: 1.05; }
    #drawer-min-summary .dms-side { text-align: right; }
    #drawer-min-summary .dms-side .l {
      display: block; font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.45);
    }
    #drawer-min-summary .dms-side .v {
      font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums;
    }
  }

</style>
</head>
<body>

<div id="map-screen">
  <div id="map"></div>
  <button id="map-enlarge" onclick="enterFullscreenView()" title="Fullscreen">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  </button>
  <button id="obs-toggle" class="active" onclick="toggleObsLayer()" title="Toggle live observations">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
  </button>
  <button id="rotate-toggle" onclick="toggleAutoRotate()" title="Toggle auto-rotate">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
  </button>
  <!-- Trial: real 3D snow particles (custom WebGL layer, occludes correctly
       behind terrain) — off by default, see toggleSnowParticles(). -->
  <button id="snow-toggle" onclick="toggleSnowParticles()" title="Toggle 3D snow particles (trial)">❄</button>
  <!-- Trial: slope-aware snow overlay — whitens flat ground above a given
       elevation, leaves steep/cliff faces showing bare satellite imagery.
       Off by default, see toggleSnowOverlay(). -->
  <button id="snow-overlay-toggle" onclick="toggleSnowOverlay()" title="Toggle slope-aware snow overlay (trial)">🏔️</button>
  <!-- Tuning panel for the slope-aware snow overlay above — only shown while
       that overlay is on (see toggleSnowOverlay()/initSnowOverlayControls()). -->
  <div id="snow-overlay-controls">
    <label>Min elevation <span id="soc-elev-val"></span>m
      <input type="range" id="soc-elev" oninput="onSnowOverlayElevInput(this.value)">
    </label>
    <label>Patchy snowline <span id="soc-patch-val"></span>m
      <input type="range" id="soc-patch" min="0" max="400" step="10" oninput="onSnowOverlayPatchInput(this.value)">
    </label>
    <label>Max slope <span id="soc-slope-val"></span>°
      <input type="range" id="soc-slope" min="5" max="89" step="1" oninput="onSnowOverlaySlopeInput(this.value)">
    </label>
    <label>Fade width <span id="soc-fade-val"></span>°
      <input type="range" id="soc-fade" min="1" max="20" step="1" oninput="onSnowOverlayFadeInput(this.value)">
    </label>
    <label>Opacity <span id="soc-opacity-val"></span>
      <input type="range" id="soc-opacity" min="0" max="100" step="5" oninput="onSnowOverlayOpacityInput(this.value)">
    </label>
  </div>
  <!-- Trial: dark "sci-fi" elevation basemap with 100m contours, swapping out
       the satellite imagery — off by default, see toggleBasemap(). -->
  <button id="basemap-toggle" onclick="toggleBasemap()" title="Toggle dark terrain basemap (trial)">🌑</button>
  <!-- Only shown while the dark terrain basemap is on (see toggleBasemap()) —
       lets contour lines be switched off to leave a plain elevation-shaded
       relief map. See toggleContours(). -->
  <button id="contour-toggle" class="active" onclick="toggleContours()" title="Toggle contour lines">〰️</button>
  <!-- Wind-driven orographic snow overlay — redistributes the hourly
       forecast's snowfall spatially using real wind direction/speed x
       terrain gradient (w = U.grad(h)) sampled per-pixel from the real DEM,
       instead of the flat elevation-only tint. Only shown on the dedicated
       High-Res tab (?highres=1) — see isHighResMode. Off by default, see
       toggleOrographicSnow(). -->
  <button id="orographic-toggle" onclick="toggleOrographicSnow()" title="Toggle wind-driven snow overlay">🌬️</button>
  <button id="map-close" onclick="exitFullscreenView()" title="Close fullscreen">✕</button>
  <div id="map-title"></div>

  <div id="top-controls">
    <div class="pill-group" id="mode-switch">
      <button class="pill-btn" data-mode="live" onclick="setViewMode('live')">Live</button>
      <button class="pill-btn active" data-mode="hourly" onclick="setViewMode('hourly')">Hourly</button>
      <button class="pill-btn" data-mode="accumulated" onclick="setViewMode('accumulated')">Accum</button>
      <button class="pill-btn" data-mode="radar" onclick="setViewMode('radar')">Radar</button>
    </div>
    <div class="pill-group" id="period-switch">
      <button class="pill-btn active" data-days="5" onclick="setPeriod(5)">5</button>
      <button class="pill-btn" data-days="10" onclick="setPeriod(10)">10</button>
      <button class="pill-btn" data-days="15" onclick="setPeriod(15)">15</button>
    </div>
  </div>

  <div id="model-switch">
    <button id="model-switch-btn" onclick="toggleModelMenu()">
      <span id="model-switch-label">Average</span>
      <span class="model-switch-arrow">▼</span>
    </button>
    <div id="model-switch-list"></div>
  </div>

  <div id="snow-info">
    <div id="drawer-handle"><span class="grip"></span></div>
    <!-- Compact summary shown in the otherwise-blank grey space when the drawer
         is minimised. Populated per-mode (currently accumulated); empty in
         other modes so the :empty CSS rule keeps it hidden. -->
    <div id="drawer-min-summary"></div>
    <div id="drawer-scroll">
    <div id="info-hourly">
      <h3>Selected Forecast Hour</h3>
      <div class="si-row"><span class="l">Time</span><span class="v" id="si-time">—</span></div>
      <div class="si-row"><span class="l">Summit Temp</span><span class="v" id="si-temp">—</span></div>
      <div class="si-row"><span class="l">Freezing Level</span><span class="v" id="si-fl">—</span></div>
      <div class="si-row"><span class="l">Snow Line</span><span class="v" id="si-sl">—</span></div>
      <div class="si-row"><span class="l">Snowfall (1h)</span><span class="v" id="si-snow">—</span></div>
      <div class="si-row"><span class="l">Wind</span><span class="v" id="si-wind">—</span></div>
    </div>
    <div id="info-accum">
      <h3 id="accum-period-label">Next 5 Days</h3>
      <div id="accum-total">—</div>
      <div class="si-row"><span class="l">Approx. Snow Line</span><span class="v" id="accum-snowline">—</span></div>
      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 12px 0 10px;">
      <div id="depth-legend"></div>
    </div>
    <div id="info-live">
      <h3><span class="live-dot"></span>Live Temperature</h3>
      <div id="live-rows"></div>
      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 12px 0 10px;">
      <div id="live-legend"></div>
    </div>
    </div>
  </div>
  <div id="fl-overlay"><span id="fl-caption"></span><svg></svg></div>
  <button id="drawer-launch" title="Show details" aria-label="Show details">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"></polyline></svg>
  </button>
  <div id="timeline">
    <button id="tl-play" onclick="togglePlay()">▶</button>
    <button class="tl-step" id="tl-prev" onclick="stepHour(-1)">‹</button>
    <input type="range" id="tl-slider" min="0" max="0" step="1" value="0">
    <button class="tl-step" id="tl-next" onclick="stepHour(1)">›</button>
    <span id="tl-label">—</span>
  </div>
  <div id="live-timeline">
    <button id="ltl-play" onclick="pwTogglePlay()">▶</button>
    <button class="tl-step" id="ltl-prev" onclick="pwStepLive(-1)">‹</button>
    <input type="range" id="ltl-slider" min="0" max="0" step="1" value="0">
    <button class="tl-step" id="ltl-next" onclick="pwStepLive(1)">›</button>
    <span id="ltl-label">—</span>
  </div>
  <div id="radar-timeline">
    <button id="rtl-play" onclick="radarTogglePlay()">▶</button>
    <button class="tl-step" id="rtl-prev" onclick="radarStepFrame(-1)">‹</button>
    <input type="range" id="rtl-slider" min="0" max="0" step="1" value="0">
    <button class="tl-step" id="rtl-next" onclick="radarStepFrame(1)">›</button>
    <span id="rtl-label">—</span>
  </div>
  <div id="speed-select">
    <button class="speed-btn" data-speed="1" onclick="setSpeed(1)">1×</button>
    <button class="speed-btn active" data-speed="3" onclick="setSpeed(3)">3×</button>
    <button class="speed-btn" data-speed="5" onclick="setSpeed(5)">5×</button>
  </div>
</div>

<script>
// Keep --app-vh (used by #map-screen's height, see the CSS comment above it)
// synced to the real rendered root-element height via ResizeObserver, rather
// than trusting position:fixed/100vh to track the iframe's own viewport —
// same reasoning as the map container's own ResizeObserver-driven resize
// below, just one level up.
(function () {
  const setAppVh = (h) => document.documentElement.style.setProperty('--app-vh', h + 'px')
  setAppVh(window.innerHeight)
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver((entries) => setAppVh(entries[0]?.contentRect?.height || window.innerHeight))
      .observe(document.documentElement)
  } else {

// (see setDarkMode() near the dark-terrain trial code below) — top-

// Depth fog for dark mode — the dense 20m contours turn the far distance
// into visual noise (every band crossing is an equally bright line all the
// way to the horizon, no depth cue at all), so fade terrain/contours
// toward black with distance from camera. IMPORTANT: unlike Mapbox GL JS,
// MapLibre has no separate Map#setFog() — a first attempt calling that
// (Mapbox's API shape: {range, color, 'horizon-blend', 'high-color',
// 'space-color', 'star-intensity'}) silently did nothing, because that
// method/shape doesn't exist here at all. MapLibre folds fog into the same
// Sky spec used for sky-color/horizon-color instead: fog-color (requires
// 3D terrain — this map has terrain: {source:'terrain'} in its style, so
// that's satisfied) and fog-ground-blend (0 = map centre, 1 = horizon) are
// the two properties that actually exist, both in the range [0,1]
// (default 0.5) — maxed out at the top of that range (1) for the
// strongest fade the API allows, after 0.92/0.9 was confirmed working
// live but still asked for more. fog-color pure black to match.
