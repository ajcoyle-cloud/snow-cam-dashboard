<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whakapapa — Snowfall Elevation Forecast</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.min.css" />
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #0f1c30 0%, #14253e 100%);
    min-height: 100vh;
    color: #fff;
  }

  /* ── Dark, fully-rounded zoom/compass control pill ──────────────────── */
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group {
    background: rgba(20,20,20,0.78);
    backdrop-filter: blur(14px);
    border: none;
    border-radius: 9999px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group button {
    background-color: transparent;
    width: 32px; height: 32px;
  }
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group button + button {
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .maplibregl-ctrl-top-right .maplibregl-ctrl-group button:hover {
    background-color: rgba(255,255,255,0.15);
  }
  /* Default control icons are dark SVGs meant for a light pill; invert
     them to white so they read clearly on the new dark background. */
  .maplibregl-ctrl-top-right .maplibregl-ctrl-icon {
    filter: invert(1) brightness(1.6);
  }

  /* ── Fullscreen map ────────────────────────────────────────────────── */
  #map-screen { position: fixed; inset: 0; z-index: 500; }
  #map { width: 100%; height: 100%; }

  /* ── Timeline scrubber (play/pause + draggable slider) ─────────────────── */
  #timeline, #live-timeline {
    position: absolute; left: 20px; right: 20px; bottom: 20px; z-index: 10;
    display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(14px);
    border-radius: 30px; padding: 10px 18px;
    box-shadow: 0 6px 26px rgba(0,0,0,0.35);
  }
  #live-timeline { display: none; }
  #tl-play, #ltl-play {
    flex-shrink: 0; background: rgba(255,255,255,0.14); color: #fff; border: none;
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #tl-play:hover, #ltl-play:hover { background: rgba(255,255,255,0.26); }
  #tl-slider, #ltl-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: rgba(255,255,255,0.25);
    cursor: pointer; outline: none;
  }
  #tl-slider::-webkit-slider-thumb, #ltl-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer;
    border: 3px solid #333;
  }
  #tl-slider::-moz-range-thumb, #ltl-slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer; border: 3px solid #333;
  }
  .tl-step {
    flex-shrink: 0; background: transparent; color: rgba(255,255,255,0.85); border: none;
    font-size: 1.2rem; cursor: pointer; width: 26px; height: 38px;
    display: flex; align-items: center; justify-content: center;
  }
  .tl-step:hover:not(:disabled) { color: #fff; }
  .tl-step:disabled { opacity: 0.3; cursor: default; }
  #tl-label, #ltl-label {
    flex-shrink: 0; color: #fff; font-size: 0.78rem; font-weight: 600;
    min-width: 118px; text-align: right; font-variant-numeric: tabular-nums;
  }

  #snow-info {
    position: absolute; bottom: 92px; left: 20px; z-index: 10;
    background: rgba(10,20,36,0.78); backdrop-filter: blur(14px);
    border-radius: 14px; padding: 16px 20px; min-width: 220px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  #snow-info h3 { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); margin-bottom: 10px; }
  .si-row { display: flex; justify-content: space-between; gap: 14px; font-size: 0.84rem; padding: 4px 0; }
  .si-row .l { color: rgba(255,255,255,0.55); }
  .si-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }

  #speed-select {
    position: absolute; bottom: 92px; right: 20px; z-index: 10;
    display: flex; gap: 4px;
    background: rgba(10,20,36,0.78); backdrop-filter: blur(14px);
    border-radius: 999px; padding: 5px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .speed-btn {
    background: transparent; color: rgba(255,255,255,0.6); border: none;
    padding: 7px 11px; border-radius: 999px; font-size: 0.72rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .speed-btn:hover { color: #fff; }
  .speed-btn.active { background: #333; color: #fff; }

  #map-enlarge, #map-close, #obs-toggle, #rotate-toggle {
    position: absolute; top: 20px; z-index: 20;
    background: rgba(255,255,255,0.12); color: #fff; border: none;
    width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem; cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  #map-enlarge { left: 20px; }
  #obs-toggle { left: 64px; }
  #obs-toggle.active { background: #333; }
  #obs-toggle:hover { background: rgba(255,255,255,0.25); }
  #obs-toggle.active:hover { background: #404040; }
  #rotate-toggle { left: 108px; }
  #rotate-toggle.active { background: #333; }
  #rotate-toggle:hover { background: rgba(255,255,255,0.25); }
  #rotate-toggle.active:hover { background: #404040; }
  #map-close { right: 64px; display: none; }
  #map-enlarge:hover, #map-close:hover { background: rgba(255,255,255,0.25); }
  #map-screen.is-fullscreen #map-enlarge { display: none; }
  #map-screen.is-fullscreen #map-close { display: block; }

  /* ── Click-to-probe popup ──────────────────────────────────────────── */
  .click-popup {
    position: absolute; z-index: 30; transform: translate(-50%, -130%);
    background: rgba(0,0,0,0.88); color: #fff;
    padding: 8px 16px; border-radius: 999px;
    font-size: 0.8rem; font-weight: 600; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    pointer-events: none;
  }

  /* ── Top mode/period switchers ──────────────────────────────────────── */
  #top-controls {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 15;
    display: flex; gap: 10px;
  }
  .pill-group {
    display: flex; gap: 4px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(14px);
    border-radius: 999px; padding: 5px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .pill-btn {
    background: transparent; color: rgba(255,255,255,0.65); border: none;
    padding: 8px 16px; border-radius: 999px; font-size: 0.78rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .pill-btn:hover { color: #fff; }
  .pill-btn.active { background: #333; color: #fff; }
  #period-switch { display: none; }

  /* ── Freezing-level sparkline (live mode, just above the time slider) ── */
  #fl-overlay {
    position: absolute; left: 20px; right: 20px; bottom: 80px; height: 162px;
    z-index: 9; pointer-events: none; display: none;
  }
  /* In live mode the panel sits just above the time slider. */
  #map-screen.live-mode #snow-info { bottom: 96px; }
  #fl-overlay svg { width: 100%; height: 100%; display: block; }
  #fl-caption {
    position: absolute; top: 0; right: 16px;
    font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.8); text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }

  /* ── Live temperature panel ─────────────────────────────────────────── */
  #info-live { display: none; }
  #info-live h3 { display: flex; align-items: center; gap: 7px; }
  #info-live h3 .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; animation: pw-pulse 1.8s ease-out infinite; }
  .live-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.8rem; padding: 3px 0; }
  .live-row .ln { display: flex; align-items: center; gap: 7px; color: rgba(255,255,255,0.75); }
  .live-row .sw { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(255,255,255,0.25); }
  .live-row .lt { font-weight: 700; font-variant-numeric: tabular-nums; }
  .live-row .le { color: rgba(255,255,255,0.4); font-size: 0.72rem; font-weight: 500; }
  .live-stat { display: flex; justify-content: space-between; font-size: 0.76rem; padding: 2px 0; color: rgba(255,255,255,0.6); }
  .live-stat b { color: #fff; font-weight: 700; font-variant-numeric: tabular-nums; }
  #live-legend .bar { height: 9px; border-radius: 5px; margin: 4px 0 3px; }
  #live-legend .ticks { display: flex; justify-content: space-between; font-size: 0.62rem; color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums; }

  /* ── Accumulated snowfall info + depth legend ───────────────────────── */
  #info-accum { display: none; }
  #accum-total { font-size: 1.7rem; font-weight: 800; margin: 2px 0 12px; }
  .legend-row {
    display: flex; align-items: center; gap: 9px; font-size: 0.78rem;
    padding: 4px 0; color: rgba(255,255,255,0.75);
  }
  .legend-row.active-band { color: #fff; font-weight: 700; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.35); }

  /* ── Live observation temp pill (map marker) + modal ─────────────────── */
  .station-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px 5px 9px; border-radius: 999px;
    font-size: 0.82rem; font-weight: 700; line-height: 1;
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.55);
    border: 1.5px solid rgba(255,255,255,0.85);
    box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    cursor: pointer; white-space: nowrap; user-select: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .station-pill:hover { transform: scale(1.06); box-shadow: 0 3px 12px rgba(0,0,0,0.55); }
  .station-pill .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.35); flex-shrink: 0;
  }
  .station-pill.stale { opacity: 0.55; }

  /* ── Snow colour-scheme trial picker (hourly map only) ──────────────────── */
  #scheme-switch { display: none; }
  #map-screen.hourly-mode #scheme-switch {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 12;
  }
  .scheme-btn {
    width: 34px; height: 34px; border-radius: 50%; padding: 0; cursor: pointer;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.45); transition: border-color 0.15s, box-shadow 0.15s;
  }
  .scheme-btn .sw { width: 18px; height: 18px; border-radius: 50%; display: block; }
  .scheme-btn.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.45); }

  /* ── Snowfall pin + black pill (hourly map, while snow is falling) ───────── */
  .snowfall-marker { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
  .snowfall-marker .sf-pill {
    background: #000; color: #fff; font-weight: 700; font-size: 0.8rem; line-height: 1;
    padding: 5px 10px; border-radius: 999px; white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.55); box-shadow: 0 2px 8px rgba(0,0,0,0.55);
  }
  .snowfall-marker .sf-stem { width: 2px; height: 12px; background: rgba(0,0,0,0.8); }
  .snowfall-marker .sf-dot {
    width: 9px; height: 9px; border-radius: 50%; background: #000;
    border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .obs-modal-backdrop {
    position: absolute; inset: 0; z-index: 1200;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .obs-modal {
    width: 380px; max-width: 100%; max-height: 92%; overflow-y: auto;
    background: rgba(10,20,36,0.92); backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
    padding: 20px 22px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .obs-eyebrow {
    display: flex; align-items: center; gap: 6px; margin-bottom: 7px;
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.11em;
    color: #34d399;
  }
  .obs-eyebrow .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #34d399;
    animation: pw-pulse 1.8s ease-out infinite;
  }
  .obs-eyebrow .ago { color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 0.04em; }
  @keyframes pw-pulse {
    0% { box-shadow: 0 0 0 0 rgba(52,211,153,0.55); }
    70% { box-shadow: 0 0 0 6px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }
  .obs-modal h2 { font-size: 1.05rem; font-weight: 800; margin: 0; }
  .obs-modal .sub { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .obs-close {
    position: absolute; top: 14px; right: 16px; width: 30px; height: 30px;
    background: rgba(255,255,255,0.12); color: #fff; border: none; border-radius: 8px;
    font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .obs-close:hover { background: rgba(255,255,255,0.22); }
  .obs-now { display: flex; align-items: center; gap: 14px; margin: 16px 0 4px; }
  .obs-now .big { font-size: 2.4rem; font-weight: 800; line-height: 1; }
  .obs-now .now-wind { font-size: 0.8rem; color: rgba(255,255,255,0.7); line-height: 1.5; }
  .obs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin: 14px 0 4px; }
  .obs-cell { display: flex; flex-direction: column; gap: 2px; }
  .obs-cell .k { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.42); font-weight: 700; }
  .obs-cell .vv { font-size: 0.92rem; font-weight: 600; }
  .obs-graph-title { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); margin: 18px 0 6px; }
  .obs-graph { width: 100%; display: block; }
  .obs-graph-wrap { position: relative; }
  .g-tip {
    position: absolute; transform: translate(-50%, -135%); pointer-events: none;
    background: rgba(0,0,0,0.9); color: #fff; padding: 4px 9px; border-radius: 7px;
    font-size: 0.72rem; white-space: nowrap; box-shadow: 0 3px 12px rgba(0,0,0,0.5);
    display: flex; align-items: baseline; gap: 6px; font-variant-numeric: tabular-nums;
  }
  .g-tip b { font-size: 0.82rem; font-weight: 700; }
  .g-tip .t { color: rgba(255,255,255,0.6); }

  /* Drawer grab-handle + reopen launcher — only shown on mobile (see media
     query below). */
  #drawer-handle { display: none; }
  #drawer-launch { display: none; }

  /* ── Tablet/iPad layout adjustments for small viewport heights ──────── */
  @media (max-height: 800px) {
    /* On iPad or narrow-height viewports, reduce spacing to fit timeline. */
    #snow-info { bottom: 76px; }
    #speed-select { bottom: 76px; }
    #timeline, #live-timeline { bottom: 12px; padding: 8px 14px; }
  }

  /* ── Mobile layout ──────────────────────────────────────────────────── */
  @media (max-width: 700px) {
    /* No zoom buttons, no on-map fullscreen button on mobile. */
    .maplibregl-ctrl-top-right,
    #map-enlarge { display: none !important; }
    .maplibregl-ctrl-bottom-right { opacity: 0.5; transform: scale(0.85); transform-origin: bottom right; }

    /* Mode toggle (LIVE/HOURLY/ACCUMULATED) pinned to the TOP-RIGHT, on the
       same row as the location switcher (which floats top-left from the React
       layer). Reserve ~152px on the left for that switcher so the two never
       collide. In accumulated mode the extra 5/10/15 period group wraps to a
       second right-aligned row rather than growing left into the switcher. */
    #top-controls {
      top: 14px;
      left: auto;
      right: 12px;
      transform: none;
      width: max-content;
      max-width: calc(100vw - 152px);
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    /* Height matched to the React-layer location switcher (.map-resort-switch
       .resort-button, 38px) so the two sit on the same horizontal line. */
    .pill-group { overflow-x: auto; min-height: 38px; align-items: center; }
    .pill-btn { padding: 7px 12px; font-size: 0.72rem; }

    /* Map toggle buttons (live-obs, auto-rotate) tuck under the control rows
       on the left so nothing collides up top. */
    #obs-toggle { top: 112px; left: 14px; }
    #rotate-toggle { top: 112px; left: 60px; }
    #map-close { top: 14px; right: 14px; }

    /* Playback speed: compact, top-right (out of the drawer's way). */
    #speed-select { top: 112px; bottom: auto; right: 12px; padding: 4px; }
    .speed-btn { padding: 6px 8px; font-size: 0.66rem; }

    /* Freezing-level sparkline: overlay it across the bottom of the map, but only
       while the drawer is hidden (it would fight the open drawer otherwise).
       Lifted clear of the launcher button + timeslider. JS sets its inline display
       per mode/data; we only force-hide it when the drawer is open (that
       !important beats the inline display:block). */
    #fl-overlay { left: 12px; right: 12px; bottom: 112px; height: 96px; }
    #snow-info:not(.drawer-min) ~ #fl-overlay { display: none !important; }

    /* Launcher to reopen the drawer once it's hidden: bottom-left, above the
       timeslider. Only shown while the drawer is hidden (.drawer-min). */
    #drawer-launch {
      position: absolute; left: 12px; bottom: 60px; z-index: 12;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.55); color: #fff; border: 1px solid rgba(255,255,255,0.3);
      display: none; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }
    #snow-info.drawer-min ~ #drawer-launch { display: flex; }

    /* Timeline pinned to the very bottom, painted above the drawer's
       background layer (which extends down behind it — see below). */
    #timeline, #live-timeline {
      left: 12px; right: 12px; bottom: 14px;
      gap: 8px; padding: 8px 12px;
      z-index: 11;
    }
    #tl-label, #ltl-label { min-width: 0; font-size: 0.7rem; }

    /* ── Bottom-sheet drawer ──────────────────────────────────────────── */
    /* The outer panel always sits flush with the bottom of the screen and
       carries a tall bottom padding, so its background extends behind the
       timeline down to the screen edge in BOTH expanded and minimised
       states — only #drawer-scroll's height changes between the two,
       which only affects how far up the visible content reaches. */
    #snow-info {
      left: 0; right: 0; bottom: 0;
      min-width: 0; width: 100%;
      border-radius: 18px 18px 0 0;
      padding: 0 20px calc(18px + 84px);
      touch-action: none;
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    /* Override the desktop live-mode lift (line ~173 sets bottom:96px with
       2-ID+class specificity). Without this, the drawer floats 96px off the
       screen edge in live mode — leaving a map-gap below it and turning the
       background-extending padding into visible blank space. Anchor it flush
       to the bottom so the background reaches the screen edge and the timeline
       paints on top of it. */
    #map-screen.live-mode #snow-info { bottom: 0; }

    #drawer-handle {
      display: flex; align-items: center; justify-content: center;
      height: 20px; margin: 8px -20px 2px; cursor: grab;
    }
    #drawer-handle .grip {
      width: 38px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.35);
    }

    #drawer-scroll {
      max-height: 45vh; overflow-y: auto;
      transition: max-height 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    /* Minimised: slide the whole panel fully off the bottom of the screen (no
       peeking bar) so it never covers the freezing-level graph. Reopen via the
       #drawer-launch button. */
    #snow-info.drawer-min {
      transform: translateY(100%);
      pointer-events: none;
    }
    #snow-info.drawer-min #drawer-scroll { overflow: hidden; }

    /* Accumulated mode has no bottom timeline, so the tall background-extending
       padding is just empty grey when minimised. Trim it so the drawer hugs the
       summary and sits low against the screen edge. */
    #map-screen.accum-mode #snow-info.drawer-min { padding-bottom: 14px; }

    /* Minimised-drawer summary: fills the blank grey space with the headline
       figures so the collapsed drawer still carries useful info. Only visible
       while minimised, and only when populated (empty in modes that don't set
       it). */
    #drawer-min-summary { display: none; }
    #snow-info.drawer-min #drawer-min-summary {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 8px 2px 4px;
    }
    #drawer-min-summary:empty { display: none !important; }
    #drawer-min-summary .dms-main { display: flex; flex-direction: column; gap: 1px; }
    #drawer-min-summary .dms-eyebrow {

let forecastHours = [];

// ── Fetch hourly forecast from Open-Meteo, GFS + ECMWF averaged ─────────────
// GFS exposes a direct freezing-level field; ECMWF doesn't (Open-Meteo always
// returns null for it), so ECMWF's freezing level is derived the same way the
// main dashboard does it — linear interpolation between a summit and base
// temperature sample. Snowfall and freezing level are then averaged across
// both models so the map isn't fully exposed to one model's individual bias
// or glitches.
async function loadForecast() {
  try {
    const base = `https://api.open-meteo.com/v1/forecast?latitude=${LOC.lat}&longitude=${LOC.lon}&temperature_unit=celsius&timezone=${LOC.timezone}&forecast_days=16`;
    const gfsSummitUrl = `${base}&wind_speed_unit=kmh&elevation=${LOC.summitElev}&hourly=temperature_2m,precipitation,snowfall,freezinglevel_height,windspeed_700hPa,winddirection_700hPa&models=gfs_global`;
    const ecmwfSummitUrl = `${base}&elevation=${LOC.summitElev}&hourly=temperature_2m,snowfall&models=ecmwf_ifs025`;
    const ecmwfBaseUrl = `${base}&elevation=${LOC.baseElev}&hourly=temperature_2m&models=ecmwf_ifs025`;

    const [gfsRes, ecmwfSummitRes, ecmwfBaseRes] = await Promise.all([
      fetch(gfsSummitUrl), fetch(ecmwfSummitUrl), fetch(ecmwfBaseUrl)
    ]);
    if (!gfsRes.ok) throw new Error(`Open-Meteo responded ${gfsRes.status}`);
    const gfs = (await gfsRes.json()).hourly;
    const ecmwfSummit = ecmwfSummitRes.ok ? (await ecmwfSummitRes.json()).hourly : null;
    const ecmwfBase = ecmwfBaseRes.ok ? (await ecmwfBaseRes.json()).hourly : null;

    // GFS occasionally spits out a spurious single-hour precip/snow spike at a
    // given grid cell (a model artifact, especially near steep terrain). Cap
    // any one hour's snowfall so a single glitchy reading can't blow out the
    // multi-day accumulated total.
    const MAX_HOURLY_SNOWFALL_MM = 60; // ~6cm/hr, generous even for a true storm pulse

    forecastHours = gfs.time.map((t, i) => {
      const gfsFL = gfs.freezinglevel_height[i];
      const gfsSnowMm = Math.min((gfs.snowfall[i] || 0) * 10, MAX_HOURLY_SNOWFALL_MM);
      const gfsTemp = gfs.temperature_2m[i];

      let ecmwfFL = null;
      if (ecmwfSummit && ecmwfBase) {
        const summitT = ecmwfSummit.temperature_2m[i];
        const baseT = ecmwfBase.temperature_2m[i];
        if (summitT != null && baseT != null && summitT !== baseT) {
          ecmwfFL = LOC.baseElev + (baseT * (LOC.summitElev - LOC.baseElev)) / (baseT - summitT);
        }
      }
      const ecmwfSnowMm = ecmwfSummit?.snowfall?.[i] != null
        ? Math.min(ecmwfSummit.snowfall[i] * 10, MAX_HOURLY_SNOWFALL_MM)
        : null;
      const ecmwfTemp = ecmwfSummit?.temperature_2m?.[i] ?? null;

      const baseT = ecmwfBase?.temperature_2m?.[i] ?? null;
      return {
        time: t,
        temp: ecmwfTemp != null ? (gfsTemp + ecmwfTemp) / 2 : gfsTemp,
        baseTemp: baseT,  // for HOURLY view lapse rate calculation (forecast-based)
        precip: gfs.precipitation[i],
        snowfallMm: ecmwfSnowMm != null ? (gfsSnowMm + ecmwfSnowMm) / 2 : gfsSnowMm,
        freezingLevel: ecmwfFL != null ? (gfsFL + ecmwfFL) / 2 : gfsFL,
        // GFS only — used purely to drive the decorative wind streamline
        // overlay, not averaged with ECMWF like the other fields.
        windSpeedKmh: gfs.windspeed_700hPa?.[i] ?? null,
        windDirDeg: gfs.winddirection_700hPa?.[i] ?? null
      };
    }).filter(r => r.temp != null);
  } catch (err) {
    forecastHours = buildDemoForecast();
  }
  openFromQueryParams();
}

// Fallback so the demo still works offline / if the API is unreachable.
function buildDemoForecast() {
  const rows = [];
  const start = new Date();
  start.setMinutes(0, 0, 0);
  for (let i = 0; i < 48; i++) {
    const t = new Date(start.getTime() + i * 3600 * 1000);
    const wave = Math.sin(i / 6) * 0.5 + 0.5; // a storm-like bump
    const snowfallMm = i > 14 && i < 22 ? (8 + wave * 14) : 0;
    rows.push({
      time: t.toISOString().slice(0, 16),
      temp: -2 + Math.sin(i / 8) * 3,
      precip: snowfallMm > 0 ? snowfallMm / 10 : 0,
      snowfallMm,
      freezingLevel: 1500 + Math.sin(i / 10) * 300,
      windSpeedKmh: 20 + wave * 35,
      windDirDeg: (270 + i * 4) % 360
    });
  }
  return rows;
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString('en-NZ', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

let map = null;

function initMap() {
  if (map) return;
  map = new maplibregl.Map({
    container: 'map',
    zoom: LOC.zoom,
    center: LOC.center,
    pitch: LOC.pitch,
    bearing: LOC.bearing,
    maxPitch: 85,
    attributionControl: false,
    style: {
      version: 8,
      sources: {
        terrain: { type: 'raster-dem', url: 'https://tiles.mapterhorn.com/tilejson.json', tileSize: 512 },
        satellite: {
          type: 'raster',
          tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
          tileSize: 256,
          attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics'
        }
      },
      layers: [
        { id: 'background', type: 'background', paint: { 'background-color': '#2d5a1b' } },
        { id: 'satellite', type: 'raster', source: 'satellite', paint: { 'raster-opacity': 1, 'raster-saturation': 0.1, 'raster-contrast': 0.05 } },
        {
          id: 'depth-shade', type: 'hillshade', source: 'terrain',
          paint: {
            'hillshade-shadow-color': 'rgba(30,20,10,0.45)',
            'hillshade-highlight-color': 'rgba(255,255,255,0)',
            'hillshade-accent-color': 'rgba(80,60,40,0.2)',
            'hillshade-illumination-direction': 310,
            'hillshade-exaggeration': 0.6
          }
        },
        {
          // Forecasted snow coverage, tinted by elevation from the snow line
          // (freezing level − 300m) up to the summit, transparent below.
          id: 'snow-relief', type: 'color-relief', source: 'terrain',
          paint: { 'color-relief-color': ['interpolate', ['linear'], ['elevation'], 0, 'rgba(255,255,255,0)'] }
        }
      ],
      terrain: { source: 'terrain', exaggeration: 1.2 }
    }
  });

  // Clear "bluebird" sky, only visible above the horizon when the camera
  // pitches up further than the default view. Set via Map#setSky once the
  // style has actually finished loading — calling it immediately after
  // the constructor (or putting "sky" directly in the style object) is
  // too early and the call is silently dropped. Not a layers[] entry
  // either: this MapLibre version's style spec layers[] array doesn't
  // accept a "sky" type at all, and adding one there fails validation
  // for the whole style. Unlike Mapbox's gradient-based sky, MapLibre's
  // model is just a sky-color (zenith) blending into a horizon-color —
  // bright blue overhead fading to a pale, almost-white blue at the
  // horizon.
  map.on('load', () => {
    map.setSky({
      'sky-color': '#3a82d6',
      'horizon-color': '#cfe9fb',
      'sky-horizon-blend': 0.8
    });

    const liftData = resortKey === 'ruapehu' ? WHAKAPAPA_LIFTS
      : resortKey === 'cardrona' ? CARDRONA_LIFTS
      : resortKey === 'loveland' ? LOVELAND_LIFTS
      : resortKey === 'mtlyford' ? MTLYFORD_LIFTS
      : resortKey === 'roundhill' ? ROUNDHILL_LIFTS
      : resortKey === 'treblecone' ? TREBLE_CONE_LIFTS
      : null;
    if (liftData) {
      map.addSource('resort-lifts', { type: 'geojson', data: liftData });
      map.addLayer({
        id: 'resort-lifts-line',
        type: 'line',
        source: 'resort-lifts',
        paint: {
          'line-color': '#e60000',
          'line-width': 1.4,
          'line-opacity': 0.9
        }
      });
    }
    // Live PredictWind observation pills + temperature profile (both resorts).
    initStationPill();
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true, showZoom: true, showCompass: true }), 'top-right');
  map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
  // The compact attribution control is a <details> element that MapLibre
  // auto-opens the moment it first populates with attribution text (sources
  // load asynchronously, so this can happen well after map creation) — force
  // it closed that one time so only the small (i) icon shows by default,
  // without blocking the user from opening it themselves afterwards.
  const attribEl = document.querySelector('.maplibregl-ctrl-attrib');
  const attribInner = attribEl?.querySelector('.maplibregl-ctrl-attrib-inner');
  if (attribEl && attribInner) {
    const closeOnceTextAppears = () => {
      if (attribInner.textContent.trim() === '') return;
      attribEl.removeAttribute('open');
      attribEl.classList.remove('maplibregl-compact-show');
      observer.disconnect();
    };
    const observer = new MutationObserver(closeOnceTextAppears);
    observer.observe(attribInner, { childList: true, characterData: true, subtree: true });
  }

  map.on('click', (e) => {
    // The click-to-probe popup reports snow depth (cm) for the snowfall/
    // accumulated views; it has no meaning on the Live temperature map, so
    // skip it there.
    if (viewMode === 'live') return;
    const rawElev = map.queryTerrainElevation(e.lngLat, { exaggerated: false });
    if (rawElev == null || isNaN(rawElev)) return;
    // The DEM tileset occasionally returns a spurious spike well above the
    // real summit (e.g. 3241m read back for Ruapehu, whose true summit is
    // ~2797m) — clamp to this resort's configured upper bound so the probe
    // popup never shows an impossible elevation.
    const elev = Math.min(rawElev, TOP_ELEV);
    const depthCm = getDepthAtElevation(elev);
    showClickPopup(e.point.x, e.point.y, `${depthCm.toFixed(1)}cm`);
  });

  // A user drag/zoom/rotate/pitch invalidates every particle's last screen
  // than let it draw bogus streaks connecting stale to fresh projections.
  // The decorative auto-rotate below also fires movestart/moveend every
  // single frame via setBearing(), but those calls have no originalEvent
  // (only real user gestures do) — skip pausing for those so the overlay
  // keeps flowing smoothly while the camera idles.
  let windInteractionActive = false;
  map.on('movestart', (e) => {
    if (!e.originalEvent) return;
    windInteractionActive = true;
  });
  map.on('moveend', () => {
    if (!windInteractionActive) return;
    windInteractionActive = false;
  });

  // Very slow auto-rotate on the initial view, purely decorative — stops for
  // good the moment the user actually touches the map (drag, zoom, pinch,
  // scroll), so it never fights with their own camera control.
  let autoRotateActive = true;
  const mapEl = document.getElementById('map');
  const rotateStep = () => {
    if (!autoRotateActive) return;
    map.setBearing(map.getBearing() + 0.015);
    requestAnimationFrame(rotateStep);
  };
  const stopAutoRotate = () => {
    autoRotateActive = false;
    document.getElementById('rotate-toggle').classList.remove('active');
  };
  const startAutoRotate = () => {
    if (autoRotateActive) return;
    autoRotateActive = true;
    document.getElementById('rotate-toggle').classList.add('active');
    requestAnimationFrame(rotateStep);
    armInteractionStop();
  };
  // Auto-rotate stops for good the moment the user touches the map (drag, zoom,
  // pinch, scroll) so it never fights their own camera control — re-armed each
  // time rotation is (re)started via the toggle button.
  const armInteractionStop = () => {
    ['mousedown', 'touchstart', 'wheel'].forEach((evt) =>
      mapEl.addEventListener(evt, stopAutoRotate, { once: true, passive: true })
    );
  };
  // Exposed for the top-left rotate button.
  window.toggleAutoRotate = () => {
    if (autoRotateActive) stopAutoRotate();
    else startAutoRotate();
  };
  requestAnimationFrame(rotateStep);
  armInteractionStop();
}

// Decorative only: applies the single selected hour's wind speed/direction
// uniformly across the whole view (not a true spatially-varying field), but
// each particle is tracked as a real lng/lat and projected to screen pixels

function degToCompass(deg) {
  if (deg == null) return '';
  const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── Click-to-probe popup — snow depth + elevation at the clicked point ──────
let currentSnowLine = null;
let currentHourCm = 0;
let currentAccumTotalCm = 0;

function getDepthAtElevation(elev) {
  if (currentSnowLine == null || elev < currentSnowLine) return 0;
  if (viewMode === 'hourly') return currentHourCm;
  const frac = Math.min(1, (elev - currentSnowLine) / (TOP_ELEV - currentSnowLine));
  return currentAccumTotalCm * frac;
}

let clickPopupEl = null;
let clickPopupTimer = null;

function showClickPopup(x, y, text) {
  if (clickPopupEl) clickPopupEl.remove();
  clickPopupEl = document.createElement('div');
  clickPopupEl.className = 'click-popup';
  clickPopupEl.style.left = x + 'px';
  clickPopupEl.style.top = y + 'px';
  clickPopupEl.textContent = text;
  document.getElementById('map-screen').appendChild(clickPopupEl);

  clearTimeout(clickPopupTimer);
  clickPopupTimer = setTimeout(() => {
    if (clickPopupEl) { clickPopupEl.remove(); clickPopupEl = null; }
  }, 4000);
}

// Selectable snow colour schemes (trial feature). Each defines the no-snowfall
// tint plus the three gradient stops (low → high elevation) for the active-
// snowfall drape. Switched via the icon column on the left of the hourly map.
const SNOW_SCHEMES = [
  { id: 'ice',    name: 'Ice',    swatch: '#cfe0ff', tint: [60, 130, 255],  lo: [205, 225, 255], mid: [225, 240, 255], hi: [248, 251, 255] },
  { id: 'aqua',   name: 'Aqua',   swatch: '#9af0e6', tint: [20, 170, 190],  lo: [150, 235, 230], mid: [195, 246, 242], hi: [240, 255, 253] },
  { id: 'violet', name: 'Violet', swatch: '#dcc0ff', tint: [140, 90, 240],  lo: [220, 200, 255], mid: [235, 222, 255], hi: [250, 245, 255] },
  { id: 'mono',   name: 'Mono',   swatch: '#dcdde2', tint: [110, 115, 125], lo: [205, 208, 214], mid: [228, 230, 234], hi: [249, 250, 252] },
];
let snowScheme = SNOW_SCHEMES[0];
try {
  const savedScheme = localStorage.getItem('sp-snow-scheme');
  const foundScheme = savedScheme && SNOW_SCHEMES.find(s => s.id === savedScheme);
  if (foundScheme) snowScheme = foundScheme;
} catch (e) {}

// Build the colour-relief fill for the currently selected forecast hour:
// flat tint from the snow line up when there's no active snowfall, or the
// intensity-scaled low→high gradient (scaled by snowfall amount) when there is.
// Colours come from the active snowScheme.
const SNOWFALL_THRESHOLD_MM = 0.1;

function buildSnowRamp(hour) {
  const snowing = hour.snowfallMm >= SNOWFALL_THRESHOLD_MM;

  // Where the tint starts (its lower edge), as a true elevation:
  //  • No active snowfall → the FREEZING LEVEL itself (the 0°C isotherm). Below it
  //    the air is above freezing, so nothing should be tinted. (Previous bug: this
  //    used freezing − 300m, so the blue drape spilled ~300m below the freezing
  //    level — e.g. covering a +1.8°C base that sits below the freezing level.)
  //  • Active snowfall → the SNOW LINE (freezing − 300m): falling snow survives
  //    ~300m into the above-freezing layer before melting, so it lies that low.
  const boundary = snowing ? hour.freezingLevel - SNOW_OFFSET : hour.freezingLevel;

  // Nothing to draw when the boundary is above the entire displayed terrain —
  // e.g. an off-season resort with the freezing level kilometres above the peak.
  // A flat transparent ramp avoids the static cap the clamp would otherwise pin
  // to the summit (which never moves as you scrub the timeline).
  if (boundary >= TOP_ELEV) {
    return [
      'interpolate', ['linear'], ['elevation'],
      0, 'rgba(255,255,255,0)',
      TOP_ELEV, 'rgba(255,255,255,0)'
    ];
  }

  // Clamp below TOP_ELEV so the ramp's stops stay strictly ascending.
  const line = Math.min(boundary, TOP_ELEV - 2);

  if (!snowing) {
    // Freezing-level overlay (no active snowfall). Opacity 0.2 so the drape
    // reads as a subtle tint rather than a solid wash.
    const color = `rgba(${snowScheme.tint.join(',')},0.2)`;
    return [
      'interpolate', ['linear'], ['elevation'],
      line - 1, 'rgba(255,255,255,0)',
      line, color,
      TOP_ELEV, color
    ];
  }

  // Intensity scales the colour/opacity with forecasted snowfall amount (mm).
  const intensity = Math.max(0.65, Math.min(1, hour.snowfallMm / 14));
  const a1 = (0.85 * intensity).toFixed(2);
  const a2 = (0.97 * intensity).toFixed(2);
  const a3 = (1 * intensity).toFixed(2);
  const midPoint = Math.min(line + 100, TOP_ELEV - 1);

  const lo = snowScheme.lo.join(','), mid = snowScheme.mid.join(','), hi = snowScheme.hi.join(',');
  return [
    'interpolate', ['linear'], ['elevation'],
    line - 1, `rgba(${lo},0)`,
    line, `rgba(${lo},${a1})`,
    midPoint, `rgba(${mid},${a2})`,
    TOP_ELEV, `rgba(${hi},${a3})`
  ];
}

// The 'snow-relief' layer isn't guaranteed to exist the instant the map is
// constructed (style/layers attach asynchronously), so poll briefly until it
// does rather than relying on a single 'load'/'idle' event that may fire too early.
let applyRampToken = 0;
function applyRampWhenReady(rampArray) {
  const token = ++applyRampToken;
  const tryApply = () => {
    if (token !== applyRampToken) return; // a newer selection was made — abandon this one
    if (map.getLayer('snow-relief')) {
      map.setPaintProperty('snow-relief', 'color-relief-color', rampArray);
    } else {
      setTimeout(tryApply, 80);
    }
  };
  tryApply();
}

// Switch the active snow colour scheme and repaint the current hour.
function setSnowScheme(id) {
  const sch = SNOW_SCHEMES.find(s => s.id === id);
  if (!sch) return;
  snowScheme = sch;
  try { localStorage.setItem('sp-snow-scheme', id); } catch (e) {}
  document.querySelectorAll('#scheme-switch .scheme-btn').forEach(b => b.classList.toggle('active', b.dataset.scheme === id));
  if (viewMode === 'hourly' && currentIndex >= 0 && forecastHours[currentIndex]) {
    applyRampWhenReady(buildSnowRamp(forecastHours[currentIndex]));
  }
}

// Build the snow-scheme icon column (one swatch per scheme) on first load.
(function buildSchemeSwitch() {
  const host = document.getElementById('scheme-switch');
  if (!host) return;
  host.innerHTML = SNOW_SCHEMES.map(s =>
    `<button class="scheme-btn${s.id === snowScheme.id ? ' active' : ''}" data-scheme="${s.id}" ` +
    `title="${s.name} snow colours" aria-label="${s.name} snow colours" onclick="setSnowScheme('${s.id}')">` +
    `<span class="sw" style="background:${s.swatch}"></span></button>`
  ).join('');
})();

// Pin + black pill at the ski field showing the hourly snowfall rate — shown on
// the hourly forecast map only while snow is actually falling.
let snowfallMarker = null;
function renderSnowfallMarker(hour) {
  const show = viewMode === 'hourly' && hour && hour.snowfallMm >= SNOWFALL_THRESHOLD_MM;
  if (!show) { if (snowfallMarker) { snowfallMarker.remove(); snowfallMarker = null; } return; }
  const lngLat = LOC.center || [LOC.lon, LOC.lat];
  if (!snowfallMarker) {
    const el = document.createElement('div');
    el.className = 'snowfall-marker';
    el.innerHTML = '<div class="sf-pill"></div><div class="sf-stem"></div><div class="sf-dot"></div>';
    snowfallMarker = new maplibregl.Marker({ element: el, anchor: 'bottom' }).setLngLat(lngLat).addTo(map);
  }
  snowfallMarker.getElement().querySelector('.sf-pill').textContent = `❄ ${hour.snowfallMm.toFixed(1)} mm/hr`;
  snowfallMarker.setLngLat(lngLat);
}

let currentIndex = -1;

function openMapView(index) {
  currentIndex = Math.max(0, Math.min(index, forecastHours.length - 1));
  const hour = forecastHours[currentIndex];

  initMap();

  applyRampWhenReady(buildSnowRamp(hour));

  currentSnowLine = hour.freezingLevel - SNOW_OFFSET;
  currentHourCm = hour.snowfallMm / 10;

  document.getElementById('si-time').textContent = fmtTime(hour.time);
  document.getElementById('si-temp').textContent = hour.temp.toFixed(1) + '°C';
  document.getElementById('si-fl').textContent = Math.round(hour.freezingLevel) + ' m';
  document.getElementById('si-sl').textContent = Math.round(hour.freezingLevel - SNOW_OFFSET) + ' m';
  document.getElementById('si-snow').textContent = hour.snowfallMm.toFixed(1) + ' mm';
  document.getElementById('si-wind').textContent = hour.windSpeedKmh != null
    ? `${Math.round(hour.windSpeedKmh)} km/h ${degToCompass(hour.windDirDeg)}`
    : '—';

  document.getElementById('tl-prev').disabled = currentIndex <= 0;
  document.getElementById('tl-next').disabled = currentIndex >= forecastHours.length - 1;
  document.getElementById('tl-label').textContent = fmtTime(hour.time);

  const slider = document.getElementById('tl-slider');
  slider.max = forecastHours.length - 1;
  slider.value = currentIndex;

  if (currentIndex >= forecastHours.length - 1) stopPlay();

  // Render freezing level overlay for hourly view
  if (viewMode === 'hourly') {
    pwRenderFreezingOverlay();
    // Update observation pills to show forecasted temperature
    for (const id in pwState) pwRenderPill(id);
    // Update pseudo pills to show forecasted temperature
    pwRenderPseudoPills();
    // Snowfall pin/pill at the field (only while snow is falling this hour)
    renderSnowfallMarker(hour);
  }

  setTimeout(() => map.resize(), 60);
}

function stepHour(delta) {
  if (currentIndex < 0) return;
  openMapView(currentIndex + delta);
}

// ── Accumulated snowfall view — total depth over the next 5/10/15 days ──────
// Distinct depth bands so colours are easy to tell apart at a glance: pale
// blue (light) through to red (extreme), each with good contrast against
// its neighbours. The mountain is tinted with all five bands stacked by
// elevation (light blue near the snow line, up through blue/teal/amber to
// red at the summit) so the colour key is clearly visible across the
// terrain — the legend highlights which single band the actual forecast
// total falls into.
const DEPTH_BANDS = [
  { max: 1,        label: '0–1 cm',     swatch: '#ffffff', color: 'rgba(255,255,255,0.30)' },
  { max: 2,        label: '1–2 cm',     swatch: '#e8f4ff', color: 'rgba(232,244,255,0.80)' },
  { max: 4,        label: '2–4 cm',     swatch: '#b8dcfc', color: 'rgba(184,220,252,0.84)' },
  { max: 10,       label: '5–10 cm',    swatch: '#7bb8ea', color: 'rgba(123,184,234,0.87)' },
  { max: 15,       label: '10–15 cm',   swatch: '#4f8fe0', color: 'rgba(79,143,224,0.89)' },
  { max: 25,       label: '15–25 cm',   swatch: '#6a4fd8', color: 'rgba(106,79,216,0.91)' },
  { max: 50,       label: '25–50 cm',   swatch: '#9530d8', color: 'rgba(149,48,216,0.93)' },
  { max: Infinity, label: '50 cm+',     swatch: '#c41e3a', color: 'rgba(196,30,58,0.95)' }
];

function renderDepthLegend(activeBand) {
  const el = document.getElementById('depth-legend');
  el.innerHTML = DEPTH_BANDS.map(b => `
    <div class="legend-row${b === activeBand ? ' active-band' : ''}">
      <div class="legend-swatch" style="background:${b.swatch}"></div>
      <span>${b.label}</span>
    </div>
  `).join('');
}

// Stack only the depth bands actually reached by the forecast total, evenly
// between the snow line and the summit, as hard-edged steps. A light total
// (e.g. 5cm, band index 1) only shows a couple of pale blue steps; a big
// total (e.g. 120cm, band index 7) shows the full climb through blue/purple
// to red. Previously this always stacked all 10 bands regardless of the
// real total, so a 2cm and a 200cm forecast rendered identically.
function buildAccumRamp(snowLine, bandIndex) {
  const n = bandIndex + 1;
  const bandWidth = (TOP_ELEV - snowLine) / n;
  // A narrow snowLine..TOP_ELEV gap (e.g. snowLine clamped right up against
  // TOP_ELEV) can make bandWidth sub-1, so "end - 1" would fall below "start"
  // and break the ramp's required ascending order — nudge it down to a small
  // fraction of the band width instead of a flat 1m in that case.
  const edgeGap = Math.min(1, bandWidth / 4);
  const stops = ['interpolate', ['linear'], ['elevation'], snowLine - 1, 'rgba(255,255,255,0)'];
  DEPTH_BANDS.slice(0, n).forEach((b, i) => {
    const start = snowLine + bandWidth * i;
    const end = snowLine + bandWidth * (i + 1);
    stops.push(start, b.color);
    stops.push(end - edgeGap, b.color);
  });
  return stops;
}

function renderAccumulatedView() {
  if (forecastHours.length === 0) return;
  initMap();

  const nowMs = Date.now();
  let startIdx = 0, bestDiff = Infinity;
  forecastHours.forEach((r, i) => {
    const diff = Math.abs(new Date(r.time).getTime() - nowMs);
    if (diff < bestDiff) { bestDiff = diff; startIdx = i; }
  });
  const window_ = forecastHours.slice(startIdx, startIdx + accumDays * 24);
  const totalCm = window_.reduce((s, r) => s + r.snowfallMm, 0) / 10;
  // Use the lowest freezing level reached during the window, not the average —
  // averaging dilutes a cold snow event with milder days elsewhere in the same
  // window, which made a longer period (e.g. 15 Day) show a *higher* snow line
  // than a shorter one (10 Day) it fully contains. The minimum can only stay
  // the same or drop as the window grows, so longer periods never show less
  // low-elevation coverage than the shorter periods nested inside them.
  const minFreezing = Math.min(...window_.map((r) => r.freezingLevel));
  // Clamp below TOP_ELEV — see buildSnowRamp for why (freezing level can
  // forecast above the resort's summit in its off-season).
  const snowLine = Math.min(minFreezing - SNOW_OFFSET, TOP_ELEV - 2);

  const bandIndex = DEPTH_BANDS.findIndex(b => totalCm <= b.max);
  const band = bandIndex === -1 ? DEPTH_BANDS[DEPTH_BANDS.length - 1] : DEPTH_BANDS[bandIndex];

  applyRampWhenReady(buildAccumRamp(snowLine, bandIndex === -1 ? DEPTH_BANDS.length - 1 : bandIndex));

  currentSnowLine = snowLine;
  currentAccumTotalCm = totalCm;

  document.getElementById('accum-period-label').textContent = `Next ${accumDays} Days`;
  document.getElementById('accum-total').textContent = totalCm.toFixed(0) + ' cm';
  document.getElementById('accum-snowline').textContent = Math.round(snowLine) + ' m';
  renderDepthLegend(band);
  updateAccumMinSummary();

  setTimeout(() => map.resize(), 60);
}

// Headline figures shown in the minimised drawer's grey space (accumulated mode).
function updateAccumMinSummary() {
  const el = document.getElementById('drawer-min-summary');
  if (!el) return;
  el.innerHTML = `
    <div class="dms-main">
      <span class="dms-eyebrow">Next ${accumDays} Days · Snowfall</span>
      <span class="dms-total">${currentAccumTotalCm != null ? currentAccumTotalCm.toFixed(0) + ' cm' : '—'}</span>
    </div>
    <div class="dms-side">
      <span class="l">Snow line</span>
      <span class="v">${currentSnowLine != null ? Math.round(currentSnowLine) + ' m' : '—'}</span>
    </div>`;
}

let viewMode = 'hourly'; // 'hourly' | 'accumulated'
let accumDays = 5;

// Persist the map view selection so it carries across location switches (each
// resort reloads this page in the iframe, which would otherwise reset to the
// default hourly view). Same-origin localStorage survives that reload.
function pwPersist(key, val) { try { localStorage.setItem(key, val); } catch (e) {} }

function setViewMode(mode) {
  viewMode = mode;
  pwPersist('sp-view-mode', mode);
  document.querySelectorAll('#mode-switch .pill-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('period-switch').style.display = mode === 'accumulated' ? 'flex' : 'none';
  document.getElementById('timeline').style.display = mode === 'hourly' ? 'flex' : 'none';
  document.getElementById('speed-select').style.display = mode === 'hourly' ? 'flex' : 'none';
  document.getElementById('info-hourly').style.display = mode === 'hourly' ? 'block' : 'none';
  document.getElementById('info-accum').style.display = mode === 'accumulated' ? 'block' : 'none';
  document.getElementById('info-live').style.display = mode === 'live' ? 'block' : 'none';
  document.getElementById('live-timeline').style.display = mode === 'live' ? 'flex' : 'none';
  document.getElementById('map-screen').classList.toggle('live-mode', mode === 'live');
  document.getElementById('map-screen').classList.toggle('accum-mode', mode === 'accumulated');
  document.getElementById('map-screen').classList.toggle('hourly-mode', mode === 'hourly');
  // Snowfall pin is hourly-only — clear it when switching away.
  if (mode !== 'hourly' && snowfallMarker) { snowfallMarker.remove(); snowfallMarker = null; }
  // The minimised-drawer summary is accumulated-only; clear it elsewhere so the
  // :empty rule keeps it hidden.
  if (mode !== 'accumulated') { const dms = document.getElementById('drawer-min-summary'); if (dms) dms.innerHTML = ''; }
  if (mode !== 'live' && mode !== 'hourly') {
    document.getElementById('fl-overlay').style.display = 'none';
  }
  if (mode !== 'live') {
    pwStopLivePlay();
    if (pwDisplayTime != null) { pwDisplayTime = null; for (const id in pwState) pwRenderPill(id); }
  }

  if (mode === 'hourly') {
    stopPlay();
    openMapView(currentIndex < 0 ? 0 : currentIndex);
    pwRenderFreezingOverlay();
  } else if (mode === 'live') {
    stopPlay();
    renderLiveTempView();
  } else {
    stopPlay();
    renderAccumulatedView();
  }
  // Tick the real-time freezing-level nowcast only while in live view.
  if (mode === 'live') pwStartNowcast(); else pwStopNowcast();
}

function setPeriod(days) {
  accumDays = days;
  pwPersist('sp-accum-days', days);
  document.querySelectorAll('#period-switch .pill-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days, 10) === days));
  renderAccumulatedView();
}

function enterFullscreenView() {
  const el = document.getElementById('map-screen');
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (req) req.call(el);
}

function exitFullscreenView() {
  const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if (exit) exit.call(document);
}

function updateFullscreenUI() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
  document.getElementById('map-screen').classList.toggle('is-fullscreen', isFs);
}
['fullscreenchange', 'webkitfullscreenchange', 'msfullscreenchange'].forEach((evt) =>
  document.addEventListener(evt, updateFullscreenUI)
);
// Redraw the freezing-level sparkline (sized in pixels) when the map resizes.
window.addEventListener('resize', () => { if (typeof viewMode !== 'undefined' && viewMode === 'live') pwRenderFreezingOverlay(); });

// ── Timeline scrubber: drag-to-seek + play/pause autoplay ────────────────────
document.getElementById('tl-slider').addEventListener('input', (e) => {
  stopPlay();
  openMapView(parseInt(e.target.value, 10));
});

let playTimer = null;
let playSpeed = 3;
const BASE_INTERVAL_MS = 700;

// Blend two hours' freezing level/snowfall linearly so the snow-relief ramp
// (built from whichever blended values come out) animates as a continuous
// fade between hours instead of jumping in discrete steps during playback.
function blendHour(a, b, t) {
  return {
    freezingLevel: a.freezingLevel + (b.freezingLevel - a.freezingLevel) * t,
    snowfallMm: a.snowfallMm + (b.snowfallMm - a.snowfallMm) * t
  };
}

function togglePlay() {
  if (playTimer) stopPlay();
  else startPlay();
}

function startPlay() {
  if (currentIndex < 0) return;
  if (currentIndex >= forecastHours.length - 1) openMapView(0); // restart from the beginning
  document.getElementById('tl-play').textContent = '⏸';
  if (playTimer) cancelAnimationFrame(playTimer);

  const tickMs = BASE_INTERVAL_MS / playSpeed;
  let tickStart = performance.now();

  const frame = (now) => {
    if (currentIndex >= forecastHours.length - 1) { stopPlay(); return; }
    const t = Math.min(1, (now - tickStart) / tickMs);
    const from = forecastHours[currentIndex];
    const to = forecastHours[currentIndex + 1];
    const blended = blendHour(from, to, t);
    applyRampWhenReady(buildSnowRamp(blended));
    renderSnowfallMarker(blended);

    if (t >= 1) {
      openMapView(currentIndex + 1);
      tickStart = now;
      if (currentIndex >= forecastHours.length - 1) return; // stopPlay() already ran inside openMapView
    }
    playTimer = requestAnimationFrame(frame);
  };
  playTimer = requestAnimationFrame(frame);
}

  if (playTimer) { cancelAnimationFrame(playTimer); playTimer = null; }

function openFromQueryParams() {
  if (forecastHours.length === 0) return;
  const targetTime = new URLSearchParams(window.location.search).get('time');
  const targetMs = targetTime ? new Date(targetTime).getTime() : Date.now();
  let bestIdx = 0, bestDiff = Infinity;
  forecastHours.forEach((r, i) => {

    if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }

  openMapView(bestIdx);

}

// Relative "last updated" label, e.g. "2 mins ago".
function pwAgo(unixSec) {
  const s = Math.max(0, Math.floor(Date.now() / 1000 - unixSec));
  if (s < 45) return 'just now';
  const m = Math.round(s / 60);
  if (m < 60) return m + (m === 1 ? ' min ago' : ' mins ago');
  const h = Math.round(m / 60);
  if (h < 24) return h + (h === 1 ? ' hour ago' : ' hours ago');
  const d = Math.round(h / 24);
  return d + (d === 1 ? ' day ago' : ' days ago');
}

// Field letters (d/s/g/t, plus humidity/rain which we don't use) aren't all
// guaranteed present — marine buoy tracks report d/s/g/t, but land METAR
// stations (e.g. US airport AWOS feeds near Loveland) often omit gust (g)
// and add h/r instead. Parse whichever letter-tokens are actually there
// rather than requiring a fixed d-s-g-t sequence, or the whole record (and
// every delta after it) silently fails to decode.
const PW_ANCHOR = /^(\d{9,})([+-]\d+)([+-]\d+)(.*)$/;
const PW_CONT   = /^(\d+)(.*)$/;
const PW_FIELD  = /([a-z])(-?\d+)/g;

function pwParseFieldTokens(tail) {
  const f = {};
  for (const m of tail.matchAll(PW_FIELD)) f[m[1]] = +m[2];
  return f;
}

function pwDecodeSeries(s) {
  const out = []; let ts, dir = 0, spd = 0, gst = 0, tmp = 0;
  for (const rec of s.split('|')) {
    const a = rec.match(PW_ANCHOR);
    // METAR-style records bundle t (temp) with p (pressure, ~1000hPa) and h
    // (humidity %) as a one-shot absolute observation snapshot, not a wind-
    // style running delta — unlike d/s/g, which always accumulate. We only
    // use t, but its presence alongside p is the tell: treat it as absolute
    // there, or it silently runs away into a meaningless cumulative sum.
    if (a) {
      ts = +a[1];
      const f = pwParseFieldTokens(a[4]);
      dir = f.d ?? 0; spd = f.s ?? 0; gst = f.g ?? 0;
      // p === 0 (with t/h/r also 0) is a "no observation this round" sentinel,
      // not a real reading — real pressure is never exactly 0 — so it leaves
      // tmp at whatever it already was rather than zeroing it out.
      if (f.p) tmp = f.t ?? tmp;
      else if (f.p === undefined) tmp = f.t ?? 0;
    } else {
      const m = rec.match(PW_CONT);
      if (!m) continue;
      ts += +m[1];
      const f = pwParseFieldTokens(m[2]);
      if (f.d !== undefined) dir += f.d;
      if (f.s !== undefined) spd += f.s;
      if (f.g !== undefined) gst += f.g;
      if (f.t !== undefined) {
        // Pure delta-accumulated temp (no 'p' bundled) can drift off into an
        // impossible reading if a record's deltas get misparsed somewhere
        // upstream — clamp to a physically plausible range rather than carry
        // a runaway sum (e.g. a glitch that pushed one station to 54°C).
        const next = f.p ? f.t : tmp + f.t;
        if (f.p || (next / 10 >= -50 && next / 10 <= 50)) tmp = next;
      }
    }
    out.push({ ts, dir: ((dir % 360) + 360) % 360, speedKt: spd / 10, gustKt: gst / 10, tempC: tmp / 10 });
  }
  return out;
}

// Coordinates are packed with variable precision: the decimal point is dropped
// and trailing zeros may be trimmed, so the divisor depends on digit count, not
// a fixed 1e5 (e.g. Whakapapa lon 17556458→175.56458, but National Park lon
// 1754217→175.4217). Scale so the integer part has the expected digit count
// (lat ~39° = 2 digits, lon ~175° = 3 digits).
function pwDecodeCoord(signed, intDigits) {
  const sign = signed[0] === '-' ? -1 : 1;
  const dg = signed.replace(/^[+-]/, '');
  return sign * (+dg) / Math.pow(10, dg.length - intDigits);
}

function pwParseMeta(t) {
  const name = t.split('$', 1)[0];
  const m = t.match(/([+-]\d+)([+-]\d+)\^(\d+)/);
  const prov = (t.match(/S([a-z0-9_]+)\$/) || [])[1] || null;
  return {
    name,
    lat: m ? pwDecodeCoord(m[1], 2) : null,
    lon: m ? pwDecodeCoord(m[2], 3) : null,
    elevM: m ? +m[3] : null,
    provider: prov
  };
}

// fetch with a hard timeout. A plain fetch() has no timeout, so on a stalled
// mobile radio a request can hang indefinitely — it never resolves and never
// rejects, so the live view sits on "Waiting for observations…" forever and
// the retry below never fires. AbortController turns a stall into a rejection
// after `ms`, which lets the retry path kick in.
function pwFetchTimeout(url, ms = 9000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal, cache: 'no-store' })
    .finally(() => clearTimeout(timer));
}

async function pwFetchTiles() {
  // Use allSettled, not all: on flaky mobile connections one tile timing out
  // shouldn't void the other three — merge whatever succeeded and only throw
  // if every single tile failed.
  const results = await Promise.allSettled(PW_TILES.map(async ([z, x, y]) => {
    const res = await pwFetchTimeout(`/pw-obs/tile/${z}/${x}/${y}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('tile ' + res.status);
    return res.json();
  }));
  const tracks = {};
  let updated = 0;
  let okCount = 0;
  let lastErr = '';
  for (const r of results) {
    if (r.status !== 'fulfilled') {
      lastErr = (r.reason && (r.reason.name === 'AbortError' ? 'timeout' : r.reason.message)) || 'error';
      console.warn('PredictWind tile fetch failed:', lastErr);
      continue;
    }
    okCount++;
    Object.assign(tracks, r.value.tracks || {});
    if (r.value.updated > updated) updated = r.value.updated;
  }
  if (!okCount) throw new Error('all tiles failed (' + lastErr + ')');
  return { updated, tracks };
}

// Temperature → colour ramp (warm → cold): green, blue, light blue, white at
// 0°C, then pink and purple below freezing. White lands exactly on 0°C so it
// marks the freezing level on the mountain.
const PW_TEMP_STOPS = [
  [-12, [139, 47, 217]],   // purple (coldest)
  [-7, [168, 85, 230]],    // purple
  [-2.5, [244, 114, 182]], // pink
  [0, [255, 255, 255]],    // white — freezing level
  [1.7, [125, 211, 252]],  // light blue
  [3.3, [37, 99, 235]],    // blue
  [5, [60, 200, 120]],     // green (warm)
];
function pwTempRGB(t) {
  const s = PW_TEMP_STOPS;
  if (t <= s[0][0]) return s[0][1];
  if (t >= s[s.length - 1][0]) return s[s.length - 1][1];
  for (let i = 0; i < s.length - 1; i++) {
    const [t0, c0] = s[i], [t1, c1] = s[i + 1];
    if (t >= t0 && t <= t1) {
      const f = (t - t0) / (t1 - t0);
      return c0.map((v, k) => Math.round(v + (c1[k] - v) * f));
    }
  }
  return [34, 211, 238];
}
function pwTempColor(t) { return `rgb(${pwTempRGB(t).join(',')})`; }

const PW_COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
const pwCompass = (d) => PW_COMPASS[Math.round(d / 22.5) % 16];

// Simple SVG line plot of the last `hours` of temperature.
function pwTempGraph(series, hours = 12) {
  const cutoff = series[series.length - 1].ts - hours * 3600;
  const pts = series.filter(r => r.ts >= cutoff);
  if (pts.length < 2) return '<div style="color:rgba(255,255,255,0.4);font-size:0.8rem">Not enough data</div>';
  const W = 336, H = 120, P = { t: 12, r: 30, b: 18, l: 30 };
  const pw = W - P.l - P.r, ph = H - P.t - P.b;
  const t0 = pts[0].ts, t1 = pts[pts.length - 1].ts;
  const temps = pts.map(p => p.tempC);
  let lo = Math.min(...temps), hi = Math.max(...temps);
  if (hi - lo < 2) { const m = (hi + lo) / 2; lo = m - 1; hi = m + 1; }
  const pad = (hi - lo) * 0.15; lo -= pad; hi += pad;
  const X = (ts) => P.l + (t1 === t0 ? 0 : (ts - t0) / (t1 - t0)) * pw;
  const Y = (v) => P.t + ph - ((v - lo) / (hi - lo)) * ph;
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${X(p.ts).toFixed(1)},${Y(p.tempC).toFixed(1)}`).join(' ');
  const area = `${line} L${X(t1).toFixed(1)},${(P.t + ph).toFixed(1)} L${X(t0).toFixed(1)},${(P.t + ph).toFixed(1)} Z`;
  // gridlines / labels at hi, mid, lo
  const yLabels = [hi, (hi + lo) / 2, lo].map(v => {
    const y = Y(v).toFixed(1);
    return `<line x1="${P.l}" y1="${y}" x2="${W - P.r}" y2="${y}" stroke="rgba(255,255,255,0.08)" />`
      + `<text x="${P.l - 6}" y="${(+y + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="rgba(255,255,255,0.45)">${v.toFixed(0)}°</text>`;
  }).join('');
  const fmt = (ts) => new Date(ts * 1000).toLocaleTimeString('en-NZ', { hour: '2-digit', minute: '2-digit', hour12: false });
  const last = pts[pts.length - 1];
  const dotColor = pwTempColor(last.tempC);
  // store plotted geometry so the hover handler can map cursor x → nearest sample
  pwGraphState = {
    W, H, plotTop: P.t, plotH: ph,
    pts: pts.map(p => ({ ts: p.ts, tempC: p.tempC, x: +X(p.ts).toFixed(2), y: +Y(p.tempC).toFixed(2) })),
  };
  return `<div class="obs-graph-wrap">
    <svg class="obs-graph" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="pwfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient></defs>
    ${yLabels}
    <path d="${area}" fill="url(#pwfill)" />
    <path d="${line}" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <line class="g-vline" x1="0" y1="${P.t}" x2="0" y2="${(P.t + ph).toFixed(1)}" stroke="rgba(255,255,255,0.55)" stroke-width="1" style="display:none" />
    <circle cx="${X(last.ts).toFixed(1)}" cy="${Y(last.tempC).toFixed(1)}" r="3.5" fill="${dotColor}" stroke="#fff" stroke-width="1.5" />
    <circle class="g-hdot" r="3.5" fill="#fff" stroke="#0a1424" stroke-width="1.5" style="display:none" />
    <text x="${P.l}" y="${H - 5}" font-size="9" fill="rgba(255,255,255,0.45)">${fmt(t0)}</text>
    <text x="${W - P.r}" y="${H - 5}" text-anchor="end" font-size="9" fill="rgba(255,255,255,0.45)">${fmt(t1)}</text>
    <rect class="g-capture" x="${P.l}" y="${P.t}" width="${pw}" height="${ph}" fill="transparent" style="cursor:crosshair" />
    </svg>
    <div class="g-tip" style="display:none"></div>
  </div>`;
}

let pwGraphState = null;

// Wire pointer hover on the temperature graph: snap to the nearest sample and
// show a tooltip with its exact temperature and time.
function pwWireGraphHover(root) {
  const wrap = root.querySelector('.obs-graph-wrap');
  if (!wrap || !pwGraphState) return;
  const st = pwGraphState;
  const svg = wrap.querySelector('svg.obs-graph');
  const cap = wrap.querySelector('.g-capture');
  const vline = wrap.querySelector('.g-vline');
  const hdot = wrap.querySelector('.g-hdot');
  const tip = wrap.querySelector('.g-tip');
  const fmt = (ts) => new Date(ts * 1000).toLocaleTimeString('en-NZ', { hour: '2-digit', minute: '2-digit', hour12: false });
  const move = (e) => {
    const rect = svg.getBoundingClientRect();
    const sx = (e.clientX - rect.left) / rect.width * st.W;
    let best = st.pts[0], bd = Infinity;
    for (const p of st.pts) { const d = Math.abs(p.x - sx); if (d < bd) { bd = d; best = p; } }
    vline.style.display = ''; vline.setAttribute('x1', best.x); vline.setAttribute('x2', best.x);
    hdot.style.display = ''; hdot.setAttribute('cx', best.x); hdot.setAttribute('cy', best.y);
    tip.style.display = 'block';
    tip.innerHTML = `<b>${best.tempC.toFixed(1)}°C</b><span class="t">${fmt(best.ts)}</span>`;
    const px = Math.max(34, Math.min(rect.width - 34, best.x / st.W * rect.width));
    tip.style.left = px + 'px';
    tip.style.top = (best.y / st.H * rect.height) + 'px';
  };
  const hide = () => { vline.style.display = 'none'; hdot.style.display = 'none'; tip.style.display = 'none'; };
  cap.addEventListener('pointermove', move);
  cap.addEventListener('pointerleave', hide);
}
